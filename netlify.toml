# Only applies to paths that don't match an existing file.
[[redirects]]
  from = "https://riley.meetriley.us/*"
  to = "/riley-auth.html"
  status = 200

[[redirects]]
  from = "https://login.meetriley.us/*"
  to = "/login.html"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.meetriley.us/*"
  to = "/operator.html"
  status = 200
  force = true

