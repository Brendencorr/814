<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat with Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--gold:#c9a84c;--gold2:#e8d5a3;--smoke:#8a8578;--smoke2:#5a5450}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);display:flex;flex-direction:column;font-size:14px}

/* Header */
.chat-header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--ink2);border-bottom:1px solid rgba(201,168,76,0.18)}
.chat-header-brand{display:flex;align-items:center;gap:9px}
.chat-header-sun{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 10px rgba(201,168,76,0.45);flex-shrink:0}
.chat-header-name{font-family:'DM Serif Display',serif;font-size:16px;color:#fff}
.chat-header-badge{font-size:11px;color:var(--smoke);font-family:'DM Sans',sans-serif}
.chat-header-signin{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:1px solid rgba(201,168,76,0.35);border-radius:20px;padding:5px 12px;font-family:'DM Sans',sans-serif;transition:background .15s}
.chat-header-signin:hover{background:rgba(201,168,76,0.1)}

/* Messages */
.chat-msgs{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-track{background:transparent}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px}

.msg{display:flex;gap:8px;max-width:100%;align-items:flex-start;animation:msgIn .22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse}
.msg-bubble{padding:10px 13px;border-radius:14px;line-height:1.55;word-break:break-word;font-size:13.5px}
.msg.riley .msg-bubble{background:var(--ink3);color:var(--parchment);border-radius:4px 14px 14px 14px;max-width:90%}
.msg.user .msg-bubble{background:linear-gradient(135deg,#4a7c59,#375c44);color:#fff;border-radius:14px 4px 14px 14px;max-width:82%}
.msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:13px}
.msg.riley .msg-avatar{background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 8px rgba(201,168,76,0.3)}
.msg.user .msg-avatar{background:#2a3830;color:var(--gold2)}

/* Typing indicator */
.typing-indicator{display:flex;align-items:center;gap:5px;padding:10px 13px;background:var(--ink3);border-radius:4px 14px 14px 14px;width:fit-content}
.typing-dot{width:7px;height:7px;border-radius:50%;background:var(--smoke);animation:typeDot 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.25s}
.typing-dot:nth-child(3){animation-delay:.5s}
@keyframes typeDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* Input */
.chat-input-area{flex-shrink:0;padding:10px 12px;background:var(--ink2);border-top:1px solid rgba(255,255,255,0.07)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;background:var(--ink3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:var(--parchment);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;padding:9px 12px;resize:none;min-height:40px;max-height:100px;outline:none;transition:border-color .15s}
.chat-textarea:focus{border-color:rgba(201,168,76,0.45)}
.chat-textarea::placeholder{color:var(--smoke2)}
.chat-textarea:disabled{opacity:0.55;cursor:not-allowed}
.send-btn{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4a7c59,#375c44);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .15s;font-size:16px}
.send-btn:hover{transform:scale(1.06)}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}

/* Sign-in nudge */
.signin-nudge{font-size:11px;text-align:center;color:var(--smoke);margin-top:6px;line-height:1.5}
.signin-nudge a,.signin-nudge .snlink{color:var(--gold);cursor:pointer;text-decoration:none}
.signin-nudge a:hover,.signin-nudge .snlink:hover{text-decoration:underline}

/* Rate limit notice */
.rate-notice{font-size:12px;color:var(--smoke);text-align:center;padding:6px 0;line-height:1.5}
.rate-notice .snlink{color:var(--gold);cursor:pointer}
</style>
</head>
<body>

<div class="chat-header">
  <div class="chat-header-brand">
    <div class="chat-header-sun"></div>
    <div>
      <div class="chat-header-name">Riley</div>
      <div class="chat-header-badge">Anonymous preview</div>
    </div>
  </div>
  <button class="chat-header-signin" id="signin-btn" onclick="requestSignin()">Sign in to save</button>
</div>

<div class="chat-msgs" id="msgs"></div>

<div class="chat-input-area">
  <div class="chat-input-row">
    <textarea
      id="input"
      class="chat-textarea"
      placeholder="Talk to Riley..."
      rows="1"
      aria-label="Message Riley"
    ></textarea>
    <button class="send-btn" id="send-btn" aria-label="Send" title="Send">&#9654;</button>
  </div>
  <div class="signin-nudge" id="nudge" style="display:none">
    <span class="snlink" onclick="requestSignin()">Sign in</span> to save your conversation and access all of Riley.
  </div>
  <div class="rate-notice" id="rate-notice" style="display:none"></div>
</div>

<script>
(function(){
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
var msgs = []; // [{role:"user"|"assistant", content:"..."}]
var sending = false;
var lastSendTime = 0;
var DEBOUNCE_MS = 1000; // 1 second between sends
// Client-side cap for snappy UX (same as server-side ANON_PRODUCT_CAP = 20/day).
// The server is the real enforcement - this only prevents the round-trip when
// the client already knows they're at the limit.
var SESSION_CAP = 20;   // matches server-side ANON_PRODUCT_CAP
var sessionMsgCount = 0;

// anon_id: a stable UUID identifying this browser for the server-side daily cap.
// Stored in localStorage so it persists across page loads and new sessions within
// the same day. The server uses this to enforce the per-visitor product cap.
var anonId = (function() {
  try {
    var stored = localStorage.getItem('riley_anon_id');
    if (stored && stored.length > 8) return stored;
    // Generate a v4-style UUID
    var uuid = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      var r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
    localStorage.setItem('riley_anon_id', uuid);
    return uuid;
  } catch(e) {
    return 'fallback-' + Math.random().toString(36).slice(2);
  }
})();

// Try to restore session count from sessionStorage so page refreshes
// within the session don't reset the counter.
try {
  var stored = parseInt(sessionStorage.getItem('riley_anon_count') || '0', 10);
  if (!isNaN(stored)) sessionMsgCount = stored;
} catch(e) {}

var msgsEl = document.getElementById('msgs');
var inputEl = document.getElementById('input');
var sendBtn = document.getElementById('send-btn');
var nudgeEl = document.getElementById('nudge');
var rateEl  = document.getElementById('rate-notice');

// ── Helpers ──────────────────────────────────────────────────────────────────
function scrollBottom() {
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function appendMsg(role, content, animate) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  var avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  avatarEl.textContent = role === 'riley' ? '' : 'You'.charAt(0);
  if (role === 'riley') {
    // sun rendered via CSS background
    avatarEl.textContent = '';
  }
  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = content;
  div.appendChild(avatarEl);
  div.appendChild(bubble);
  msgsEl.appendChild(div);
  if (animate !== false) scrollBottom();
  return bubble;
}

function showTyping() {
  var div = document.createElement('div');
  div.className = 'msg riley';
  div.id = 'typing-row';
  var avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  var ind = document.createElement('div');
  ind.className = 'typing-indicator';
  ind.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  div.appendChild(avatarEl);
  div.appendChild(ind);
  msgsEl.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  var t = document.getElementById('typing-row');
  if (t) t.remove();
}

function setInputState(disabled) {
  inputEl.disabled = disabled;
  sendBtn.disabled = disabled;
}

function showRateNotice(html) {
  rateEl.innerHTML = html;
  rateEl.style.display = 'block';
}

function clearRateNotice() {
  rateEl.style.display = 'none';
  rateEl.innerHTML = '';
}

// Warm, on-brand upgrade nudge shown when the server-side daily cap is hit.
// Riley's voice: no urgency, no guilt, just a genuine invitation to continue.
function showUpgradeNudge() {
  showRateNotice(
    "That's your free chat with me for today - and I'm glad we got to talk. "
    + '<span class="snlink" onclick="requestSignin()">Riley Coach</span> '
    + 'is unlimited - we can pick up right where we left off. '
    + '<span class="snlink" onclick="requestSignin()">Sign in or create a free account</span> to continue.'
  );
  // Also show the sign-in nudge in case it was hidden
  nudgeEl.style.display = 'block';
}

// ── Riley's opening message ──────────────────────────────────────────────────
window.addEventListener('load', function() {
  // Display opening greeting without calling the API to save cost/latency
  appendMsg('riley', "Hi. I'm Riley. I'm glad you're here. What brings you here today?", false);
  // Small delay to let the UI settle, then add to msgs array so context is passed
  msgs.push({role:'assistant', content:"Hi. I'm Riley. I'm glad you're here. What brings you here today?"});
  inputEl.focus();
});

// ── Send ─────────────────────────────────────────────────────────────────────
function send() {
  var text = inputEl.value.trim();
  if (!text || sending) return;

  // Debounce
  var now = Date.now();
  if (now - lastSendTime < DEBOUNCE_MS) return;
  lastSendTime = now;

  // Client-side cap - snappy UX guard (server enforces the real limit)
  if (sessionMsgCount >= SESSION_CAP) {
    showUpgradeNudge();
    setInputState(true);
    return;
  }

  clearRateNotice();
  sessionMsgCount++;
  try { sessionStorage.setItem('riley_anon_count', String(sessionMsgCount)); } catch(e) {}

  // Show nudge after 3rd message
  if (sessionMsgCount === 3) {
    nudgeEl.style.display = 'block';
  }

  // Show gentle notice when getting close (3 left) - server headers also trigger this
  if (sessionMsgCount === SESSION_CAP - 3) {
    showRateNotice(
      'You have 3 free messages left today. <span class="snlink" onclick="requestSignin()">Sign in free</span> for unlimited access.'
    );
  }

  msgs.push({role:'user', content:text});
  appendMsg('user', text);
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sending = true;
  setInputState(true);
  showTyping();

  // Call riley-chat - anonymous, no user_id, no token.
  // anon_id is sent so the server can enforce the per-visitor daily cap.
  var fetchRes = null; // capture response for header inspection after body is read
  fetch('/.netlify/functions/riley-chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Accept': 'text/plain, application/json'},
    body: JSON.stringify({
      message: text,
      messages: msgs.slice(-20), // cap history at 20 messages
      anon_id: anonId
    })
  })
  .then(function(res) {
    fetchRes = res;
    if (!res.ok) {
      return res.text().then(function(body) {
        throw new Error('HTTP ' + res.status + ': ' + body.slice(0, 100));
      });
    }
    return res.body.getReader();
  })
  .then(function(reader) {
    removeTyping();
    var bubble = appendMsg('riley', '', false);
    var decoder = new TextDecoder();
    var fullText = '';

    function pump() {
      return reader.read().then(function(ref) {
        var done = ref.done, value = ref.value;
        if (done) {
          // Finalize
          msgs.push({role:'assistant', content:fullText});

          // Check server-side cap headers after the full reply is received.
          // X-Chat-Atlimit: "true" means this was (or now is) the last allowed message.
          // X-Chat-Remaining: how many are left after this reply.
          if (fetchRes) {
            var atLimit = fetchRes.headers.get('X-Chat-Atlimit') === 'true';
            var remaining = parseInt(fetchRes.headers.get('X-Chat-Remaining') || '-1', 10);
            if (atLimit) {
              // Server says we're at the cap - show the upgrade nudge and lock input.
              showUpgradeNudge();
              setInputState(true); // keep disabled until sign-in
            } else if (remaining >= 0 && remaining <= 3) {
              // Getting close - surface a gentle notice
              showRateNotice(
                'You have ' + remaining + ' free message' + (remaining === 1 ? '' : 's') + ' left today. '
                + '<span class="snlink" onclick="requestSignin()">Sign in free</span> for more.'
              );
            }
          }

          sending = false;
          if (!fetchRes || fetchRes.headers.get('X-Chat-Atlimit') !== 'true') {
            setInputState(false);
            inputEl.focus();
          }
          return;
        }
        fullText += decoder.decode(value, {stream: true});
        bubble.textContent = fullText;
        scrollBottom();
        return pump();
      });
    }
    return pump();
  })
  .catch(function(err) {
    removeTyping();
    console.error('[chat-anon] riley-chat error:', err.message || err);
    appendMsg('riley', "Something went wrong - please try again in a moment.");
    sending = false;
    setInputState(false);
    inputEl.focus();
  });
}

// ── Input events ─────────────────────────────────────────────────────────────
inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

inputEl.addEventListener('input', function() {
  // Auto-resize
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});

sendBtn.addEventListener('click', send);

// ── Sign-in flow ─────────────────────────────────────────────────────────────
window.requestSignin = function() {
  // If inside a popup (parent != self), postMessage so the parent can open login
  // in the TOP window (Google OAuth blocks in iframes).
  if (window.parent !== window) {
    try {
      window.parent.postMessage({
        type: 'riley_anon_signin',
        history: msgs,
        count: msgs.length
      }, location.origin);
    } catch(e) {}
  } else {
    // Standalone: navigate directly
    try {
      sessionStorage.setItem('riley_pre_auth_history', JSON.stringify(msgs));
      sessionStorage.setItem('riley_pre_auth_msg_count', String(msgs.length));
    } catch(e) {}
    window.location.href = 'https://riley.meetriley.us/login';
  }
};

})();
</script>
</body>
</html>
