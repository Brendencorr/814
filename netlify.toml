# Every hour it derives each member's lifecycle state and logs the decision to email_sends;
# with COMMS_ENABLED unset it suppresses 100% of sends (zero Resend calls).
[functions."evaluate-comms"]
  schedule = "0 * * * *"
  timeout = 30

