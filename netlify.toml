[build.environment]
  # Exclude CLAUDE.md from secrets scanning — it's documentation, not deployed code.
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,riley-auth.html,riley-dashboard.html,riley-chat.js"

[functions]
  directory = "netlify/functions"

[functions."scout"]
  timeout = 26

[functions."sage"]
  timeout = 26

[functions."atlas"]
  timeout = 26

[functions."echo"]
  timeout = 26

[functions."riley-chat"]
  timeout = 30

[functions."auth-handler"]
  timeout = 26

[functions."buffer-publish"]
  timeout = 26

[functions."pipeline-status"]
  timeout = 26

[functions."weekly-pipeline"]
  timeout = 26

[functions."site-config"]
  timeout = 10

# Runs every Sunday 6am MT (12:00 UTC) as a background function
# Scheduled functions automatically run as background functions — no -background suffix needed
[functions."weekly-pipeline-cron"]
  schedule = "0 12 * * 0"

[[redirects]]
  from = "https://riley.eight14.us/*"
  to = "/riley-auth.html"
  status = 200
  force = true

[[redirects]]
  from = "https://login.eight14.us/*"
  to = "/login.html"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.eight14.us/*"
  to = "/dashboard.html"
  status = 200
  force = true
