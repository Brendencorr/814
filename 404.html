<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found - Riley</title>
<link rel="icon" href="/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0908;color:#f5f0e8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.wrap{max-width:420px}
.sun{width:44px;height:44px;border-radius:50%;margin:0 auto 22px;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 28px rgba(201,168,76,0.4)}
h1{font-family:'DM Serif Display',serif;font-size:30px;margin-bottom:10px}
p{font-size:14px;color:#8a8578;line-height:1.7;margin-bottom:26px}
a{display:inline-block;background:#c9a84c;color:#0a0908;padding:12px 26px;border-radius:3px;font-size:13px;font-weight:600;text-decoration:none;letter-spacing:0.03em}
a:hover{opacity:.9}
</style>
</head>
<body>
  <div class="wrap">
    <div class="sun"></div>
    <h1>This page isn’t here.</h1>
    <p>The page you’re looking for doesn’t exist or has moved. Let’s get you back to Riley.</p>
    <a href="/">Back to Riley</a>
  </div>
</body>
</html>
