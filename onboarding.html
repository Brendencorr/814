<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0908">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riley">
<title>Welcome - Meet Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:focus-visible{outline:2px solid #c9a84c;outline-offset:2px}  /* a11y: keyboard focus (WCAG 2.4.7) */
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--gold:#c9a84c;--gold2:#e8d5a3;--gold-dim:rgba(201,168,76,0.12);--green:#3a7c56;--green2:#4aad72;--smoke:#8a8578;--smoke2:#5a5450;--rust:#c0604a;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(201,168,76,0.07) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 50% 110%,rgba(74,122,176,0.04) 0%,transparent 55%);pointer-events:none;z-index:0}
.stage{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}
.moment{max-width:560px;width:100%;animation:rise .7s cubic-bezier(.2,.7,.2,1) backwards}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeout{to{opacity:0;transform:translateY(-12px)}}
.section-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:0.22em;text-transform:uppercase;margin-bottom:18px;opacity:0.85}
.riley-says{font-family:'DM Serif Display',serif;font-size:27px;line-height:1.4;color:var(--parchment);margin-bottom:8px;letter-spacing:-0.01em}
.riley-sub{font-size:15px;color:var(--smoke);line-height:1.6;margin-bottom:28px}
.sig{font-size:12px;color:var(--gold);font-family:'DM Mono',monospace;letter-spacing:0.1em;margin-top:20px;opacity:0.8}
input[type=text],input[type=date],select,textarea{width:100%;background:var(--ink2);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:13px 15px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--parchment);outline:none;transition:border-color .2s;margin-bottom:12px}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--smoke2)}
textarea{resize:vertical;min-height:84px;line-height:1.6}
label.fld{display:block;font-size:11px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;margin-top:8px}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.opt{padding:14px 16px;background:var(--ink2);border:1px solid rgba(255,255,255,0.08);border-radius:4px;font-size:15px;color:var(--parchment);cursor:pointer;transition:all .18s;text-align:left;min-height:24px}
.opt:hover{border-color:rgba(201,168,76,0.4);background:var(--ink3)}
.opt.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold2)}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{padding:9px 15px;background:var(--ink2);border:1px solid rgba(255,255,255,0.08);border-radius:24px;font-size:13px;color:var(--parchment);cursor:pointer;transition:all .18s;min-height:24px}
.chip:hover{border-color:rgba(201,168,76,0.4)}
.chip.sel{border-color:var(--gold);background:var(--gold-dim);color:var(--gold2)}
.row{display:flex;gap:10px}.row>div{flex:1}
.actions{display:flex;align-items:center;gap:14px;margin-top:24px}
.btn{padding:13px 32px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:3px;transition:all .2s;letter-spacing:0.02em;background:linear-gradient(135deg,var(--gold),#d4942a);color:var(--ink);box-shadow:0 3px 16px rgba(201,168,76,0.25)}
.btn:hover{box-shadow:0 5px 24px rgba(201,168,76,0.4)}
.btn:disabled{opacity:0.4;cursor:default;box-shadow:none}
.skip{background:none;border:none;color:var(--smoke);font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;padding:8px}
.skip:hover{color:var(--parchment)}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-top:40px}
.pdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.12);transition:all .3s}
.pdot.on{background:var(--gold);width:18px;border-radius:3px}
/* 0–10 ruler */
.ruler{display:flex;gap:5px;justify-content:space-between;margin:6px 0 8px}
.rnum{flex:1;min-width:24px;min-height:44px;display:flex;align-items:center;justify-content:center;background:var(--ink2);border:1px solid rgba(255,255,255,0.1);border-radius:5px;font-family:'DM Mono',monospace;font-size:14px;color:var(--parchment);cursor:pointer;transition:all .15s}
.rnum:hover{border-color:rgba(201,168,76,0.5)}
.rnum.sel{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600}
.ranchor{display:flex;justify-content:space-between;font-size:11px;color:var(--smoke2);font-family:'DM Mono',monospace;margin-bottom:16px}
/* toggle rows */
.toggle-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:13px 0;border-top:1px solid rgba(255,255,255,0.06)}
.toggle-row:first-child{border-top:none}
.toggle-row .tl{font-size:14px;color:var(--parchment)}.toggle-row .td{font-size:12.5px;color:var(--smoke);line-height:1.5;margin-top:3px}
.sw{position:relative;width:44px;height:26px;flex-shrink:0;background:var(--ink3);border:1px solid rgba(255,255,255,0.14);border-radius:14px;cursor:pointer;transition:all .18s}
.sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--smoke);transition:all .18s}
.sw.on{background:var(--gold-dim);border-color:var(--gold)}.sw.on::after{left:20px;background:var(--gold)}
/* plan preview card */
.plan-card{background:linear-gradient(180deg,rgba(201,168,76,0.09),rgba(26,23,20,0.6));border:1px solid rgba(201,168,76,0.22);border-radius:14px;padding:22px 22px;margin:6px 0 8px;font-size:16px;line-height:1.7;color:var(--parchment)}
.plan-card b{color:var(--gold2);font-weight:600}
/* crisis card */
.crisis-card{background:var(--ink2);border:1px solid rgba(192,96,74,0.4);border-radius:12px;padding:20px 22px}
.crisis-card a.line{display:block;padding:13px 16px;margin-top:10px;background:rgba(192,96,74,0.12);border:1px solid rgba(192,96,74,0.35);border-radius:8px;color:var(--parchment);font-weight:600;text-decoration:none}
.crisis-card a.line:hover{border-color:var(--rust)}
.build-stage{text-align:center}
.cardinal{font-size:48px;display:inline-block;animation:flyin 1.4s cubic-bezier(.2,.7,.2,1)}
@keyframes flyin{from{opacity:0;transform:translateX(-120px) translateY(-30px)}to{opacity:1;transform:translateX(0) translateY(0)}}
.build-msg{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.55;color:var(--parchment);margin-top:20px;opacity:0;animation:rise .8s forwards}
/* Riley's presence - the breathing "sun" mark (same as the chat + marketing popup, brand asset 4) */
.rsun{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 14px rgba(201,168,76,0.45);animation:sunBreathe 5s ease-in-out infinite;flex-shrink:0;display:inline-block;vertical-align:middle}
.rsun-lg{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 42px rgba(201,168,76,0.38),0 0 96px rgba(201,168,76,0.13);animation:sunBreathe 5s ease-in-out infinite;margin:0 auto;display:block}
@keyframes sunBreathe{0%,100%{transform:scale(1);opacity:.94}50%{transform:scale(1.055);opacity:1}}
/* Riley "writes it live" - the plan reveal (the aha moment) */
.tw{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.6;color:var(--parchment);white-space:pre-wrap;letter-spacing:-0.01em;min-height:1.6em}
.tw b{color:var(--gold2);font-weight:400}
.tw-cursor{display:inline-block;width:2px;height:1.05em;background:var(--gold);margin-left:1px;vertical-align:-2px;animation:twblink 1s step-end infinite}
@keyframes twblink{50%{opacity:0}}
@media(max-width:560px){.riley-says{font-size:23px}.rnum{font-size:13px}.tw{font-size:20px}.rsun-lg{width:52px;height:52px}}
</style>
</head>
<body>
<div class="stage"><div class="moment" id="moment"><div style="color:var(--smoke);font-size:14px">Loading…</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB=supabase.createClient('https://tglljvjixlolaguycvbb.supabase.co','sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8');
let USER=null,UID=null,FIRST='';
const A={secondary_focuses:[]}; // collected answers

// ── Data ──────────────────────────────────────────────────────────────────────
const WHY=['I want to improve my health.','I am looking for motivation.','I am struggling emotionally.','I am grieving.','I am working on my sobriety.','I am rebuilding after a difficult season.','I want better habits.','I want accountability.','I am not really sure.','Something else.'];
const FOCUS=['Sleep','Nutrition','Fitness','Purpose','Mental Health','Stress','Relationships','Recovery','Leadership','Career','Adventure','Creativity','Community','Learning','Financial Wellness'];
const TIMING=[['morning','Morning'],['lunch','Lunch'],['afternoon','Afternoon'],['evening','Evening'],['on_demand','Only when I ask']];
// motivation ("two weeks from now") options by lane
const MOTIV={
  sobriety:["I'd have more days behind me","I'd feel less pulled","I'd stop white-knuckling evenings"],
  grief:["I'd get through a day without drowning","I'd sleep","I'd feel less alone in it"],
  body:["I'd have moved a few times","I'd have more energy","I'd feel at home in my body again"],
  other:["I'd feel a little more like myself","I'd have some momentum","I'd feel less stuck"]
};
function laneFor(why){
  if(why==='I am working on my sobriety.')return 'sobriety';
  if(why==='I am grieving.')return 'grief';
  if(why==='I want to improve my health.')return 'body';
  return 'other';
}
const LANE_LABEL={sobriety:'your sobriety',grief:'your grief',body:'rebuilding your health',other:"what you're carrying"};
const TIME_LABEL={morning:'each morning',lunch:'around lunch',afternoon:'in the afternoon',evening:'in the evening',on_demand:'whenever you reach for me'};

// ── Helpers ────────────────────────────────────────────────────────────────────
const el=()=>document.getElementById('moment');
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function swap(html){const m=el();m.style.animation='fadeout .3s forwards';setTimeout(()=>{m.innerHTML=html;m.style.animation='rise .7s cubic-bezier(.2,.7,.2,1) backwards';window.scrollTo(0,0);},300);}
function dots(n){return `<div class="progress-dots">${[1,2,3,4,5,6,7,8,9].map(i=>`<div class="pdot ${i<=n?'on':''}"></div>`).join('')}</div>`;}
async function save(patch,step){try{await SB.from('user_profiles').upsert({id:UID,email:USER.email,onboarding_version:2,...patch,...(step!=null?{onboarding_step:step}:{})},{onConflict:'id'});}catch(e){console.warn('save',e.message);}}
async function saveMemory(rows){try{const now=new Date().toISOString();await SB.from('riley_memory').insert(rows.map(r=>({user_id:UID,memory_type:r.type||'long_term',content:r.content,source:'onboarding',confidence:1.0,is_active:true,status:'active',last_confirmed_at:now})));}catch(e){console.warn('mem',e.message);}}
function ruler(id,lo,hi,cur){
  const nums=[...Array(11).keys()].map(n=>`<button class="rnum ${cur===n?'sel':''}" data-track="ruler" data-r="${n}" onclick="pickRuler('${id}',${n})">${n}</button>`).join('');
  return `<div class="ruler" id="${id}">${nums}</div><div class="ranchor"><span>${lo}</span><span>${hi}</span></div>`;
}
function pickRuler(id,n){A['_'+id]=n;document.querySelectorAll('#'+id+' .rnum').forEach(b=>b.classList.toggle('sel',+b.dataset.r===n));const b=document.getElementById(id+'-btn');if(b)b.disabled=false;}

// ── Shared crisis check (same detector as chat + check-in) ─────────────────────
// Explicit self-harm/suicide language interrupts onboarding into the 988 support UI.
async function crisisScan(text){
  if(!text||text.trim().length<2)return 0;
  try{
    const tok=(await SB.auth.getSession()).data.session?.access_token;
    const r=await fetch('/.netlify/functions/checkin-scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok,text})});
    const j=await r.json();return j.level||0;
  }catch(e){return 0;}
}
function crisisInterrupt(resumeFn){
  try{window.trackEvent&&window.trackEvent('crisis_support_shown',{where:'onboarding'});}catch(e){}
  el().innerHTML=`<div class="crisis-card">
    <div class="rsun" style="width:38px;height:38px;margin-bottom:12px"></div>
    <div class="riley-says" style="font-size:22px;margin-bottom:6px">I'm really glad you told me.</div>
    <div class="riley-sub" style="margin-bottom:6px">You don't have to carry this alone right now, and you don't have to keep going with any of this. Talking to a real person can help - right now, any time.</div>
    <a class="line" data-track="crisis_call" href="tel:988">📞 Call 988 - Suicide &amp; Crisis Lifeline</a>
    <a class="line" data-track="crisis_text" href="sms:988">💬 Text 988</a>
    <a class="line" data-track="crisis_chat" href="https://988lifeline.org/chat/" target="_blank" rel="noopener">🌐 Chat online at 988lifeline.org</a>
    <div style="margin-top:18px;display:flex;gap:14px;align-items:center">
      <button class="btn" onclick="(${resumeFn.name})()">I'm okay - let's keep going</button>
    </div>
  </div>`;
}

// ── Boot / resume ──────────────────────────────────────────────────────────────
async function boot(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){window.location.href='https://login.meetriley.us';return;}
  USER=session.user;UID=USER.id;
  const meta=USER.user_metadata||{};
  FIRST=(meta.full_name||meta.name||USER.email.split('@')[0]||'').split(' ')[0];
  const {data:p}=await SB.from('user_profiles').select('onboarding_completed,onboarding_step,onboarding_version,preferred_name').eq('id',UID).maybeSingle();
  if(p&&p.onboarding_completed){window.location.href='https://riley.meetriley.us/dashboard';return;}
  if(p&&p.preferred_name){FIRST=p.preferred_name.split(' ')[0];A.preferred_name=p.preferred_name;}
  if(!p||!p.onboarding_started_at)await save({onboarding_started_at:new Date().toISOString()},0);
  try{window.trackEvent&&window.trackEvent('onboarding_started',{version:2});}catch(e){}
  renderWelcome(); // resume is answer-preserving within a session; a fresh load restarts at welcome (short flow)
}

// ── Screen 1 · Welcome (copy kept verbatim) ────────────────────────────────────
function renderWelcome(){
  el().innerHTML=`<div style="text-align:center">
    <div class="rsun-lg" style="margin-bottom:26px"></div>
    <div class="riley-says" style="font-size:30px">Welcome.<br>I'm really glad you're here.</div>
    <div class="riley-sub" style="max-width:400px;margin:18px auto 0">Before we begin, I'd love to get to know you.<br>There's no rush. We'll build this together.</div>
    <div class="sig">- Riley</div>
    <div style="margin-top:36px"><button class="btn" onclick="sName()">Begin</button></div>
  </div>`;
}

// ── Screen 2 · Name ────────────────────────────────────────────────────────────
function sName(){
  swap(`<div class="section-label">A little about you</div>
    <div class="riley-says">Hi. What should I call you?</div>
    <div class="riley-sub">Just your first name is perfect.</div>
    <input type="text" id="i-name" placeholder="Your name" value="${esc(A.preferred_name||FIRST||'')}" autofocus>
    <div class="actions"><button class="skip" onclick="renderWelcome()" style="margin-right:auto">← Back</button><button class="btn" onclick="doneName()">Continue</button></div>
    ${dots(1)}`);
  setTimeout(()=>{const n=document.getElementById('i-name');if(n)n.focus();},350);
}
async function doneName(){
  const name=document.getElementById('i-name').value.trim();
  if(!name){document.getElementById('i-name').style.borderColor='#8b3a3a';document.getElementById('i-name').focus();return;}
  A.preferred_name=name;FIRST=name.split(' ')[0];
  await save({preferred_name:name,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone},1);
  swap(`<div class="riley-says">Thanks, ${esc(FIRST)}. It's nice to meet you.</div><div class="riley-sub">Let's start where you are.</div><div class="actions"><button class="btn" onclick="sBrings()">Continue</button></div>`);
}

// ── Screen 3 · What brings you here (multi-select persona sorter + crisis scan) ─
function sBrings(){
  A.why_set=A.why_set||[];
  const elseOpen=A.why_set.includes(WHY.length-1);
  swap(`<div class="section-label">What brings you here</div>
    <div class="riley-says">What brings you here?</div>
    <div class="riley-sub">Choose anything that fits - you can pick more than one. There's no wrong answer.</div>
    <div class="opts" id="why-opts">${WHY.map((w,i)=>`<button class="opt ${A.why_set.includes(i)?'sel':''}" data-track="why_opt" data-i="${i}" onclick="pickWhy(${i})">${esc(w)}</button>`).join('')}</div>
    <div id="why-else" style="display:${elseOpen?'block':'none'};margin-top:8px"><label class="fld">Tell me a little more</label><textarea id="why-text" placeholder="As much or as little as you want.">${esc(A.why_here_detail||'')}</textarea></div>
    <div class="actions"><button class="skip" onclick="sName()" style="margin-right:auto">← Back</button><button class="btn" id="b-brings" onclick="doneBrings()" ${A.why_set.length?'':'disabled'}>Continue</button></div>
    ${dots(2)}`);
}
function pickWhy(i){
  A.why_set=A.why_set||[];const idx=A.why_set.indexOf(i);
  if(idx>=0)A.why_set.splice(idx,1);else A.why_set.push(i);
  document.querySelectorAll('#why-opts .opt').forEach(o=>o.classList.toggle('sel',A.why_set.includes(+o.dataset.i)));
  document.getElementById('why-else').style.display=A.why_set.includes(WHY.length-1)?'block':'none';
  document.getElementById('b-brings').disabled=A.why_set.length===0;
}
async function doneBrings(){
  if(!A.why_set||!A.why_set.length)return;
  const txt=document.getElementById('why-text')?document.getElementById('why-text').value.trim():'';
  A.why_here_detail=txt||null;
  // Same crisis detector as chat + check-in - explicit risk interrupts into 988 UI.
  if(txt){const lvl=await crisisScan(txt);if(lvl>=3){return crisisInterrupt(sBrings);}}
  A.why_here=A.why_set.map(i=>WHY[i]).join('; ');
  const sob=A.why_set.some(i=>WHY[i]==='I am working on my sobriety.');
  await save({why_here:A.why_here,why_here_detail:A.why_here_detail,sobriety_interest:sob},2);
  await saveMemory([{content:`Why they came to Riley: ${A.why_here}${A.why_here_detail?' - '+A.why_here_detail:''}`,type:'long_term'}]);
  maybeLeanIn();
}

// ── Screen 3b · Contextual "lean-in" - Riley responds to the heavy thing they shared ──────────────
// Optional, single-tap, dignified opt-out. Only shows for reasons that warrant a gentle follow-up.
// Saved to riley_memory (what Riley reads every message) so it can reference this later - builds trust.
const LEANIN={
  'I am grieving.':{q:"I'm so sorry. If you're open to it - what kind of loss?",mem:"The kind of loss they're grieving",opts:['A loved one','A relationship','A job or identity','A pet','Something else',"I'd rather not say"]},
  'I am struggling emotionally.':{q:"What's weighing on you most right now?",mem:"What's weighing on them most",opts:['Work','Family','A relationship','Health','Money','Everything at once','Not sure']},
  'I am working on my sobriety.':{q:"What are you working to stay free from?",mem:"What they're working to stay free from",opts:['Alcohol','Substances','A behavior','Just staying the course',"I'd rather not say"]}
};
function heavyReason(){const set=(A.why_set||[]).map(i=>WHY[i]);for(const w of set){if(LEANIN[w])return w;}return null;}
function maybeLeanIn(){const w=heavyReason();if(w)sLeanIn(w);else sStart();}
function sLeanIn(w){
  const cfg=LEANIN[w];A._leanFor=w;
  swap(`<div class="section-label">Getting to know you</div>
    <div class="riley-says">${esc(cfg.q)}</div>
    <div class="riley-sub">One tap - only if you want to. It just helps me understand.</div>
    <div class="opts" id="li-opts">${cfg.opts.map((o,i)=>`<button class="opt" data-track="leanin_opt" onclick="pickLeanIn(${i})">${esc(o)}</button>`).join('')}</div>
    <div class="actions"><button class="skip" onclick="sStart()" style="margin-right:auto">Skip</button></div>
    ${dots(2)}`);
}
async function pickLeanIn(i){
  const cfg=LEANIN[A._leanFor];if(!cfg)return sStart();
  const val=cfg.opts[i];A.leanin_answer=val;
  if(!/rather not say|not sure/i.test(val))await saveMemory([{content:`${cfg.mem}: ${val}`,type:'long_term'}]);
  sStart();
}

// ── Screen 7b · "A little about your world" - optional life-context (family / work / support) ──────
// Everything optional + skippable. Chips + one free-text line (crisis-scanned). Feeds riley_memory so
// Riley can show up like it knows them (kids, a program, support nearby, living alone).
const LIFE_CHIPS=['Married or partnered','Have kids','Working','In school','In a recovery program','Have support nearby','Live alone'];
function sLifeContext(){
  A.life_flags=A.life_flags||[];
  swap(`<div class="section-label">A little about your world</div>
    <div class="riley-says">Anything you'd like me to know about your life?</div>
    <div class="riley-sub">The more I know, the better I can show up for you. Totally optional - tap what fits.</div>
    <div class="chips" id="life-chips">${LIFE_CHIPS.map((c,i)=>`<button class="chip ${A.life_flags.includes(c)?'sel':''}" data-track="life_chip" onclick="tglLife(${i})">${esc(c)}</button>`).join('')}</div>
    <div style="margin-top:10px"><textarea id="life-text" placeholder="Anything else, in your words… (optional)">${esc(A.life_text||'')}</textarea></div>
    <div class="actions"><button class="skip" onclick="skipLife()" style="margin-right:auto">Skip</button><button class="btn" onclick="doneLife()">Continue</button></div>
    ${dots(7)}`);
}
function tglLife(i){const c=LIFE_CHIPS[i];A.life_flags=A.life_flags||[];const idx=A.life_flags.indexOf(c);if(idx>=0)A.life_flags.splice(idx,1);else A.life_flags.push(c);document.querySelectorAll('#life-chips .chip').forEach((el,k)=>el.classList.toggle('sel',A.life_flags.includes(LIFE_CHIPS[k])));}
function skipLife(){A.life_flags=[];A.life_text=null;sClose();}
async function doneLife(){
  const t=document.getElementById('life-text');A.life_text=(t&&t.value.trim())||null;
  if(A.life_text){const lvl=await crisisScan(A.life_text);if(lvl>=3){return crisisInterrupt(sLifeContext);}}
  const parts=[];
  if(A.life_flags&&A.life_flags.length)parts.push(A.life_flags.join('; '));
  if(A.life_text)parts.push(A.life_text);
  if(parts.length)await saveMemory([{content:`About their life: ${parts.join(' - ')}`,type:'long_term'}]);
  sClose();
}

// ── Screen 4 · Where we start (up to 3; the FIRST pick is the starting lane) ────
function sStart(){
  // Candidate set = the specific things they chose (excluding "not sure"/"something else"),
  // else the full focus list. People carry more than one thing - pick up to 3.
  const chosen=(A.why_set||[]).map(i=>WHY[i]).filter(w=>w!=='I am not really sure.'&&w!=='Something else.');
  const usingFocus=chosen.length===0;
  A._startCand=usingFocus?FOCUS:chosen;
  A.start_picks=A.start_picks||[]; // indices into _startCand, in tap order (first = primary)
  swap(`<div class="section-label">Where we start</div>
    <div class="riley-says">Where should we start?</div>
    <div class="riley-sub">You carry more than one thing - I'll hold all of it. Pick up to three, and we'll begin with the first one you choose.</div>
    <div class="opts" id="start-opts">${A._startCand.map((c,i)=>startOpt(c,i)).join('')}</div>
    <div class="chip-count" id="start-count">${A.start_picks.length}/3 · we'll start with the first</div>
    <div class="actions"><button class="skip" onclick="sBrings()" style="margin-right:auto">← Back</button><button class="btn" id="b-start" onclick="doneStart()" ${A.start_picks.length?'':'disabled'}>Continue</button></div>
    ${dots(3)}`);
}
function startOpt(c,i){
  const pos=A.start_picks.indexOf(i), sel=pos>=0;
  const badge=pos===0?'starting here':(sel?'#'+(pos+1):'');
  return `<button class="opt ${sel?'sel':''}" data-track="focus_opt" onclick="pickStart(${i})">${esc(c)}${badge?` <span style="font-size:11px;color:var(--gold);font-family:'DM Mono',monospace">· ${badge}</span>`:''}</button>`;
}
function pickStart(i){
  const idx=A.start_picks.indexOf(i);
  if(idx>=0)A.start_picks.splice(idx,1);
  else{if(A.start_picks.length>=3)return;A.start_picks.push(i);}
  document.getElementById('start-opts').innerHTML=A._startCand.map((c,k)=>startOpt(c,k)).join('');
  document.getElementById('start-count').textContent=A.start_picks.length+"/3 · we'll start with the first";
  document.getElementById('b-start').disabled=A.start_picks.length===0;
}
async function doneStart(){
  if(!A.start_picks.length)return;
  const picks=A.start_picks.map(k=>A._startCand[k]);
  A.primary_focus=picks[0];
  A.focus_lane=laneFor(A.primary_focus); // generic-list picks fall to the 'other' lane
  const extras=(A.why_set||[]).map(i=>WHY[i]).filter(w=>w!=='Something else.'&&!picks.includes(w));
  A.secondary_focuses=[...new Set(picks.slice(1).concat(extras))];
  await save({primary_focus:A.primary_focus,focus_lane:A.focus_lane,secondary_focuses:A.secondary_focuses},3);
  await saveMemory([{content:`Where we're starting: ${picks.join(', ')} - primary: ${A.primary_focus}`,type:'long_term'}]);
  sTwoWeeks();
}

// ── Screen 5 · Two weeks from now (motivation, options vary by lane) ───────────
function sTwoWeeks(){
  const opts=MOTIV[A.focus_lane]||MOTIV.other;
  const elseOpen=A._motivElse;
  swap(`<div class="section-label">Two weeks from now</div>
    <div class="riley-says">If the next two weeks went well, what would feel different?</div>
    <div class="riley-sub">Not the finish line - just the next honest step.</div>
    <div class="opts" id="mv-opts">${opts.map((o,i)=>`<button class="opt ${A._motivIdx===i?'sel':''}" data-track="motiv_opt" data-i="${i}" onclick="pickMotiv(${i})">${esc(o)}</button>`).join('')}
      <button class="opt ${elseOpen?'sel':''}" data-track="motiv_opt" data-i="else" onclick="pickMotiv('else')">Something else…</button></div>
    <div id="mv-else" style="display:${elseOpen?'block':'none'};margin-top:6px"><textarea id="mv-text" placeholder="In your words.">${esc(A._motivText||'')}</textarea></div>
    <div class="actions"><button class="skip" onclick="sStart()" style="margin-right:auto">← Back</button><button class="btn" id="b-mv" onclick="doneTwoWeeks()" ${(A._motivIdx!=null||elseOpen)?'':'disabled'}>Continue</button></div>
    ${dots(4)}`);
}
function pickMotiv(i){
  if(i==='else'){A._motivElse=true;A._motivIdx=null;}else{A._motivIdx=i;A._motivElse=false;}
  document.querySelectorAll('#mv-opts .opt').forEach(o=>o.classList.toggle('sel',o.dataset.i==(i==='else'?'else':String(i))));
  document.getElementById('mv-else').style.display=A._motivElse?'block':'none';
  document.getElementById('b-mv').disabled=false;
}
async function doneTwoWeeks(){
  const opts=MOTIV[A.focus_lane]||MOTIV.other;
  if(A._motivElse){A.motivation=(document.getElementById('mv-text').value.trim())||null;}
  else if(A._motivIdx!=null){A.motivation=opts[A._motivIdx];}
  if(!A.motivation){document.getElementById('b-mv').disabled=true;return;}
  await save({motivation:A.motivation},5);
  await saveMemory([{content:`What they want to feel in two weeks: ${A.motivation}`,type:'long_term'}]);
  sReadiness();
}

// ── Screen 6 · Readiness (0–10 ruler, branches the plan) ───────────────────────
function sReadiness(){
  swap(`<div class="section-label">Being honest</div>
    <div class="riley-says">How ready are you to work on this right now?</div>
    <div class="riley-sub">Honest answer - there's no wrong one.</div>
    ${ruler('readiness','Not yet','All in',A.readiness)}
    <div class="actions"><button class="skip" onclick="sTwoWeeks()" style="margin-right:auto">← Back</button><button class="btn" id="readiness-btn" onclick="doneReadiness()" ${A.readiness!=null?'':'disabled'}>Continue</button></div>
    ${dots(5)}`);
  if(A.readiness!=null)A._readiness=A.readiness;
}
async function doneReadiness(){
  A.readiness=A._readiness;if(A.readiness==null)return;
  await save({readiness:A.readiness},6);sConfidence();
}

// ── Screen 7 · Confidence (0–10 ruler, suppresses streaks if low) ──────────────
function sConfidence(){
  swap(`<div class="section-label">One more</div>
    <div class="riley-says">How confident are you that you can check in a few times this week?</div>
    <div class="riley-sub">Thirty seconds counts.</div>
    ${ruler('confidence','Not sure','Confident',A.confidence)}
    <div class="actions"><button class="skip" onclick="sReadiness()" style="margin-right:auto">← Back</button><button class="btn" id="confidence-btn" onclick="doneConfidence()" ${A.confidence!=null?'':'disabled'}>Continue</button></div>
    ${dots(6)}`);
  if(A.confidence!=null)A._confidence=A.confidence;
}
async function doneConfidence(){
  A.confidence=A._confidence;if(A.confidence==null)return;
  await save({confidence:A.confidence},7);sLifeContext();
}

// ── Screen 8 · Staying close (time) → notification rationale ───────────────────
function sClose(){
  swap(`<div class="section-label">Staying close</div>
    <div class="riley-says">When would you like me to check in?</div>
    <div class="riley-sub">I'll show up when it helps - and stay quiet when it doesn't.</div>
    <div class="opts" id="time-opts">${TIMING.map(([v,l])=>`<button class="opt ${A.notification_schedule===v?'sel':''}" data-v="${v}" onclick="pickTime('${v}')">${esc(l)}</button>`).join('')}</div>
    <div class="actions"><button class="skip" onclick="sConfidence()" style="margin-right:auto">← Back</button><button class="btn" id="b-time" onclick="doneClose()" ${A.notification_schedule?'':'disabled'}>Continue</button></div>
    ${dots(7)}`);
}
function pickTime(v){A.notification_schedule=v;document.querySelectorAll('#time-opts .opt').forEach(o=>o.classList.toggle('sel',o.dataset.v===v));document.getElementById('b-time').disabled=false;}
async function doneClose(){
  await save({notification_schedule:A.notification_schedule||'morning'},7);
  if(A.notification_schedule&&A.notification_schedule!=='on_demand'&&'Notification'in window){return notifRationale();}
  sPrivacy();
}
function notifRationale(){
  swap(`<div class="section-label">Staying close</div>
    <div class="riley-says">Want a gentle nudge at that time?</div>
    <div class="riley-sub">One quiet reminder to check in - nothing more. You can change or turn this off anytime.</div>
    <div class="actions"><button class="btn" onclick="askNotif()">Turn on gentle nudges</button><button class="skip" onclick="sPrivacy()">Not now</button></div>
    ${dots(7)}`);
}
async function askNotif(){
  try{await Notification.requestPermission();}catch(e){}
  sPrivacy(); // declining preserves in-app scheduling
}

// ── Screen 9 · Your data, your choice (upgraded privacy gate) ──────────────────
function sPrivacy(){
  A.note_storage_consent=A.note_storage_consent||false;
  swap(`<div class="section-label">Your data, your choice</div>
    <div class="riley-says">An honest note about what I keep.</div>
    <div class="riley-sub">Plain words - no fine print.</div>
    <div style="background:var(--ink2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:16px 18px;margin-bottom:16px">
      <div style="font-size:14px;line-height:1.7">
        · <b>Yours, and private</b> - what you share stays confidential to you. Never sold, never shared, never used for ads. (The one exception: a real safety moment, used only to help you, nothing else.)<br>
        · <b>What I keep</b> - your check-ins and our conversations, in our secure database, so I can know you over time.<br>
        · <b>Always optional</b> - reflections, deeper questions, reminders.<br>
        · <b>You're in control</b> - you can <a href="/privacy" style="color:var(--gold)" target="_blank">export or delete everything</a>, anytime.
      </div>
    </div>
    <div style="background:var(--ink2);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:6px 18px 10px;margin-bottom:6px">
      <div class="toggle-row"><div><div class="tl">Remember my written reflections</div><div class="td">Off by default. When on, I keep the notes you write so I can refer back with care.</div></div><div class="sw" id="sw-note" onclick="tglNote()"></div></div>
    </div>
    <div style="font-size:12px;color:var(--smoke2);line-height:1.5;margin-bottom:4px">Your information is never sold or used for advertising. If you ever share an unsafe moment, that stays private - used only to keep you safe. <a href="/safety" style="color:var(--smoke)" target="_blank">Our safety approach</a>.</div>
    <div class="actions" style="flex-direction:column;align-items:stretch"><button class="btn" onclick="acceptPrivacy()" style="width:100%">I understand - let's begin</button></div>
    ${dots(8)}`);
}
function tglNote(){A.note_storage_consent=!A.note_storage_consent;document.getElementById('sw-note').classList.toggle('on',A.note_storage_consent);}
async function acceptPrivacy(){
  await save({consent_at:new Date().toISOString(),consent_version:'2.0',note_storage_consent:!!A.note_storage_consent},8);
  sPreview();
}

// ── Screen 10 · Plan preview - the aha moment ──────────────────────────────────
// Riley "writes" the plan live from the member's own answers - the aha moment. Tokens keep the emphasis
// (gold) intact through a char-by-char reveal; reduced-motion + a tap both fast-forward to the full text.
function planTokens(){
  const lane=A.focus_lane||'other';
  const goal=(A.motivation||'').replace(/^I'?d\s*/i,'to ')||'to feel a little more like yourself';
  const holding=(A.secondary_focuses&&A.secondary_focuses.length)?", and I'm holding the rest for when you're ready":"";
  const pace=(A.readiness!=null&&A.readiness<=4)?'take this gently, one honest check-in at a time':'start moving, one small step a day';
  const timeLabel=TIME_LABEL[A.notification_schedule]||'when it helps';
  const t=[];
  t.push({t:`Okay, ${FIRST}. Here's how we start.\n\n`});
  t.push({t:`You're carrying `});t.push({t:LANE_LABEL[lane],b:true});t.push({t:`${holding}. In two weeks, you want `});t.push({t:goal,b:true});t.push({t:`.\n\n`});
  if(A.readiness!=null){t.push({t:`You're at a `});t.push({t:String(A.readiness),b:true});t.push({t:` on readiness, so we'll `});}
  else{t.push({t:`We'll `});}
  t.push({t:pace,b:true});t.push({t:`. I'll check in `});t.push({t:timeLabel,b:true});t.push({t:`.\n\n`});
  t.push({t:`First: your very first check-in. Thirty seconds, and I'll give you something back.`});
  return t;
}
function _planHTML(tokens,upto){let out='',left=(upto==null?Infinity:upto);for(const k of tokens){if(left<=0)break;const take=(upto==null)?k.t.length:Math.min(k.t.length,left);const seg=esc(k.t.slice(0,take));out+=k.b?('<b>'+seg+'</b>'):seg;left-=take;}return out;}
function _planChar(tokens,idx){let i=idx;for(const k of tokens){if(i<k.t.length)return k.t[i];i-=k.t.length;}return '';}
let _planSkip=false;
function typePlan(node,tokens,done){
  _planSkip=false;
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){node.innerHTML=_planHTML(tokens,null);if(done)done();return;}
  const total=tokens.reduce((s,k)=>s+k.t.length,0);let shown=0;
  (function tick(){
    if(_planSkip||shown>=total){node.innerHTML=_planHTML(tokens,null);if(done)done();return;}
    const ch=_planChar(tokens,shown);shown++;
    node.innerHTML=_planHTML(tokens,shown)+'<span class="tw-cursor"></span>';
    let d=20;if(ch==='.'||ch==='?'||ch==='!')d=430;else if(ch===','||ch===';'||ch===':')d=150;else if(ch==='\n')d=200;
    setTimeout(tick,d);
  })();
}
function sPreview(){
  const lane=A.focus_lane||'other';
  try{window.trackEvent&&window.trackEvent('plan_preview_shown',{lane:lane,readiness_band:A.readiness==null?'na':(A.readiness<=4?'low':A.readiness<=7?'mid':'high'),has_secondary:!!(A.secondary_focuses&&A.secondary_focuses.length)});}catch(e){}
  swap(`<div style="text-align:center;margin-bottom:22px"><div class="rsun-lg" style="width:54px;height:54px"></div><div class="section-label" style="margin:16px 0 0">Here's our start</div></div>
    <div class="tw" id="plan-tw" onclick="_planSkip=true" title="tap to skip"></div>
    <div class="actions" id="plan-actions" style="flex-direction:column;align-items:stretch;gap:10px;margin-top:26px;opacity:0;transition:opacity .7s;pointer-events:none">
      <button class="btn" onclick="finish(true)" style="width:100%">Try your first check-in now</button>
      <button class="skip" onclick="finish(false)">I'll start later</button>
    </div>`);
  setTimeout(function(){var n=document.getElementById('plan-tw');if(!n)return;typePlan(n,planTokens(),function(){var a=document.getElementById('plan-actions');if(a){a.style.opacity='1';a.style.pointerEvents='auto';}});},420);
}
async function finish(nowCheckin){
  const note=A.motivation?`In two weeks they want: ${A.motivation}`:`They just began their journey.`;
  try{await SB.from('user_profiles').upsert({id:UID,email:USER.email,onboarding_completed:true,onboarding_step:9,onboarding_version:2,onboarding_completed_at:new Date().toISOString(),last_engagement_note:note},{onConflict:'id'});}catch(e){console.warn('finish',e.message);}
  try{if(window.trackEvent){window.trackEvent('onboarding_completed',{lane:A.focus_lane||'other',secondary_count:(A.secondary_focuses||[]).length,readiness_band:A.readiness==null?'na':(A.readiness<=4?'low':A.readiness<=7?'mid':'high'),confidence_band:A.confidence==null?'na':(A.confidence<=4?'low':A.confidence<=7?'mid':'high'),note_consent:!!A.note_storage_consent,started_checkin:!!nowCheckin});window.trackFlush&&window.trackFlush();}}catch(e){}
  el().innerHTML=`<div class="build-stage"><div class="rsun-lg"></div><div class="build-msg" style="opacity:1;animation:rise .8s;margin-top:22px">Welcome home, ${esc(FIRST)}.</div></div>`;
  setTimeout(()=>{window.location.href='https://riley.meetriley.us/dashboard'+(nowCheckin?'?checkin=1':'');},1600);
}

boot();
</script>
