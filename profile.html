<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Profile — Riley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#080706;--ink2:#100e0c;--ink3:#1a1714;--ink4:#252019;
  --parchment:#f5f0e8;--warm:#faf8f4;
  --gold:#c9a84c;--gold2:#e8d5a3;--gold-dim:rgba(201,168,76,0.1);
  --amber:#d4942a;--smoke:#8a8578;--smoke2:#544f4a;--rust:#c0604a;
}
*{box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);margin:0;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 70% -10%,rgba(201,168,76,0.06),transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:34px 22px 80px}
.back{display:inline-flex;align-items:center;gap:7px;color:var(--smoke);text-decoration:none;font-size:13px;transition:color .15s}
.back:hover{color:var(--parchment)}
.head{margin:26px 0 6px;font-family:'DM Serif Display',serif;font-size:34px;line-height:1.05}
.sub{color:var(--smoke);font-size:14px;margin-bottom:30px}
.card{background:linear-gradient(180deg,rgba(26,23,20,0.7),rgba(16,14,12,0.7));border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:28px 26px}
.av-row{display:flex;align-items:center;gap:18px;margin-bottom:28px}
.av{width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--amber));display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden;position:relative}
.av img{width:100%;height:100%;object-fit:cover}
.av-actions .pill{display:inline-block;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.35);color:var(--gold2);font-size:12.5px;font-weight:600;padding:9px 15px;border-radius:22px;cursor:pointer;transition:all .15s}
.av-actions .pill:hover{background:rgba(201,168,76,0.18)}
.av-actions .hint{display:block;color:var(--smoke2);font-size:11px;margin-top:8px}
.field{margin-bottom:18px}
.field label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.field input{width:100%;background:rgba(8,7,6,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:var(--parchment);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;transition:border-color .15s}
.field input:focus{outline:none;border-color:rgba(201,168,76,0.55)}
.field .note{color:var(--smoke2);font-size:11px;margin-top:6px}
.save{width:100%;margin-top:8px;background:linear-gradient(135deg,var(--gold2),var(--gold) 55%,var(--amber));color:var(--ink);border:none;border-radius:10px;font-size:15px;font-weight:700;padding:14px;cursor:pointer;transition:transform .15s,opacity .15s}
.save:hover{transform:translateY(-1px)}
.save:disabled{opacity:0.55;cursor:default;transform:none}
.status{min-height:20px;margin-top:14px;font-size:13px;text-align:center;color:var(--gold2)}
.status.err{color:var(--rust)}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/dashboard">← Back to dashboard</a>
  <h1 class="head">Your profile</h1>
  <div class="sub">This is how Riley knows you. Update it anytime.</div>

  <div class="card">
    <div class="av-row">
      <div class="av" id="av"><span id="av-initials">?</span><img id="av-img" alt="" style="display:none"></div>
      <div class="av-actions">
        <label class="pill" for="av-file">Change photo</label>
        <input id="av-file" type="file" accept="image/*" style="display:none">
        <span class="hint">JPG or PNG, up to ~5 MB.</span>
      </div>
    </div>

    <div class="field">
      <label for="f-name">Name</label>
      <input id="f-name" type="text" autocomplete="name" placeholder="Your name">
    </div>
    <div class="field">
      <label for="f-email">Email</label>
      <input id="f-email" type="email" autocomplete="email" placeholder="you@email.com">
      <div class="note">Changing this sends a confirmation link to the new address.</div>
    </div>
    <div class="field">
      <label for="f-phone">Phone</label>
      <input id="f-phone" type="tel" autocomplete="tel" placeholder="(optional)">
    </div>

    <button class="save" id="save">Save changes</button>
    <div class="status" id="status"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB = supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
let USER=null, UID=null, pendingAvatar=null;
const $=id=>document.getElementById(id);
function status(msg,err){const s=$('status');s.textContent=msg||'';s.className='status'+(err?' err':'');}
function initials(name){return (name||'').split(' ').filter(Boolean).map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';}
function showAvatar(url,name){
  if(url){$('av-img').src=url;$('av-img').style.display='block';$('av-initials').style.display='none';}
  else{$('av-initials').textContent=initials(name);$('av-initials').style.display='block';$('av-img').style.display='none';}
}

async function load(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){location.href='https://riley.eight14.us';return;}
  USER=session.user; UID=USER.id;
  const meta=USER.user_metadata||{};
  let prof=null;
  try{const r=await SB.from('user_profiles').select('full_name,email,phone,avatar_url').eq('id',UID).maybeSingle();prof=r.data;}catch(e){}
  const fullName=(prof&&prof.full_name)||meta.full_name||meta.name||'';
  $('f-name').value=fullName;
  $('f-email').value=USER.email||(prof&&prof.email)||'';
  $('f-phone').value=(prof&&prof.phone)||'';
  showAvatar((prof&&prof.avatar_url)||meta.avatar_url||meta.picture||'', fullName);
}

$('av-file').addEventListener('change', async e=>{
  const file=e.target.files[0]; if(!file) return;
  if(file.size>6*1024*1024){status('That image is a bit large — please pick one under ~5 MB.',true);return;}
  status('Uploading photo…');
  const ext=(file.name.split('.').pop()||'png').toLowerCase().replace(/[^a-z0-9]/g,'')||'png';
  const path=UID+'/avatar.'+ext;
  const {error}=await SB.storage.from('avatars').upload(path,file,{upsert:true,contentType:file.type||'image/png'});
  if(error){status('Photo upload failed: '+error.message,true);return;}
  const {data}=SB.storage.from('avatars').getPublicUrl(path);
  pendingAvatar=data.publicUrl+'?v='+Date.now();
  showAvatar(pendingAvatar,$('f-name').value);
  status('Photo ready — hit Save to keep it.');
});

$('save').addEventListener('click', async ()=>{
  const btn=$('save'); btn.disabled=true;
  const full_name=$('f-name').value.trim();
  const phone=$('f-phone').value.trim();
  const email=$('f-email').value.trim();
  status('Saving…');
  try{
    const up={id:UID,full_name,phone,email:USER.email};
    if(pendingAvatar) up.avatar_url=pendingAvatar;
    const {error:pe}=await SB.from('user_profiles').upsert(up);
    if(pe) throw pe;
    const meta={full_name};
    if(pendingAvatar) meta.avatar_url=pendingAvatar;
    await SB.auth.updateUser({data:meta});
    let extra='';
    if(email && email.toLowerCase()!==(USER.email||'').toLowerCase()){
      const {error:ee}=await SB.auth.updateUser({email});
      if(ee) throw ee;
      extra=' Check your new inbox to confirm the email change.';
    }
    status('Saved.'+extra);
  }catch(err){
    status('Save failed: '+(err.message||err),true);
  }finally{ btn.disabled=false; }
});

load();
</script>
<script src="/pwa.js"></script>
</body>
</html>
