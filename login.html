<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0908">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meet Riley">
<title>Sign In - Meet Riley</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#06090e;font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#0a1018;border:1px solid #1a2530;border-radius:18px;padding:2.75rem 2.25rem;width:100%;max-width:380px;text-align:center}
.logo{font-family:'DM Serif Display',Georgia,serif;font-size:2.75rem;color:#c9a84c;letter-spacing:-1px;margin-bottom:4px}
.tagline{font-size:.72rem;color:#4a5a6a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:2.25rem}
.desc{font-size:.88rem;color:#4a5a6a;line-height:1.6;margin-bottom:1.75rem}
.google-btn{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:.9rem 1.25rem;background:#fff;border:none;border-radius:10px;color:#333;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.google-btn:hover{opacity:.92;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.status{font-size:.82rem;margin-top:1.25rem;min-height:1.2em;color:#4a5a6a;transition:color .2s}
.status.ok{color:#3abf6a}.status.err{color:#bf4a4a}
.note{font-size:.72rem;color:#2a3a4a;margin-top:1.5rem;line-height:1.5}
.note a{color:#c9a84c;text-decoration:none}
.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:#2a3a4a;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#1a2530}
#ml-email,#ml-first,#ml-last{width:100%;padding:.85rem 1rem;background:#06090e;border:1px solid #1a2530;border-radius:10px;color:#e8e4de;font-size:.95rem;margin-bottom:.6rem;outline:none;transition:border-color .2s}
#ml-email:focus,#ml-first:focus,#ml-last:focus{border-color:#c9a84c}
.ml-row{display:flex;gap:.6rem}.ml-row>input{flex:1}
.ml-btn{width:100%;padding:.9rem 1.25rem;background:transparent;border:1px solid #c9a84c;border-radius:10px;color:#c9a84c;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.ml-btn:hover{background:rgba(201,168,76,0.08)}
.ml-btn:disabled{opacity:.6;cursor:default}
</style>
</head>
<body>
<div class="card">
  <div class="logo">I&rsquo;m Riley<span style="color:#c9a84c">.</span></div>
  <div class="tagline">Start where you are</div>
  <div id="paid-banner" style="display:none;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.4);border-radius:8px;padding:12px 14px;margin-bottom:1rem;color:#e8e4de;font-size:.9rem;line-height:1.5">✓ Payment complete - sign in to unlock your membership.</div>
  <p class="desc">Sign in to talk with Riley, track your progress, and access your programs.</p>
  <script>try{ if(new URLSearchParams(location.search).get('paid')==='1'){ var _pb=document.getElementById('paid-banner'); if(_pb)_pb.style.display='block'; } }catch(e){}
  // Carry a "buy" intent from the marketing pricing CTAs through sign-in (same-origin sessionStorage survives the
  // Google OAuth round-trip back to this origin); dashboard.html reads it after auth and opens Stripe Checkout.
  try{ var _buy=new URLSearchParams(location.search).get('buy'); if(_buy) sessionStorage.setItem('riley_buy_intent', _buy); }catch(e){}
  // Porch Light doors (home#porch) carry a lane using the SAME Reset persona keys (griever/drinker/burnt_out) -
  // stashed through sign-in the same way as buy intent, consumed by onboarding to pre-select "what brings you here".
  try{ var _lane=new URLSearchParams(location.search).get('lane'); if(/^(griever|drinker|burnt_out|stretched|body_first)$/.test(_lane||'')) sessionStorage.setItem('riley_lane_intent', _lane); }catch(e){}</script>

  <button class="google-btn" id="btn" onclick="doSignIn()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or</span></div>

  <form id="ml-form" onsubmit="return sendMagic(event)">
    <div class="ml-row">
      <input type="text" id="ml-first" placeholder="First name" autocomplete="given-name" required aria-label="First name">
      <input type="text" id="ml-last" placeholder="Last name" autocomplete="family-name" required aria-label="Last name">
    </div>
    <input type="email" id="ml-email" placeholder="you@email.com" autocomplete="email" required aria-label="Email address">
    <button type="submit" class="ml-btn" id="ml-btn">Send me a sign-in link</button>
  </form>

  <div class="status" id="status"></div>
  <p class="note">By signing in you agree to our <a href="https://meetriley.us/terms" target="_blank">Terms</a> and <a href="https://meetriley.us/privacy" target="_blank">Privacy Policy</a>. Your conversations with Riley are private.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// Simple, direct - no async boot, no site-config dependency
var _sb = window.supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
// Origin-aware so sign-in works on whatever domain serves this page. We land the OAuth callback on
// /riley-auth.html (the onboarding chat) - NOT /dashboard - because that page tolerates the post-OAuth
// session-hydration race (it waits for the SIGNED_IN event) and routes correctly: new members straight
// into the onboarding chat, already-onboarded members onward to /dashboard. Landing on /dashboard could
// bounce a not-yet-hydrated session back to the marketing/sign-in page (the "loops back to sign-in" bug).
var DEST = (function(){ var h = window.location.hostname; var base = h.replace(/^login\./, ''); return base && base !== h ? 'https://riley.' + base + '/riley-auth.html' : 'https://riley.meetriley.us/riley-auth.html'; })();

// If already logged in, go straight to dashboard
_sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) {
    setStatus('Already signed in - taking you home…', 'ok');
    setTimeout(function(){ window.location.href = DEST; }, 500);
  }
});

// Listen for OAuth return
_sb.auth.onAuthStateChange(function(event, session) {
  if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
    // Activation funnel: on a true SIGNED_IN, distinguish a brand-new account (created in the last
    // ~2 min) → signup_completed, from a returning sign-in → signin.
    try {
      if (event === 'SIGNED_IN' && window.RileyPH && session.user) {
        var _isNew = (Date.now() - new Date(session.user.created_at).getTime()) < 120000;
        window.RileyPH.track(_isNew ? 'signup_completed' : 'signin', {
          method: (session.user.app_metadata && session.user.app_metadata.provider) || 'email'
        });
      }
    } catch (_e) {}
    setStatus('Signed in - welcome. Taking you home…', 'ok');
    setTimeout(function(){ window.location.href = DEST; }, 500);
  }
});

function doSignIn() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  try { if (window.RileyPH) window.RileyPH.track('signup_started', { method: 'google' }); } catch (_e) {}
  setStatus('Opening Google sign-in…', '');
  _sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: DEST,
      queryParams: { prompt: 'select_account' }
    }
  }).then(function(r) {
    if (r.error) {
      setStatus('Error: ' + r.error.message, 'err');
      btn.disabled = false;
    }
    // If no error, browser is already navigating to Google
  }).catch(function(e) {
    setStatus('Error: ' + e.message, 'err');
    btn.disabled = false;
  });
}

// Magic-link (passwordless) sign-in - Supabase email OTP. emailRedirectTo uses the same
// origin-aware DEST the Google flow already uses (so it's an allowed Supabase redirect URL).
// NOTE: the OTP email is sent by Supabase's default sender for now; moves to Resend/Workspace later.
function sendMagic(e) {
  e.preventDefault();
  var first = (document.getElementById('ml-first').value || '').trim();
  var last  = (document.getElementById('ml-last').value  || '').trim();
  var em    = (document.getElementById('ml-email').value || '').trim();
  if (!first || !last) { setStatus('Please enter your first and last name.', 'err'); return false; }
  if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { setStatus('Please enter a valid email.', 'err'); return false; }
  var b = document.getElementById('ml-btn');
  try { if (window.RileyPH) window.RileyPH.track('signup_started', { method: 'magic_link' }); } catch (_e) {}
  b.disabled = true; b.textContent = 'Sending…';
  // First/Last ride along as user_metadata (options.data) so auth-handler stores them and onboarding pre-fills.
  _sb.auth.signInWithOtp({ email: em, options: { emailRedirectTo: DEST, data: { first_name: first, last_name: last, full_name: (first + ' ' + last) } } })
    .then(function(r) {
      if (r.error) { setStatus('Error: ' + r.error.message, 'err'); b.disabled = false; b.textContent = 'Send me a sign-in link'; }
      else { setStatus('Check your email - we sent you a sign-in link.', 'ok'); b.textContent = 'Link sent ✓'; }
    })
    .catch(function(err) { setStatus('Error: ' + err.message, 'err'); b.disabled = false; b.textContent = 'Send me a sign-in link'; });
  return false;
}

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}
</script>
<script src="/pwa.js"></script>
<script src="/posthog.js"></script>
</body>
</html>
