<head>

<title>The 8:14 Reset - Meet Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:focus-visible{outline:2px solid #c9a84c;outline-offset:2px}  /* a11y: keyboard focus (WCAG 2.4.7) */
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--green:#3a7c56;--green2:#4aad72;--red:#8b3a3a;--smoke:#8a8578;--smoke2:#5a5450;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--ink2);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-mark{font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)}
.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:10px;color:var(--smoke);margin-top:2px}
.snl{font-family:'DM Mono',monospace;font-size:8px;color:var(--smoke2);letter-spacing:0.2em;text-transform:uppercase;padding:12px 20px 3px}
.sni{display:flex;align-items:center;gap:9px;padding:8px 20px;text-decoration:none;font-size:12px;color:var(--smoke);transition:all .15s;border-left:2px solid transparent}
.sni:hover{color:var(--parchment);background:rgba(255,255,255,0.03);border-left-color:rgba(201,168,76,0.4)}
.sni.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.sni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-spacer{flex:1}
.sb-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-name{font-size:11px;color:var(--parchment);font-weight:500}
.sb-plan{font-size:9px;color:var(--gold)}
.sb-out{margin-left:auto;background:none;border:none;color:var(--smoke2);font-size:14px;cursor:pointer}
.sb-out:hover{color:var(--red)}
.main{overflow-y:auto}
.topbar{padding:18px 28px;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment)}
.tb-sub{font-size:11px;color:var(--smoke);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.btn{display:inline-block;padding:7px 16px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:2px;transition:opacity .15s;text-decoration:none;letter-spacing:0.04em}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--parchment);border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.content{padding:32px 28px;max-width:680px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.content{padding:20px 16px}}
.sb-tier{border-top:1px solid rgba(255,255,255,0.04)}
.sb-tier-head{display:flex;align-items:center;gap:6px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.16em;transition:color .15s;user-select:none}
.sb-tier-head:hover{color:var(--smoke)}
.sb-tier-head .sb-chev{margin-left:auto;font-size:8px;transition:transform .2s}
.sb-tier-head.open .sb-chev{transform:rotate(90deg)}
.sb-tier-head.locked{color:var(--smoke2)}
.sb-tier-lock{font-size:9px;opacity:0.7}
.sb-tier-items{display:none;flex-direction:column;overflow:hidden}
.sb-tier-items.open{display:flex}
.sb-tier-items .sni.locked{opacity:0.45;cursor:pointer}
.sb-badge-soon{margin-left:auto;font-size:7px;font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:2px 5px;border-radius:8px;letter-spacing:0.06em;text-transform:uppercase}
.sb-logo-mark{display:inline-flex !important;align-items:center;font-size:26px !important;color:#fff !important;line-height:1}.sb-logo-sun{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 12px rgba(201,168,76,0.5);animation:sbSunBreathe 5s ease-in-out infinite;flex-shrink:0;margin-right:9px}@keyframes sbSunBreathe{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.06);opacity:1}}
/* reset-specific */
.dots{display:flex;gap:6px;margin-bottom:26px}
.dot{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,0.07);position:relative;overflow:hidden}
.dot.m{background:rgba(201,168,76,0.45)}
.dot.e{background:var(--gold)}
.dot.cur{box-shadow:0 0 0 1px var(--gold)}
.rcard{background:var(--ink2);border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:22px 24px;margin-bottom:16px}
.rlabel{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px}
.rq{font-size:15px;color:var(--parchment);line-height:1.7;font-style:italic}
.rin{width:100%;min-height:74px;background:var(--ink3);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:11px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--parchment);outline:none;resize:vertical;line-height:1.6;margin-top:12px}
.rin:focus{border-color:rgba(201,168,76,0.4)}
.timer{font-family:'DM Mono',monospace;font-size:34px;color:var(--gold);letter-spacing:0.04em}
.riley-line{display:flex;gap:11px;align-items:flex-start;padding:15px 18px;background:linear-gradient(135deg,rgba(201,168,76,0.07),rgba(20,18,16,0.4));border:1px solid rgba(201,168,76,0.15);border-radius:6px;margin-bottom:22px}
.done-tag{display:inline-flex;align-items:center;gap:7px;color:var(--green2);font-size:12.5px;font-weight:500}
/* Week One Letter takeover (Doc 4 §8) - a letter, not a card stack; quiet fade, no confetti */
#wol{position:fixed;inset:0;z-index:9999;background:var(--ink);overflow-y:auto;opacity:0;transition:opacity 1.6s ease}
#wol.show{opacity:1}
.wol-inner{max-width:640px;width:100%;margin:0 auto;padding:70px 30px 130px;display:flex;flex-direction:column}
.wol-sun{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 26px rgba(201,168,76,0.5);margin:0 auto 46px;flex-shrink:0;animation:sbSunBreathe 5s ease-in-out infinite}
.wol-loading{text-align:center;color:var(--smoke2);font-family:'DM Mono',monospace;font-size:19px;letter-spacing:0.32em}
.wol-letter{opacity:0;transition:opacity 1.8s ease}
.wol-letter.show{opacity:1}
.wol-body{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.95;color:var(--parchment);white-space:pre-wrap;letter-spacing:0.008em}
.wol-ps{font-family:'DM Serif Display',serif;font-style:italic;font-size:14.5px;line-height:1.75;color:var(--gold);margin-top:32px;padding-top:22px;border-top:1px solid rgba(201,168,76,0.16);white-space:pre-wrap}
.wol-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:50px}
.wol-note{text-align:center;font-size:12px;color:var(--smoke);margin-top:18px;min-height:15px;font-family:'DM Mono',monospace}
.wol-x{position:fixed;top:18px;right:22px;background:none;border:none;color:var(--smoke2);font-size:24px;line-height:1;cursor:pointer;z-index:10000;transition:color .15s}
.wol-x:hover{color:var(--parchment)}
@media(max-width:700px){.wol-inner{padding:56px 20px 110px}.wol-body{font-size:17px}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark"><span class="sb-logo-sun"></span>Riley<span>.</span></div></div>
  <a href="/chat" class="sni"><span class="sni-icon">💬</span>Talk to Riley</a>
  <div id="sb-tiers"></div>
  <div class="sb-spacer"></div>
  <div class="sb-user"><div class="sb-av" id="sb-av">?</div><div><div class="sb-name" id="sb-name">…</div><div class="sb-plan" id="sb-plan">Live With Purpose.</div></div><button class="sb-out" onclick="doSignOut()" title="Sign out">↪</button></div>

<main class="main">
  <div class="topbar">
    <div><div class="tb-title">The 8:14 Reset</div><div class="tb-sub" id="tb-sub">Seven days. 8:14 a day.</div></div>
    <a href="/dashboard" class="btn btn-ghost">← Today</a>
  </div>
  <div class="content" id="content"><div style="color:var(--smoke);font-size:13px">Loading your reset…</div></div>

  <!-- The Cardinal (founder, 2026-07-23) - rides along under every Reset day -->
  <style>
  .cardinal-band{display:flex;align-items:center;gap:34px;max-width:640px;margin:56px auto 0;flex-wrap:wrap;justify-content:center;text-align:left;padding-top:44px;border-top:1px solid rgba(255,255,255,0.07)}
  .cardinal-band img{width:104px;height:auto;flex-shrink:0}

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB=supabase.createClient('https://tglljvjixlolaguycvbb.supabase.co','sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8');
const RESET_URL='/.netlify/functions/reset-day';
let USER=null,UID=null,TOK=null,DAY=1,DATA=null,PROG={};
// "The Heart of It" deep reflections - re-homed from onboarding v2 to the Reset
// evenings, one per night, Days 2-6 (D6 absorbs the one-year vision). Saved to
// riley_memory so Riley references them later. This overrides only the DISPLAYED
// evening prompt; the reset_days DB content stays intact (fully reversible).
const DEEP_Q={
  2:"What gives you energy? The people, places, or moments that fill you up.",
  3:"And what drains you? No judgment - just honesty.",
  4:"What are you most proud of? It can be big or quiet - both count.",
  5:"What's one thing you'd like to change? The thing you think about when it's quiet.",
  6:"What's one dream you've never given up on? The one that's still there, underneath everything."
};
const DEEP_LABEL={2:'What gives them energy',3:'What drains them',4:'What they are most proud of',5:'What they want to change',6:'A dream they have never given up on'};
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function boot(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){window.location.href='https://riley.meetriley.us';return;}
  USER=session.user;UID=USER.id;TOK=session.access_token;
  const meta=USER.user_metadata||{};
  const fullName=meta.full_name||meta.name||USER.email.split('@')[0]||'Member';
  const avatarUrl=meta.avatar_url||meta.picture||'';
  const initials=fullName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
  const av=document.getElementById('sb-av');if(av){if(avatarUrl)av.innerHTML=`<img src="${avatarUrl}" alt="${initials}">`;else av.textContent=initials;}
  document.getElementById('sb-name').textContent=fullName;
  await load();
  // Reread from Journeys (/reset?letter=1) opens the stored letter without re-granting the weekend.
  if(new URLSearchParams(location.search).get('letter')==='1') openWeekOneLetter('reread');
  else maybeShowLetterOnLoad();
}

function currentDay(prog){
  // The next day whose ACTION isn't done yet (action completes a day); cap at 7.
  for(let d=1;d<=7;d++){ if(!prog[d]||!prog[d].morning_done_at) return d; }
  return 7;
}

async function fetchDay(day){
  const r=await fetch(RESET_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'day',day,token:TOK})});
  return r.ok?await r.json():null;
}

async function load(){
  // one call for progress + content of the current day
  let d=await fetchDay(1);
  if(!d){document.getElementById('content').innerHTML='<div style="color:var(--smoke);font-size:13px">Your reset is being prepared. Check back in a moment.</div>';return;}
  (d.progress||[]).forEach(p=>{PROG[p.day_number]=p;});
  DAY=currentDay(PROG);
  DATA=DAY===1?d:await fetchDay(DAY);
  if(DATA){(DATA.progress||[]).forEach(p=>{PROG[p.day_number]=p;});}
  render();
}

function dots(){
  let h='<div class="dots">';
  for(let i=1;i<=7;i++){const p=PROG[i]||{};const c=p.evening_done_at?'e':(p.morning_done_at?'m':'');h+=`<div class="dot ${c}${i===DAY?' cur':''}" title="Day ${i}"></div>`;}
  return h+'</div>';
}

function render(){
  const day=DATA.day, v=DATA.variants||{}, p=PROG[DAY]||{};
  const personas=DATA.personas||[];
  document.getElementById('tb-sub').textContent='DAY '+DAY+' OF 7 · '+day.theme.toUpperCase();
  const morningDone=!!p.morning_done_at, eveningDone=!!p.evening_done_at;
  const actionText = v.action ? v.action : day.action_body;   // persona voice wins if we have it
  const isDay1=DAY===1, isDay7=DAY===7;

  let html = pushCard() + dots();

  // Riley's framing line
  html += `<div class="riley-line"><span style="font-size:19px;flex-shrink:0">💛</span><div><div style="font-size:9px;font-family:'DM Mono',monospace;color:var(--gold);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px">Riley</div><div style="font-size:14px;color:var(--parchment);line-height:1.65;font-style:italic">${esc(DATA.memory_opener || day.theme_line || '')}</div></div></div>`;

  html += `<div style="font-family:'DM Serif Display',serif;font-size:30px;color:var(--parchment);margin-bottom:6px">${esc(day.theme)}</div>`;
  html += `<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--smoke);letter-spacing:0.06em;margin-bottom:26px">MORNING ACTION &nbsp;·&nbsp; EVENING CLOSE &nbsp;·&nbsp; 8:14 A DAY</div>`;

  // ── MORNING ──
  html += `<div class="rcard"><div class="rlabel" style="color:var(--gold)">☀️ Morning - the check-in</div><div class="rq">${esc(isDay7 && DATA.day1_sentence ? day.morning_checkin.replace('the heaviest thing you were carrying','“'+DATA.day1_sentence+'”') : day.morning_checkin)}</div>`;
  if(isDay1 && !morningDone){
    html += `<textarea class="rin" id="checkin" placeholder="One honest sentence. Just name it."></textarea>`;
  } else if(!morningDone){
    html += `<textarea class="rin" id="checkin" placeholder="A sentence, if you want. Optional."></textarea>`;
  }
  html += `</div>`;

  // The One Thing
  html += `<div class="rcard"><div class="rlabel" style="color:var(--gold)">${esc(day.action_title||'The One Thing')} &nbsp;·&nbsp; ~5 min</div>`;
  if(v.action) html += `<div style="font-size:13.5px;color:var(--gold-light,#e8d5a3);font-style:italic;margin-bottom:10px;opacity:.95">${esc(v.action)}</div>`;
  html += `<div style="font-size:15px;color:var(--parchment);line-height:1.7">${esc(v.action?day.action_body:day.action_body)}</div>`;
  if(v.fuel) html += `<div style="font-size:13px;color:var(--smoke);line-height:1.6;margin-top:10px">${esc(v.fuel)}</div>`;
  // 8:14 timer
  html += `<div style="display:flex;align-items:center;gap:16px;margin-top:16px"><span class="timer" id="timer">8:14</span><button class="btn btn-ghost" id="timer-btn" onclick="toggleTimer()">Start the 8:14</button></div>`;
  html += `<div style="margin-top:18px" id="m-area">`;
  html += morningDone
    ? `<div class="done-tag"><span>✓</span> Action done. That's the day. The evening close is a bonus.</div>`
    : `<button class="btn btn-gold" style="padding:10px 24px" onclick="markMorning()">I did the action →</button>`;
  html += `</div></div>`;

  // ── EVENING ──
  html += `<div class="rcard" style="${morningDone?'':'opacity:.7'}"><div class="rlabel" style="color:var(--smoke)">🌙 Evening - the close &nbsp;·&nbsp; ~2 min</div>`;
  html += `<div class="rq" style="font-size:14px">${esc(DEEP_Q[DAY]||day.evening_reflection)}</div>`;
  html += `<textarea class="rin" id="evening" placeholder="One line to Riley." ${eveningDone?'disabled':''}>${eveningDone?'(closed)':''}</textarea>`;
  if(day.fuel_setup) html += `<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06)"><div class="rlabel" style="color:var(--smoke2)">🍃 Fuel - set up tomorrow</div><div style="font-size:13.5px;color:var(--parchment);line-height:1.6">${esc(day.fuel_setup)}</div></div>`;
  html += `<div style="margin-top:16px" id="e-area">`;
  html += eveningDone
    ? `<div class="done-tag"><span>✓</span> Day ${DAY} closed. ${DAY<7?'Tomorrow is Day '+(DAY+1)+'.':'You reached Day 7.'}</div>`
    : `<button class="btn ${morningDone?'btn-gold':'btn-ghost'}" style="padding:10px 24px" onclick="markEvening()">Close the day →</button>`;
  html += `</div></div>`;

  // Day 7 handoff (after the action)
  if(isDay7 && morningDone){
    html += `<div class="rcard" style="border-color:rgba(201,168,76,0.3)"><div class="rlabel" style="color:var(--gold)">The handoff</div><div style="font-size:14.5px;color:var(--parchment);line-height:1.75">You showed up for seven days. Companion - this - stays free and never expires. If you want me checking on you, or here every day without limits, that's what Coach is. No pressure, and no wrong answer.</div><div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap"><a href="/programs" class="btn btn-gold" style="padding:10px 20px">See what's next →</a><a href="/dashboard" class="btn btn-ghost" style="padding:10px 20px">Stay right here</a></div></div>`;
  }

  document.getElementById('content').innerHTML=html;
}

// ── 8:14 countdown ──
let tInt=null,tLeft=494;
function toggleTimer(){
  const btn=document.getElementById('timer-btn'),el=document.getElementById('timer');
  if(tInt){clearInterval(tInt);tInt=null;btn.textContent='Resume';return;}
  btn.textContent='Pause';
  tInt=setInterval(()=>{
    tLeft--; if(tLeft<=0){tLeft=0;clearInterval(tInt);tInt=null;btn.textContent='Done ✓';}
    el.textContent=Math.floor(tLeft/60)+':'+String(tLeft%60).padStart(2,'0');
  },1000);
}

async function markMorning(){
  const btn=event.target;btn.disabled=true;btn.textContent='Saving…';
  const checkin=document.getElementById('checkin')?.value?.trim();
  try{
    if(DAY===1 && checkin){ // Day-1 enrollment: capture their words + classify persona
      await fetch(RESET_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'enroll',day1_sentence:checkin,token:TOK})});
    }

async function saveLetterImage(){

    canvas.width=W; canvas.height=Math.round(H);

    const sx=W/2, sy=topPad-30, sr=26; const g=ctx.createRadialGradient(sx-8,sy-8,3,sx,sy,sr); g.addColorStop(0,'#e8d5a3'); g.addColorStop(.55,'#c9a84c'); g.addColorStop(1,'#a8842f'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2); ctx.fill();
    let y=topPad+sunGap; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    bl.forEach(function(l){ if(l.t){ctx.font=bodyFont;ctx.fillStyle='#f5f0e8';ctx.fillText(l.t,pad,y);} y+=l.lh; });
    y+=midGap-40; ctx.strokeStyle='rgba(201,168,76,0.28)'; ctx.beginPath(); ctx.moveTo(pad,y-20); ctx.lineTo(pad+120,y-20); ctx.stroke();
    pl.forEach(function(l){ if(l.t){ctx.font=psFont;ctx.fillStyle='#c9a84c';ctx.fillText(l.t,pad,y);} y+=l.lh; });

  }catch(e){

// ── Web-push opt-in (program-scoped: "Want me to nudge you?") ──
function pushSupported(){return('Notification'in window)&&('serviceWorker'in navigator)&&('PushManager'in window);}
function urlB64ToU8(base64){const pad='='.repeat((4-base64.length%4)%4);const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');const raw=atob(b);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
function pushCard(){
  if(!pushSupported()||localStorage.getItem('riley_reset_push'))return'';
  return `<div class="rcard" id="push-card" style="border-color:rgba(201,168,76,0.25)">
    <div class="rlabel" style="color:var(--gold)">🔔 Want me to nudge you?</div>
    <div id="push-msg" style="font-size:14px;color:var(--parchment);line-height:1.65">I can send two short notifications a day while you're doing the Reset - one in the morning to start, one at night to close. Just for these 7 days, then they stop on their own. You can turn them off anytime.</div>
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-gold" style="padding:9px 18px" onclick="enablePush()">Yes, nudge me</button>
      <button class="btn btn-ghost" style="padding:9px 18px" onclick="declinePush()">No thanks - I'll come to you</button>
    </div></div>`;
}
async function enablePush(){
  const msg=document.getElementById('push-msg'); if(msg)msg.textContent='Setting up…';
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){dismissPush('later');return;}
    const reg=await navigator.serviceWorker.ready;
    const {publicKey}=await(await fetch('/.netlify/functions/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'key'})})).json();
    if(!publicKey)throw new Error('no key');
    const wantKey=urlB64ToU8(publicKey);
    let sub=await reg.pushManager.getSubscription();
    // A subscription bound to a different VAPID key can never receive our pushes - drop it and
    // re-subscribe with the current key (self-healing after a key change / DB move).
    if(sub){try{const cur=sub.options&&sub.options.applicationServerKey;let same=!!cur;if(cur){const a=new Uint8Array(cur);same=a.length===wantKey.length;for(let i=0;same&&i<a.length;i++)same=a[i]===wantKey[i];}if(!same){try{await sub.unsubscribe();}catch(e){}sub=null;}}catch(e){sub=null;}}
    if(!sub)sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:wantKey});
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'America/Denver';
    await fetch('/.netlify/functions/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'subscribe',token:TOK,subscription:sub,tz})});
    localStorage.setItem('riley_reset_push','on');dismissPush('on');
  }catch(e){dismissPush('later');}
}
async function declinePush(){
  try{await fetch('/.netlify/functions/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'decline',token:TOK})});}catch(e){}
  localStorage.setItem('riley_reset_push','off');dismissPush('off');
}
function dismissPush(state){
  const card=document.getElementById('push-card'); if(!card)return;
  if(state==='on'){card.innerHTML='<div class="done-tag" style="padding:4px 0;flex-wrap:wrap;gap:6px"><span>✓</span> I\'ll send two short nudges a day - morning and night. <a href="#" onclick="sendTest(event)" style="color:var(--gold)">Send a test now →</a></div>';}
  else card.remove();
}
async function sendTest(e){
  if(e)e.preventDefault();
  const tag=document.querySelector('#push-card .done-tag');
  try{
    const r=await fetch('/.netlify/functions/push-subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'test',token:TOK})});
    if(tag)tag.innerHTML = r.ok ? '<span>✓</span> Test sent - check your notifications.' : '<span>⚠</span> Couldn\'t send just now - give it a moment after deploy.';
  }catch(err){}
}
async function doSignOut(){await SB.auth.signOut();window.location.href='https://riley.meetriley.us';}
boot();
</script>

      const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,token:(await SB.auth.getSession()).data.session?.access_token||null})});

    const path=location.pathname.replace(/\/$/,'')||'/dashboard';
    const base=it.href.split('?')[0].replace(/\/$/,'');

    const cls='sni'+(isActive?' active':'')+(locked?' locked':'');

  }
  function renderSidebar(ent){
    const mount=document.getElementById('sb-tiers');
    if(!mount)return;
    // v2.3 C: flat nav render (no tier sections). navItem renders an .sni link with active state.
    mount.innerHTML=NAV.map(it=>navItem(it,false)).join('');

})();
