[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,riley-auth.html,riley-chat.js,dashboard.html,dashboard-auth.js,dashboard.css,conversations.html,tracker.html,programs.html,brief.html,workouts.html,nutrition.html,progress.html,sleep.html,finance.html,calendar.html,chat.html,login.html,community.html,journey.html,onboarding.html,lifemap.html,profile.html,settings.html,reset.html,home.html,program.html,int-program.html,clarity-setup.html,clarity-method.html"
  # OPERATOR_KEY is an operator-chosen password; we never hardcode it, so scanning
  # the build for its value only false-positives (and fails the build) when the
  # chosen password happens to match a common word in the code.
  # SUPABASE_ANON_KEY is the PUBLIC publishable key (sb_publishable_…). It is designed
  # to ship to the browser (RLS protects all data), and several client pages embed it
  # directly. Marking it here means we don't have to chase every page into OMIT_PATHS
  # (which is what broke the build when library.html was added without being listed).
  # SAFETY_ALERT_EMAIL (brenden@meetriley.us) and VAPID_SUBJECT (mailto:hello@meetriley.us)
  # are non-secret @meetriley.us contact/routing addresses, NOT credentials. They belong in
  # code as From/Reply-To headers, the safety-alert recipient, and the web-push contact
  # fallback. The scanner only started flagging them once each was defined as a Netlify env
  # var (VAPID_SUBJECT was just added) and its literal value appeared in a committed file.
  SECRETS_SCAN_OMIT_KEYS = "OPERATOR_KEY,SUPABASE_ANON_KEY,SUPABASE_URL,SAFETY_ALERT_EMAIL,VAPID_SUBJECT"

[functions]
  directory = "netlify/functions"
  # Keep the @napi-rs/canvas native binary external (ship the prebuilt .node rather
  # than inline it). Top-level so every function that reaches the renderer gets it -
  # content-design AND content-queue (which calls renderBrief in-process). Harmless
  # for functions that don't use it. The grounds/fonts (included_files) are scoped
  # to ONLY the two rendering functions below (25MB - never copy it into all ~85 bundles).
  external_node_modules = ["@napi-rs/canvas"]

# Grounds render engine: reads the locked kit off disk (grounds + DM fonts + nav
# lockups); /brand/* is force-404'd for the public site only. Needs render+upload budget.
[functions."content-design"]
  timeout = 26
  included_files = [
    "brand/template-kit/grounds/**",
    "brand/template-kit/fonts/**",
    "brand/template-kit/riley-nav-logo.png",
    "brand/template-kit/riley-nav-ink.png"
  ]

