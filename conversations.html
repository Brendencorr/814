<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversations — Riley · The 8:14 Project</title>
  <link rel="stylesheet" href="/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dashboard-auth.js"></script>
  <style>
    .conv-list { display: flex; flex-direction: column; gap: 0; }

    .conv-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--mist);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
      align-items: start;
    }
    .conv-item:hover { background: var(--warm-white); }
    .conv-item:last-child { border-bottom: none; }

    .conv-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .conv-preview {
      font-size: 12px;
      color: var(--smoke);
      line-height: 1.5;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .conv-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .conv-date-col {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--smoke);
      text-align: right;
      white-space: nowrap;
      line-height: 1.6;
    }

    .conv-resume-btn {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* Filters */
    .filter-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      background: white;
      border: 1px solid var(--mist);
      border-radius: 1px;
      cursor: pointer;
      color: var(--smoke);
      transition: border-color 0.12s, color 0.12s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--ink);
    }

    .search-input {
      flex: 1;
      max-width: 280px;
      padding: 7px 12px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--mist);
      border-radius: 1px;
      background: white;
      color: var(--ink);
      outline: none;
    }
    .search-input:focus { border-color: var(--gold); }

    /* Month grouping */
    .month-group { margin-bottom: 24px; }
    .month-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--smoke);
      padding: 0 0 8px;
      border-bottom: 1px solid var(--mist);
      margin-bottom: 0;
    }

    /* Detail panel (slide-in) */
    .detail-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,14,13,0.5);
      z-index: 100;
      display: none;
      align-items: stretch;
      justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }

    .detail-panel {
      width: min(600px, 100vw);
      background: white;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--mist);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      background: white;
      z-index: 1;
    }

    .detail-close {
      font-size: 20px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--smoke);
      line-height: 1;
      padding: 4px;
      flex-shrink: 0;
    }

    .detail-body { padding: 24px; flex: 1; }

    .message-bubble {
      margin-bottom: 16px;
      max-width: 85%;
    }
    .message-bubble.user { margin-left: auto; }

    .bubble-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      color: var(--smoke);
      letter-spacing: 0.08em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }
    .message-bubble.user .bubble-label { text-align: right; }

    .bubble-content {
      padding: 12px 16px;
      border-radius: 2px;
      font-size: 13px;
      line-height: 1.6;
    }
    .message-bubble.riley .bubble-content { background: var(--warm-white); border: 1px solid var(--mist); color: var(--ink); }
    .message-bubble.user  .bubble-content { background: var(--ink); color: var(--parchment); }

    .detail-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--mist);
      background: white;
      position: sticky;
      bottom: 0;
    }
  </style>
</head>
<body>

<div class="dash-layout">
  <div id="sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-title">Conversations</div>
        <div class="topbar-sub" id="conv-count">Loading…</div>
      </div>
      <a href="https://riley.eight14.us" class="btn btn-gold">New Conversation →</a>
    </div>

    <div class="dash-content">

      <!-- Filter bar -->
      <div class="filter-bar" style="margin-bottom:20px">
        <input type="text" class="search-input" id="search-input" placeholder="Search conversations…" oninput="filterConversations()">
        <button class="filter-btn active" data-tag="all" onclick="setTagFilter('all',this)">All</button>
        <button class="filter-btn" data-tag="mindset" onclick="setTagFilter('mindset',this)">🧠 Mindset</button>
        <button class="filter-btn" data-tag="grief" onclick="setTagFilter('grief',this)">💙 Grief</button>
        <button class="filter-btn" data-tag="strategy" onclick="setTagFilter('strategy',this)">🎯 Strategy</button>
        <button class="filter-btn" data-tag="speaking" onclick="setTagFilter('speaking',this)">🎤 Speaking</button>
      </div>

      <div id="conversations-list">
        <div class="loading-wrap"><div class="spinner"></div> Loading conversations…</div>
      </div>

    </div>
  </main>
</div>

<!-- Detail slide-in panel -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-panel" id="detail-panel">
    <div class="detail-header">
      <div>
        <div id="detail-title" style="font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink);margin-bottom:4px"></div>
        <div id="detail-date" style="font-size:12px;color:var(--smoke)"></div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detail-body">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
    <div class="detail-footer">
      <a id="detail-resume-btn" href="#" class="btn btn-gold" style="width:100%;justify-content:center">Resume This Conversation →</a>
    </div>
  </div>
</div>

<script>
let allConversations = [];
let activeTag = 'all';

(async () => {
  const ctx = await initDashboard();
  if (!ctx) return;
  const { user, client } = ctx;

  document.getElementById('sidebar-mount').innerHTML = renderSidebar('conversations', user);

  // Check URL for a specific conversation to open
  const params = new URLSearchParams(window.location.search);
  const openId = params.get('id');

  // Load all conversations
  const { data, error } = await client
    .from('riley_conversations')
    .select('id, title, preview, created_at, updated_at, tags, messages')
    .eq('user_id', user.id)
    .order('updated_at', { ascending: false });

  if (error) {
    document.getElementById('conversations-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div class="empty-state-title">Couldn't load conversations</div>
        <div class="empty-state-sub">${escHtml(error.message)}</div>
      </div>`;
    return;
  }

  allConversations = data || [];
  document.getElementById('conv-count').textContent =
    `${allConversations.length} conversation${allConversations.length !== 1 ? 's' : ''} with Riley`;

  renderList(allConversations);

  // Auto-open if ?id= was in URL
  if (openId) {
    const conv = allConversations.find(c => c.id === openId);
    if (conv) openDetail(conv);
  }

  // Make functions available
  window._client = client;
  window._userId = user.id;
})();

function renderList(convs) {
  const el = document.getElementById('conversations-list');

  if (convs.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-title">No conversations found</div>
        <div class="empty-state-sub">Start a session with Riley and it'll appear here.</div>
        <div style="margin-top:16px"><a href="https://riley.eight14.us" class="btn btn-dark">Talk to Riley</a></div>
      </div>`;
    return;
  }

  // Group by month
  const groups = {};
  for (const c of convs) {
    const d = new Date(c.updated_at);
    const key = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  }

  el.innerHTML = Object.entries(groups).map(([month, list]) => `
    <div class="month-group">
      <div class="month-label">${month}</div>
      <div class="card conv-list">
        ${list.map(c => `
          <a class="conv-item" onclick="openDetail(${JSON.stringify(c).replace(/"/g,'&quot;')}); return false;" href="#">
            <div>
              <div class="conv-title">${escHtml(c.title || 'Riley Session')}</div>
              ${c.preview ? `<div class="conv-preview">${escHtml(c.preview)}</div>` : ''}
              <div class="conv-meta">
                ${(c.tags || []).slice(0,3).map(t => `<span class="tag tag-gold">${escHtml(t)}</span>`).join('')}
              </div>
            </div>
            <div class="conv-date-col">
              ${formatDate(c.updated_at)}<br>${formatTime(c.updated_at)}
              <div class="conv-resume-btn">Resume →</div>
            </div>
          </a>`).join('')}
      </div>
    </div>`).join('');
}

function filterConversations() {
  const query = document.getElementById('search-input').value.toLowerCase();
  let filtered = allConversations;

  if (activeTag !== 'all') {
    filtered = filtered.filter(c => (c.tags || []).includes(activeTag));
  }

  if (query) {
    filtered = filtered.filter(c =>
      (c.title || '').toLowerCase().includes(query) ||
      (c.preview || '').toLowerCase().includes(query) ||
      (c.tags || []).some(t => t.toLowerCase().includes(query))
    );
  }

  renderList(filtered);
}

function setTagFilter(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterConversations();
}

function openDetail(conv) {
  document.getElementById('detail-title').textContent = conv.title || 'Riley Session';
  document.getElementById('detail-date').textContent =
    `${formatDate(conv.updated_at)} · ${formatTime(conv.updated_at)}`;
  document.getElementById('detail-resume-btn').href =
    `https://riley.eight14.us?resume=${conv.id}`;

  // Render messages
  const messages = conv.messages || [];
  const bodyEl = document.getElementById('detail-body');

  if (messages.length === 0) {
    bodyEl.innerHTML = `<div class="empty-state"><div class="empty-state-sub">No messages recorded for this session.</div></div>`;
  } else {
    bodyEl.innerHTML = messages
      .filter(m => m.role !== 'system')
      .map(m => {
        const isUser = m.role === 'user';
        const content = typeof m.content === 'string' ? m.content :
          (Array.isArray(m.content) ? m.content.map(b => b.text || '').join('') : '');
        return `
          <div class="message-bubble ${isUser ? 'user' : 'riley'}">
            <div class="bubble-label">${isUser ? 'You' : 'Riley'}</div>
            <div class="bubble-content">${escHtml(content)}</div>
          </div>`;
      }).join('');
  }

  document.getElementById('detail-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail(event) {
  if (event && event.target !== document.getElementById('detail-overlay')) return;
  document.getElementById('detail-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
