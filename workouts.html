<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0908">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riley">
<title>Movement - Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--warm:#faf8f4;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--green:#3a7c56;--green2:#4aad72;--red:#8b3a3a;--mist:rgba(255,255,255,0.06);--smoke:#8a8578;--smoke2:#5a5450;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--ink2);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-mark{font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)}
.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:10px;color:var(--smoke);margin-top:2px}
.snl{font-family:'DM Mono',monospace;font-size:8px;color:var(--smoke2);letter-spacing:0.2em;text-transform:uppercase;padding:12px 20px 3px}
.sni{display:flex;align-items:center;gap:9px;padding:8px 20px;text-decoration:none;font-size:12px;color:var(--smoke);transition:all .15s;border-left:2px solid transparent}
.sni:hover{color:var(--parchment);background:rgba(255,255,255,0.03);border-left-color:rgba(201,168,76,0.4)}
.sni.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.sni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-spacer{flex:1}
.sb-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-name{font-size:11px;color:var(--parchment);font-weight:500}
.sb-plan{font-size:9px;color:var(--gold)}
.sb-out{margin-left:auto;background:none;border:none;color:var(--smoke2);font-size:14px;cursor:pointer}
.sb-out:hover{color:var(--red)}
.main{overflow-y:auto}
.topbar{padding:18px 28px;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment)}
.tb-sub{font-size:11px;color:var(--smoke);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.tb-actions{display:flex;gap:8px}
.btn{display:inline-block;padding:7px 16px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:2px;transition:opacity .15s;text-decoration:none;letter-spacing:0.04em}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--parchment);border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.content{padding:24px 28px}
.card{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:22px;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--smoke);margin-bottom:18px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.12em}
.field input,.field select,.field textarea{background:var(--ink3);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--parchment);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:var(--smoke2)}
.field select option{background:var(--ink3)}
.field textarea{resize:vertical;min-height:72px}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px}
.alert{padding:10px 14px;border-radius:2px;font-size:12px;margin-top:10px;display:none;border:1px solid;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.alert-ok{background:rgba(74,173,114,0.1);color:var(--green2);border-color:rgba(74,173,114,0.25)}
.alert-err{background:rgba(139,58,58,0.1);color:#e07070;border-color:rgba(139,58,58,0.25)}
.divider{border-top:1px solid rgba(255,255,255,0.06);margin:18px 0;padding-top:18px}
.mini-head{font-size:11px;font-weight:600;color:var(--parchment);margin-bottom:12px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:16px}
.sv{font-family:'DM Serif Display',serif;font-size:28px;color:var(--parchment);line-height:1;margin-bottom:4px}
.sl{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.1em}
.log-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;margin-top:12px}
.log-row{background:var(--ink2);padding:11px 16px;display:flex;align-items:center;gap:12px;transition:background .12s}
.log-row:hover{background:var(--ink3)}
.log-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:12px;font-weight:500;color:var(--parchment)}
.log-detail{font-size:11px;color:var(--smoke);margin-top:2px}
.log-date{font-size:10px;color:var(--smoke2);font-family:'DM Mono',monospace;white-space:nowrap}
.pbar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.pbf{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.pbf.g{background:var(--green2)}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
.tag{display:inline-block;font-size:8px;background:var(--gold-dim);color:var(--gold);padding:2px 5px;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;margin-right:3px;border-radius:1px}
.empty{padding:20px;text-align:center;color:var(--smoke);font-size:12px;line-height:1.7}
.empty a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
@media(max-width:900px){.stat-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}}

.sb-tier{border-top:1px solid rgba(255,255,255,0.04)}
.sb-tier-head{display:flex;align-items:center;gap:6px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.16em;transition:color .15s;user-select:none}
.sb-tier-head:hover{color:var(--smoke)}
.sb-tier-head .sb-chev{margin-left:auto;font-size:8px;transition:transform .2s}
.sb-tier-head.open .sb-chev{transform:rotate(90deg)}
.sb-tier-head.locked{color:var(--smoke2)}
.sb-tier-lock{font-size:9px;opacity:0.7}
.sb-tier-items{display:none;flex-direction:column;overflow:hidden}
.sb-tier-items.open{display:flex}
.sb-tier-items .sni.locked{opacity:0.45;cursor:pointer}
.sb-badge-soon{margin-left:auto;font-size:7px;font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:2px 5px;border-radius:8px;letter-spacing:0.06em;text-transform:uppercase}
.sb-logo-mark{display:inline-flex !important;align-items:center;font-size:26px !important;color:#fff !important;line-height:1}.sb-logo-sun{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 12px rgba(201,168,76,0.5);animation:sbSunBreathe 5s ease-in-out infinite;flex-shrink:0;margin-right:9px}@keyframes sbSunBreathe{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.06);opacity:1}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark"><span class="sb-logo-sun"></span>Riley<span>.</span></div></div>
  <a href="/dashboard" class="sni"><span class="sni-icon">🌅</span>Today</a>
  <div id="sb-tiers"></div>
  <div class="sb-spacer"></div>
  <div class="sb-user"><div class="sb-av" id="sb-av">?</div><div><div class="sb-name" id="sb-name">…</div><div class="sb-plan" id="sb-plan">Live With Purpose.</div></div><button class="sb-out" onclick="doSignOut()" title="Sign out">↪</button></div>
</aside>
<main class="main">
<div class="topbar">
  <div><div class="tb-title" id="tb-greeting">Workouts</div><div class="tb-sub" id="tb-date"></div></div>
  
</div>
<div class="content">

<div id="plan-slot" style="margin-bottom:18px"></div>
<div class="stat-row">
  <div class="stat"><div class="sv" id="wk-cnt">-</div><div class="sl">This Week</div></div>
  <div class="stat"><div class="sv" id="wk-min">-</div><div class="sl">Minutes</div></div>
  <div class="stat"><div class="sv" id="wk-mi">-</div><div class="sl">Miles</div></div>
  <div class="stat"><div class="sv" id="wk-str">-</div><div class="sl">Day Streak</div></div>
</div>
<div class="card">
  <div class="card-title">Log a Workout</div>
  <div class="card-sub">Every workout updates Riley's context for tomorrow's brief.</div>
  <div class="fr">
    <div class="field"><label>Activity</label><select id="w-type"><option>Run</option><option>Lift</option><option>Bike</option><option>Walk</option><option>Swim</option><option>HIIT</option><option>Yoga</option><option>Recovery</option><option>Other</option></select></div>
    <div class="field"><label>Date</label><input type="date" id="w-date"></div>
    <div class="field"><label>Duration (min)</label><input type="number" id="w-dur" placeholder="45" min="1"></div>
    <div class="field"><label>Distance (mi)</label><input type="number" id="w-dist" placeholder="3.1" step="0.01"></div>
  </div>
  <div class="field"><label>Notes</label><textarea id="w-notes" rows="2" placeholder="How did it feel? PRs? Energy level?"></textarea></div>
  <button class="btn btn-gold" id="w-btn" onclick="logWorkout()">Log Workout</button>
  <div class="alert" id="w-alert"></div>
</div>
<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.14em;margin-bottom:10px">Recent Workouts</div>
<div id="w-hist"></div>

</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>

const SB = supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
let USER=null,UID=null,TODAY=new Date(Date.now()-4*3600*1000).toLocaleDateString('en-CA');

function A(id,msg,ok){
  const el=document.getElementById(id);if(!el){console.log(ok?'OK':'ERR',msg);return;}
  el.textContent=msg;el.className='alert '+(ok?'alert-ok':'alert-err');el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',5000);
}
function setBtn(id,loading,label){const el=document.getElementById(id);if(!el)return;el.disabled=loading;el.textContent=loading?'Saving…':label;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toLocaleDateString('en-CA');}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts),t=new Date(),y=new Date();y.setDate(t.getDate()-1);if(d.toDateString()===t.toDateString())return'Today';if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function boot(cb){
  try{
    const {data:{session}}=await SB.auth.getSession();
    if(!session){window.location.href='https://riley.meetriley.us';return;}
    USER=session.user;UID=USER.id;
    const meta=USER.user_metadata||{};
    const fullName=meta.full_name||meta.name||USER.email.split('@')[0]||'Member';
    const firstName=fullName.split(' ')[0];
    const avatarUrl=meta.avatar_url||meta.picture||'';
    const initials=fullName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const h=new Date().getHours();
    const gEl=document.getElementById('tb-greeting');if(gEl)gEl.textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', '+firstName+'.';
    const dEl=document.getElementById('tb-date');if(dEl)dEl.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const av=document.getElementById('sb-av');if(av){if(avatarUrl)av.innerHTML=`<img src="${avatarUrl}" alt="${initials}">`;else av.textContent=initials;}
    const nm=document.getElementById('sb-name');if(nm)nm.textContent=fullName;
    await cb();
  }catch(e){console.error('Boot:',e);}
}
async function doSignOut(){await SB.auth.signOut();window.location.href='https://riley.meetriley.us';}


(async()=>{ await boot(async()=>{document.getElementById('w-date').value=TODAY;await loadWellness();await loadWorkouts();}); })();

// ── WORKOUT PLAN - intake → generate → display → weekly adapt ────────────────
const WK_GOALS=[['weight_loss','Weight loss'],['muscle_gain','Muscle gain'],['strength','Strength'],['general_health','General health'],['stress_reduction','Stress reduction'],['mobility','Mobility / flexibility'],['recovery_support','Recovery support'],['athletic_performance','Athletic performance']];
const WK_LEVELS=[['beginner','Beginner - 0–2 days/wk'],['intermediate','Intermediate - 3–4 days'],['advanced','Advanced - 5+ days']];
const WK_EQUIP=[['none','No equipment'],['dumbbells','Dumbbells only'],['full_gym','Full gym']];
function wSel(id,label,opts){return `<div class="field"><label>${label}</label><select id="${id}">${opts.map(o=>`<option value="${o[0]}">${o[1]}</option>`).join('')}</select></div>`;}
function wTxt(id,label,ph){return `<div class="field"><label>${label}</label><input id="${id}" placeholder="${ph||''}"></div>`;}
// Adaptive plan generation is a Riley Coach feature (v4 pricing) - separate
// from workout LOGGING below, which stays open at Companion+ via the page's
// existing tracker_fitness gate. Self-contained fetch (not the sidebar-gating
// IIFE's cache) so there's no race on load order.
async function coachEntitled(featureKey){
  try{
    const tok=(await SB.auth.getSession()).data.session?.access_token;
    const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok})});
    const d=await r.json();
    return !!(d&&d.features&&d.features[featureKey]&&d.features[featureKey].access);
  }catch(e){return true;} // fail open - never block on a network hiccup
}
function coachLockCard(slot,title,body){
  slot.innerHTML=`<div class="card" style="border-color:rgba(201,168,76,0.28);text-align:center"><div style="font-size:34px;margin-bottom:10px;opacity:0.7">🔒</div><div class="card-title">${title}</div><div class="card-sub">${body}</div><a href="/programs?unlock=adaptive_workouts" class="btn btn-gold" style="display:inline-block;text-decoration:none">Unlock with Riley Coach →</a></div>`;
}
async function loadWellness(){
  const slot=document.getElementById('plan-slot');if(!slot)return;
  if(!(await coachEntitled('adaptive_workouts'))){
    return coachLockCard(slot,'Your adaptive workout plan','Riley Coach builds a personalized 7-day plan that adapts to your week - included with Riley Coach ($34/mo). Your workout log below still works on Companion.');
  }
  let prof=null;
  try{const {data}=await SB.from('wellness_profile').select('*').eq('user_id',UID).maybeSingle();prof=data;}catch(e){}
  if(!prof||!prof.workout_intake_done){return renderWorkoutIntake(slot);}
  let plan=null;
  try{const {data}=await SB.from('wellness_plans').select('plan').eq('user_id',UID).eq('plan_type','workout').eq('is_active',true).maybeSingle();plan=data&&data.plan;}catch(e){}
  if(plan&&plan.days)renderWorkoutPlan(slot,plan);else renderWorkoutCta(slot);
}
function renderWorkoutIntake(slot){
  slot.innerHTML=`<div class="card" style="border-color:rgba(201,168,76,0.28)"><div class="card-title">Let's build your plan 🤍</div><div class="card-sub">Eight quick questions and Riley builds a 7-day plan around your real life. You can change any of it later.</div>`+
    wSel('wi-goal','Your main fitness goal',WK_GOALS)+wSel('wi-level','Your current fitness level',WK_LEVELS)+
    `<div class="fr">`+wTxt('wi-days','Days/week you can train','3')+wTxt('wi-mins','Minutes per session','30')+`</div>`+
    wSel('wi-equip','Equipment you have',WK_EQUIP)+
    wTxt('wi-injuries','Injuries or limitations? (optional)','e.g. bad knee - easy on impact')+
    wTxt('wi-enjoy','Workouts you enjoy? (optional)','walking, lifting, yoga…')+
    wTxt('wi-success','What does success look like in 30 days?','In your words')+
    `<button class="btn btn-gold" id="wi-btn" onclick="saveWorkoutIntake()" style="margin-top:8px">Build my 7-day plan →</button><div class="alert" id="wi-alert"></div></div>`;
}
async function saveWorkoutIntake(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const row={user_id:UID,workout_goal:g('wi-goal'),fitness_level:g('wi-level'),days_per_week:parseInt(g('wi-days'))||3,minutes_per_session:parseInt(g('wi-mins'))||30,equipment:g('wi-equip'),injuries:g('wi-injuries')||null,workout_types:g('wi-enjoy')?g('wi-enjoy').split(',').map(s=>s.trim()).filter(Boolean):[],success_30d:g('wi-success')||null,workout_intake_done:true,updated_at:new Date().toISOString()};
  setBtn('wi-btn',true,'Build my 7-day plan →');
  try{await SB.from('wellness_profile').upsert(row,{onConflict:'user_id'});}catch(e){A('wi-alert','Could not save: '+e.message,false);setBtn('wi-btn',false,'Build my 7-day plan →');return;}
  await generateWorkoutPlan();
}
async function generateWorkoutPlan(){
  const slot=document.getElementById('plan-slot');
  slot.innerHTML=`<div class="card"><div class="card-sub" style="text-align:center;padding:28px 0">🤍 Riley is building your plan - this takes about 30 seconds…</div></div>`;
  let prev=null;
  try{const {data}=await SB.from('wellness_plans').select('created_at').eq('user_id',UID).eq('plan_type','workout').eq('is_active',true).maybeSingle();prev=data&&data.created_at;}catch(e){}
  try{const tok=(await SB.auth.getSession()).data.session?.access_token;
    fetch('/.netlify/functions/plan-generate-background',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok,plan_type:'workout'})}).catch(function(){});
  }catch(e){}
  let tries=0;
  const poll=async()=>{
    tries++;let d=null;
    try{const {data}=await SB.from('wellness_plans').select('plan,created_at').eq('user_id',UID).eq('plan_type','workout').eq('is_active',true).maybeSingle();d=data;}catch(e){}
    if(d&&d.plan&&d.plan.days&&d.created_at!==prev)return renderWorkoutPlan(slot,d.plan);
    if(tries>=22){slot.innerHTML=`<div class="card"><div class="card-sub">Still building - Riley's taking a little longer. <button class="btn btn-ghost" onclick="loadWellness()">Check for it</button></div></div>`;return;}
    setTimeout(poll,4000);
  };
  setTimeout(poll,6000);
}
function renderWorkoutCta(slot){slot.innerHTML=`<div class="card" style="border-color:rgba(201,168,76,0.28)"><div class="card-title">Your plan is ready to build</div><div class="card-sub">Riley has your goals - tap to generate this week's workouts.</div><button class="btn btn-gold" onclick="generateWorkoutPlan()">Generate my 7-day plan →</button></div>`;}
function renderWorkoutPlan(slot,plan){
  const days=(plan.days||[]).map(d=>{
    const ex=(d.exercises||[]).map(e=>`<div style="font-size:12px;color:var(--smoke);padding:2px 0">• ${esc(e.name)}${e.sets?` - ${e.sets}×${esc(String(e.reps||''))}${e.rest?` (${esc(e.rest)} rest)`:''}`:''}</div>`).join('');
    return `<div style="background:rgba(16,14,12,0.4);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:13px 15px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px"><div style="font-family:'DM Serif Display',serif;font-size:15px;color:var(--parchment)">${esc(d.day||'')} · ${esc(d.focus||'')}</div><div style="font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);white-space:nowrap">${d.duration_min?d.duration_min+' MIN':''}${d.intensity?' · '+esc(String(d.intensity)).toUpperCase():''}</div></div>${ex?`<div style="margin-top:8px">${ex}</div>`:''}${d.recovery_note?`<div style="font-size:11px;color:var(--smoke2);margin-top:6px;font-style:italic">${esc(d.recovery_note)}</div>`:''}</div>`;
  }).join('');
  slot.innerHTML=`<div class="card" style="border-color:rgba(201,168,76,0.28)"><div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px"><div class="card-title" style="margin:0">Your 7-Day Plan</div><button class="btn btn-ghost" style="font-size:10px;padding:5px 12px" onclick="generateWorkoutPlan()">↻ Regenerate</button></div><div class="card-sub">${esc(plan.summary||'')}</div>${days}${plan.weekly_progression?`<div style="font-size:12px;color:var(--smoke);margin-top:10px"><b style="color:var(--parchment)">Next week:</b> ${esc(plan.weekly_progression)}</div>`:''}${plan.safety_note?`<div style="font-size:10px;color:var(--smoke2);margin-top:12px;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px">⚠ ${esc(plan.safety_note)}</div>`:''}<button class="btn btn-ghost" style="width:100%;margin-top:12px" onclick="workoutWeekly()">Log this week's check-in →</button></div>`;
}
function workoutWeekly(){
  const slot=document.getElementById('plan-slot');
  slot.innerHTML=`<div class="card"><div class="card-title">This week's check-in</div><div class="card-sub">Riley adapts next week from your honest answers - no wrong numbers.</div>`+
    wTxt('ww-pct','How many workouts did you complete? (%)','e.g. 70')+wTxt('ww-hard','Anything too hard? (optional)','')+wTxt('ww-easy','Anything too easy? (optional)','')+wTxt('ww-pain','Any pain or soreness? (optional)','')+wTxt('ww-energy','How was your energy? (optional)','')+
    `<button class="btn btn-gold" id="ww-btn" onclick="saveWorkoutWeekly()">Save & adapt my plan →</button><button class="btn btn-ghost" style="margin-left:8px" onclick="loadWellness()">Cancel</button></div>`;
}
async function saveWorkoutWeekly(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  setBtn('ww-btn',true,'Save & adapt my plan →');
  try{await SB.from('wellness_weekly').insert({user_id:UID,plan_type:'workout',completed_pct:parseInt(g('ww-pct'))||null,too_hard:g('ww-hard')||null,too_easy:g('ww-easy')||null,pain:g('ww-pain')||null,energy:g('ww-energy')||null});}catch(e){}
  await generateWorkoutPlan();
}
async function loadWorkouts(){
  const {data:all}=await SB.from('fitness_logs').select('*').eq('user_id',UID).order('logged_date',{ascending:false}).limit(50);
  const logs=all||[];
  const monday=new Date();monday.setDate(monday.getDate()-monday.getDay()+1);
  const ms=monday.toLocaleDateString('en-CA');
  const tw=logs.filter(l=>l.logged_date>=ms);
  document.getElementById('wk-cnt').textContent=tw.length||'-';
  document.getElementById('wk-min').textContent=tw.reduce((s,l)=>s+(l.duration_minutes||0),0)||'-';
  const mi=tw.reduce((s,l)=>s+(parseFloat(l.distance_miles)||0),0);
  document.getElementById('wk-mi').textContent=mi>0?mi.toFixed(1):'-';
  const dates=[...new Set(logs.map(l=>l.logged_date))].sort((a,b)=>b.localeCompare(a));
  let streak=0,exp=TODAY;for(const d of dates){if(d===exp){streak++;const p=new Date(exp);p.setDate(p.getDate()-1);exp=p.toLocaleDateString('en-CA');}else if(d<exp)break;}
  document.getElementById('wk-str').textContent=streak||'-';
  const icons={Run:'🏃',Lift:'🏋️',Bike:'🚴',Walk:'🚶',Swim:'🏊',HIIT:'⚡',Yoga:'🧘',Recovery:'🛁'};
  const el=document.getElementById('w-hist');
  if(!logs.length){el.innerHTML='<div class="empty">No workouts yet - log your first one above.</div>';return;}
  el.innerHTML='<div class="log-list">'+logs.slice(0,30).map(l=>{const det=[l.duration_minutes?l.duration_minutes+'min':null,l.distance_miles?l.distance_miles+'mi':null,l.notes].filter(Boolean).join(' · ');
    return`<div class="log-row"><div class="log-icon">${icons[l.activity_type]||'💪'}</div><div class="log-info"><div class="log-title">${esc(l.activity_type)}</div>${det?`<div class="log-detail">${esc(det)}</div>`:''}</div><div class="log-date">${fmtDate(l.logged_date)}</div></div>`;
  }).join('')+'</div>';
}
async function logWorkout(){
  setBtn('w-btn',true,'Log Workout');
  try{const {error}=await SB.from('fitness_logs').insert({user_id:UID,activity_type:document.getElementById('w-type').value,logged_date:document.getElementById('w-date').value||TODAY,duration_minutes:parseInt(document.getElementById('w-dur').value)||null,distance_miles:parseFloat(document.getElementById('w-dist').value)||null,notes:document.getElementById('w-notes').value.trim()||null});
  if(error)throw error;['w-dur','w-dist','w-notes'].forEach(i=>document.getElementById(i).value='');A('w-alert','✓ Workout logged!',true);await loadWorkouts();}
  catch(e){A('w-alert','Error: '+e.message,false);}finally{setBtn('w-btn',false,'Log Workout');}
}

</script>


<script>
/* ── SIDEBAR + ENTITLEMENT GATING (shared) ────────────────────────────────── */
(function(){
  const TIER_NAV = {
    guide:    {label:'Guide',     items:[
      {href:'/reset', icon:'🌱', label:'The 8:14 Reset'},
      {href:'/conversations', icon:'💭', label:'Conversations'}
    ]},
    companion:{label:'Companion', items:[
      {href:'/tracker', icon:'📖', label:'Reflection', feat:'daily_checkin'},
      {href:'/workouts', icon:'🤍', label:'Movement', feat:'tracker_fitness'},
      {href:'/nutrition', icon:'🍃', label:'Nourishment', feat:'tracker_nutrition'},
      {href:'/sleep', icon:'🌙', label:'Rest', feat:'tracker_sleep'}
    ]},
    coach:    {label:'Coach',     items:[
      {href:'/finance', icon:'💰', label:'Financial Goals', feat:'tracker_finance'},
      {href:'/lifemap', icon:'🗺️', label:'Life Map', feat:'knowledge_graph'},
      {href:'/community', icon:'🤝', label:'Community', comingSoon:true}
    ]}
  };
  const RESOURCES = [
    {href:'/library', icon:'📚', label:'Library'},
    {href:'/programs', icon:'🗂️', label:'Program Add-ons'},
    {href:'/calendar', icon:'📅', label:'Calendar', feat:'tracker_calendar'}
  ];
  const TIER_ORDER = ['guide','companion','coach'];
  const PAGE_FEATURE = 'tracker_fitness';

  async function loadEnt(uid){
    const k='ent_'+uid, c=sessionStorage.getItem(k);
    if(c){try{return JSON.parse(c);}catch(e){}}
    try{
      const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,token:(await SB.auth.getSession()).data.session?.access_token||null})});
      const d=await r.json(); sessionStorage.setItem(k,JSON.stringify(d)); return d;
    }catch(e){ return {products:[],tier:'guide',features:{}}; }
  }
  const can=(e,k)=>!k||(e&&e.features&&e.features[k]&&e.features[k].access===true);
  const mode=(e,k)=>(e&&e.features&&e.features[k]&&e.features[k].gate_mode)||'hidden';
  const tierIdx=t=>{const i=TIER_ORDER.indexOf(t);return i<0?0:i;};

  function navItem(it, locked){
    const path=location.pathname.replace(/\/$/,'')||'/dashboard';
    const base=it.href.split('?')[0].replace(/\/$/,'');
    const isActive=path===base;
    const cls='sni'+(isActive?' active':'')+(locked?' locked':'');
    const badge=it.comingSoon?'<span class="sb-badge-soon">Soon</span>':(locked?'<span class="sb-tier-lock">🔒</span>':'');
    return `<a href="${locked?'#':it.href}" class="${cls}" data-feat="${it.feat||''}" data-upsell="${locked?'1':'0'}"><span class="sni-icon">${it.icon}</span>${it.label}${badge}</a>`;
  }

  function renderSidebar(ent){
    const mount=document.getElementById('sb-tiers');
    if(!mount)return;
    const myIdx=tierIdx(ent.tier||'guide');
    let html='';
    TIER_ORDER.forEach((key,idx)=>{
      const tier=TIER_NAV[key];
      const tierLocked=idx>myIdx;
      const items=tier.items.map(it=>navItem(it, tierLocked && !it.comingSoon)).join('');
      const open=idx<=myIdx;
      html+=`<div class="sb-tier"><div class="sb-tier-head${open?' open':''}${tierLocked?' locked':''}" onclick="sbToggleTier(this)">${tier.label}${tierLocked?'<span class="sb-tier-lock">🔒</span>':''}<span class="sb-chev">▸</span></div><div class="sb-tier-items${open?' open':''}">${items}</div></div>`;
    });
    const resItems=RESOURCES.map(it=>navItem(it, it.feat ? !can(ent,it.feat) : false)).join('');
    html+=`<div class="sb-tier"><div class="sb-tier-head open" onclick="sbToggleTier(this)">Additional Resources<span class="sb-chev">▸</span></div><div class="sb-tier-items open">${resItems}</div></div>`;
    mount.innerHTML=html;
    mount.querySelectorAll('a[data-upsell="1"]').forEach(a=>{
      a.addEventListener('click',e=>{e.preventDefault();window.location.href='/programs?unlock='+(a.dataset.feat||'');});
    });
    document.querySelectorAll('.sidebar > a.sni').forEach(a=>{
      const p=location.pathname.replace(/\/$/,'')||'/dashboard';
      a.classList.toggle('active',p===(a.getAttribute('href')||'').replace(/\/$/,''));
    });
    const planEl=document.getElementById('sb-plan');
    if(planEl){const t=ent.tier||'guide';planEl.textContent='Riley '+t.charAt(0).toUpperCase()+t.slice(1);}
  }
  window.sbToggleTier=function(head){
    head.classList.toggle('open');
    const items=head.nextElementSibling;
    if(items)items.classList.toggle('open');
  };

  function wall(ent,feat){
    const fmap={
      daily_checkin:{name:'Daily Check-In',need:'Riley Companion'},
      adaptive_programming:{name:'Your Daily Brief',need:'Riley Companion'},
      tracker_fitness:{name:'Workout Tracking',need:'Riley Companion'},
      tracker_nutrition:{name:'Nutrition Tracking',need:'Riley Companion'},
      tracker_sleep:{name:'Sleep Tracking',need:'Riley Companion'},
      tracker_finance:{name:'Financial Goals',need:'Riley Coach'},
      tracker_calendar:{name:'Calendar',need:'Riley Companion'},
      knowledge_graph:{name:'Your Knowledge Graph',need:'Riley Coach'}
    };
    const f=fmap[feat]||{name:'This feature',need:'a subscription'};
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;left:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,7,6,0.92);backdrop-filter:blur(8px)';
    ov.innerHTML=`<div style="max-width:420px;text-align:center;padding:40px">
      <div style="font-size:44px;margin-bottom:20px">🔒</div>
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:#f5f0e8;margin-bottom:12px">${f.name} is locked</div>
      <div style="font-size:14px;color:#8a8578;line-height:1.7;margin-bottom:28px">Unlock ${f.name.toLowerCase()} and Riley's full daily support with <strong style="color:#c9a84c">${f.need}</strong>. Riley adapts to where you are - and stays.</div>
      <a href="/programs?unlock=${feat}" style="display:inline-block;background:linear-gradient(135deg,#c9a84c,#d4942a);color:#0a0908;padding:13px 28px;font-size:13px;font-weight:600;text-decoration:none;border-radius:3px;letter-spacing:0.04em;box-shadow:0 4px 20px rgba(201,168,76,0.3)">Unlock with ${f.need} →</a>
      <div style="margin-top:16px"><a href="/dashboard" style="font-size:12px;color:#8a8578;text-decoration:none">← Back to Home</a></div>
    </div>`;
    document.body.appendChild(ov);
  }

  async function run(){
    if(typeof SB==='undefined')return;
    try{
      const {data:{session}}=await SB.auth.getSession();
      if(!session)return;
      const ent=await loadEnt(session.user.id);
      renderSidebar(ent);
      if(PAGE_FEATURE && !can(ent,PAGE_FEATURE)){
        if(mode(ent,PAGE_FEATURE)==='hidden') window.location.href='/dashboard';
        else wall(ent,PAGE_FEATURE);
      }
    }catch(e){console.error('gating:',e);}
  }
  if(document.readyState!=='loading')run();else document.addEventListener('DOMContentLoaded',run);
})();
</script>
<script src="/pwa.js"></script>
<script src="/track.js"></script>
<script src="/posthog.js"></script>
</body>
