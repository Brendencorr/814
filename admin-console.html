<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Metrics · The 8:14 Project</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a0908;color:#f5f0e8;min-height:100vh;padding:34px 22px}
.wrap{max-width:920px;margin:0 auto}
h1{font-family:'DM Serif Display',serif;font-size:28px;margin-bottom:4px}
.sub{font-size:11px;color:#8a8578;font-family:'DM Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:26px}
.stars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px}
.star{background:#141210;border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:24px}
.star-label{font-size:10px;font-family:'DM Mono',monospace;color:#c9a84c;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px}
.star-val{font-family:'DM Serif Display',serif;font-size:46px;line-height:1;color:#f5f0e8}
.star-target{font-size:11px;color:#8a8578;margin-top:8px}
.star-detail{font-size:11px;color:#5a5450;margin-top:3px}
.section-label{font-size:10px;font-family:'DM Mono',monospace;color:#8a8578;letter-spacing:0.16em;text-transform:uppercase;margin:26px 0 12px}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#141210;border:1px solid rgba(255,255,255,0.06);border-radius:6px;margin-bottom:8px}
.row-label{font-size:13px}
.row-val{font-family:'DM Mono',monospace;font-size:15px;color:#c9a84c}
.row-target{font-size:10px;color:#5a5450;margin-left:10px}
.fstep{display:flex;justify-content:space-between;padding:11px 16px;background:#141210;border-left:2px solid #c9a84c;border-radius:4px;margin-bottom:6px}
.err{color:#c98a4c;font-size:13px;margin-top:16px}
a{color:#c9a84c}
/* ── Operator actions ── */
.ops{margin-top:38px;border-top:1px solid rgba(255,255,255,0.08);padding-top:28px}
.ops h2{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:5px}
.ops .note{font-size:12px;color:#8a8578;margin-bottom:18px;line-height:1.5;max-width:640px}
.lookup{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.lookup input{flex:1;min-width:240px;background:#141210;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#f5f0e8;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px}
.lookup input:focus{outline:none;border-color:#c9a84c}
.btn{background:#c9a84c;color:#0a0908;border:none;border-radius:6px;padding:11px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer}
.btn:hover{background:#d8b95e}
.btn.ghost{background:transparent;color:#c9a84c;border:1px solid rgba(201,168,76,0.42)}
.btn.ghost:hover{background:rgba(201,168,76,0.1)}
.btn.danger{background:transparent;color:#c98a4c;border:1px solid rgba(201,138,76,0.5)}
.btn.danger:hover{background:rgba(201,138,76,0.1)}
.member{background:#141210;border:1px solid rgba(201,168,76,0.22);border-radius:10px;padding:22px;margin-bottom:14px}
.member .mname{font-family:'DM Serif Display',serif;font-size:20px}
.member .memail{font-size:12px;color:#8a8578;font-family:'DM Mono',monospace;margin-top:3px}
.member .mid{font-size:10px;color:#5a5450;font-family:'DM Mono',monospace;margin-top:2px}
.mstate{display:flex;flex-wrap:wrap;gap:8px;margin-top:15px}
.chip{font-size:11px;font-family:'DM Mono',monospace;padding:5px 11px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#c9b98a}
.actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.07)}
.actions select{background:#0a0908;border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#f5f0e8;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px}
.op-status{font-size:12px;font-family:'DM Mono',monospace;margin-top:6px;min-height:18px;color:#8a8578}
.op-status.ok{color:#6a9c78}
.op-status.bad{color:#c98a4c}
</style>
</head>
<body>
<div class="wrap">
  <h1>Admin — Metrics</h1>
  <div class="sub">Doc 3 · Phase 1 — the funnel, from the events table only</div>
  <div id="content"><div style="color:#8a8578;font-size:13px">Loading…</div></div>

  <div class="ops">
    <h2>Operator actions</h2>
    <div class="note">Look up a member by email or user id, then apply an override. Every action is written to the append-only audit trail. This panel shows entitlement state only — never conversation content.</div>
    <div class="lookup">
      <input id="q" type="text" placeholder="member email or user id" autocomplete="off" spellcheck="false">
      <button class="btn" id="lookup-btn">Look up</button>
    </div>
    <div id="member"></div>
    <div class="op-status" id="op-status"></div>
  </div>
</div>
<script>
function opKey(){ var k=sessionStorage.getItem('814_opkey')||''; if(!k){ k=(window.prompt('Operator key:')||'').trim(); if(k)sessionStorage.setItem('814_opkey',k); } return k; }
function vs(v,u){ return v==null?'—':(v+(u||'')); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }

// ── Metrics (Phase 1) ──────────────────────────────────────────────
async function load(){
  var k=opKey();
  if(!k){ document.getElementById('content').innerHTML='<div class="err">Operator key required. <a href="#" onclick="location.reload()">retry</a></div>'; return; }
  try{
    var r=await fetch('/.netlify/functions/admin-metrics',{method:'POST',headers:{'Content-Type':'application/json','x-operator-key':k},body:JSON.stringify({})});
    if(r.status===401||r.status===403){ sessionStorage.removeItem('814_opkey'); document.getElementById('content').innerHTML='<div class="err">Bad operator key. <a href="#" onclick="location.reload()">retry</a></div>'; return; }
    var d=await r.json();
    var h='<div class="stars">';
    (d.northStars||[]).forEach(function(s){ h+='<div class="star"><div class="star-label">'+s.label+'</div><div class="star-val">'+vs(s.value,s.unit)+'</div><div class="star-target">Target '+s.target+'</div><div class="star-detail">'+(s.detail||'')+'</div></div>'; });
    h+='</div>';
    h+='<div class="section-label">Funnel</div>';
    (d.funnel||[]).forEach(function(f){ h+='<div class="fstep"><span class="row-label">'+f.step+'</span><span class="row-val">'+f.count+'</span></div>'; });
    h+='<div class="section-label">Supporting metrics</div>';
    (d.rows||[]).forEach(function(x){ h+='<div class="row"><span class="row-label">'+x.label+'</span><span><span class="row-val">'+vs(x.value,x.unit)+'</span><span class="row-target">'+x.target+'</span></span></div>'; });
    document.getElementById('content').innerHTML=h;
  }catch(e){ document.getElementById('content').innerHTML='<div class="err">Failed to load metrics — check the operator key.</div>'; }
}

// ── Operator actions (Phase 2) ─────────────────────────────────────
var CURRENT=null;
function opStatus(msg,cls){ var el=document.getElementById('op-status'); el.textContent=msg||''; el.className='op-status'+(cls?(' '+cls):''); }

async function postComp(action, extra){
  if(!CURRENT) return;
  var k=opKey(); if(!k){ opStatus('Operator key required.','bad'); return; }
  var body=Object.assign({action:action, user_id:CURRENT.id}, extra||{});
  opStatus('Working…');
  try{
    var r=await fetch('/.netlify/functions/admin-comp',{method:'POST',headers:{'Content-Type':'application/json','x-operator-key':k},body:JSON.stringify(body)});
    var d=await r.json().catch(function(){return {};});
    if(r.status===401){ sessionStorage.removeItem('814_opkey'); opStatus('Bad operator key — reload and re-enter.','bad'); return; }
    if(!r.ok){ opStatus((d&&d.error)||('Failed ('+r.status+')'),'bad'); return; }
    opStatus('Done — "'+action+'" applied. Refreshing…','ok');
    lookup(CURRENT.id);
  }catch(e){ opStatus('Request failed.','bad'); }
}

function handleOp(op){
  if(!CURRENT) return;
  var who=CURRENT.name||CURRENT.email||CURRENT.id;
  if(op==='comp-companion'){ if(confirm('Comp '+who+' to Companion? (free, no expiry)')) postComp('comp',{plan_id:'companion'}); }
  else if(op==='comp-coach'){ if(confirm('Comp '+who+' to Coach? (free, no expiry)')) postComp('comp',{plan_id:'coach'}); }
  else if(op==='weekend'){ if(confirm('Grant '+who+' a 48-hour Companion Weekend?')) postComp('weekend',{}); }
  else if(op==='alc'){ var sel=document.getElementById('alc'); var program=sel?sel.value:'sobriety'; if(confirm('Grant '+who+' the "'+program+'" program? (free)')) postComp('grant_alc',{program_id:program}); }
  else if(op==='credit'){ if(confirm('Issue '+who+' a $8.14 credit? (90-day expiry)')) postComp('credit',{}); }
  else if(op==='reset'){ if(confirm('RESET '+who+'’s 8:14 Reset back to Day 1?\n\nThis deletes their Reset progress and persona. Cannot be undone.')) postComp('reset_reset',{}); }
}

function renderMember(u){
  CURRENT=u;
  var chips='<span class="chip">reset day '+(u.reset_day||0)+'</span>';
  var subs=(u.subscriptions||[]).map(function(s){ return s.plan_id+(s.term?(' · '+s.term):'')+(s.expires_at?(' · exp '+String(s.expires_at).slice(0,10)):''); });
  (subs.length?subs:['no active subscription']).forEach(function(s){ chips+='<span class="chip">'+esc(s)+'</span>'; });
  (u.purchases||[]).forEach(function(p){ chips+='<span class="chip">à la carte: '+esc(p)+'</span>'; });
  if((u.credits||[]).length) chips+='<span class="chip">'+u.credits.length+' active credit(s)</span>';
  var h='<div class="member">'
    +'<div class="mname">'+esc(u.name||'—')+'</div>'
    +'<div class="memail">'+esc(u.email||'no email on file')+'</div>'
    +'<div class="mid">'+esc(u.id)+'</div>'
    +'<div class="mstate">'+chips+'</div>'
    +'<div class="actions">'
    +'<button class="btn" data-op="comp-companion">Comp Companion</button>'
    +'<button class="btn" data-op="comp-coach">Comp Coach</button>'
    +'<button class="btn ghost" data-op="weekend">Grant Weekend (48h)</button>'
    +'<select id="alc"><option value="sobriety">sobriety</option><option value="grief">grief</option><option value="body_rebuild">body_rebuild</option></select>'
    +'<button class="btn ghost" data-op="alc">Grant à la carte</button>'
    +'<button class="btn ghost" data-op="credit">Issue $8.14 credit</button>'
    +'<button class="btn danger" data-op="reset">Reset the 8:14 Reset</button>'
    +'</div></div>';
  var box=document.getElementById('member');
  box.innerHTML=h;
  var btns=box.querySelectorAll('[data-op]');
  for(var i=0;i<btns.length;i++){ (function(b){ b.addEventListener('click',function(){ handleOp(b.getAttribute('data-op')); }); })(btns[i]); }
}

async function lookup(preset){
  var k=opKey(); if(!k){ opStatus('Operator key required.','bad'); return; }
  var q=preset||(document.getElementById('q').value||'').trim();
  if(!q){ opStatus('Enter an email or user id.','bad'); return; }
  opStatus('Looking up…');
  try{
    var r=await fetch('/.netlify/functions/admin-comp',{method:'POST',headers:{'Content-Type':'application/json','x-operator-key':k},body:JSON.stringify({action:'lookup',email:q})});
    var d=await r.json().catch(function(){return {};});
    if(r.status===401){ sessionStorage.removeItem('814_opkey'); opStatus('Bad operator key — reload and re-enter.','bad'); return; }
    if(r.status===404){ opStatus('No member found for that email or id.','bad'); document.getElementById('member').innerHTML=''; CURRENT=null; return; }
    if(!r.ok){ opStatus((d&&d.error)||('Lookup failed ('+r.status+')'),'bad'); return; }
    renderMember(d.user);
    opStatus('');
  }catch(e){ opStatus('Lookup failed.','bad'); }
}

document.getElementById('lookup-btn').addEventListener('click', function(){ lookup(); });
document.getElementById('q').addEventListener('keydown', function(e){ if(e.key==='Enter') lookup(); });
load();
</script>
</body>
</html>
