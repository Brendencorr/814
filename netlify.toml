[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,riley-auth.html,riley-dashboard.html,riley-chat.js,dashboard.html,dashboard-auth.js,dashboard.css,conversations.html,tracker.html,programs.html,brief.html,workouts.html,nutrition.html,progress.html,sleep.html,finance.html,calendar.html,roadmap.html,chat.html,login.html"

[functions]
  directory = "netlify/functions"

[functions."scout"]
  timeout = 26

[functions."sage"]
  timeout = 26

[functions."atlas"]
  timeout = 26

[functions."echo"]
  timeout = 26

[functions."riley-chat"]
  timeout = 30

[functions."auth-handler"]
  timeout = 26

[functions."buffer-publish"]
  timeout = 26

[functions."pipeline-status"]
  timeout = 26

[functions."weekly-pipeline"]
  timeout = 26

[functions."admin-users"]
  timeout = 26


[functions."entitlements"]
  timeout = 10

[functions."site-config"]
  timeout = 10

# HTTP-triggered background pipeline — no timeout, runs full Scout->Sage->Atlas
# The -background suffix tells Netlify to return 202 immediately and keep running
[functions."manual-pipeline-background"]

# Runs every Sunday 6am MT (12:00 UTC) as a background function
[functions."weekly-pipeline-cron"]
  schedule = "0 12 * * 0"

