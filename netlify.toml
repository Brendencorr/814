  to     = "/dashboard.css"
  status = 200
  force  = true

# ── Riley catch-all (anonymous chat for everything else) ──
# No force=true here — lets actual files (CSS, JS, HTML) be served directly.
# Only applies to paths that don't match an existing file.
[[redirects]]
  from = "https://riley.eight14.us/*"
  to = "/riley-auth.html"
  status = 200

[[redirects]]
  from = "https://login.eight14.us/*"
  to = "/login.html"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.eight14.us/*"
  to = "/operator.html"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/operator.html"
  status = 200
