[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,riley-auth.html,riley-dashboard.html,riley-chat.js,dashboard.html,dashboard-auth.js,dashboard.css,conversations.html,tracker.html,programs.html,brief.html"

[functions]
  directory = "netlify/functions"

[functions."scout"]
  timeout = 26

[functions."sage"]
  timeout = 26

[functions."atlas"]
  timeout = 26

[functions."echo"]
  timeout = 26

[functions."riley-chat"]
  timeout = 30

[functions."auth-handler"]
  timeout = 26

[functions."buffer-publish"]
  timeout = 26

[functions."pipeline-status"]
  timeout = 26

[functions."weekly-pipeline"]
  timeout = 26

[functions."site-config"]
  timeout = 10

# Runs every Sunday 6am MT (12:00 UTC) as a background function
[functions."weekly-pipeline-cron"]
  schedule = "0 12 * * 0"

# ── Dashboard clean URLs (must come BEFORE the riley.eight14.us catch-all) ──
[[redirects]]
  from = "https://riley.eight14.us/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/dashboard/"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/brief"
  to   = "/brief.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/brief/"
  to   = "/brief.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/conversations"
  to   = "/conversations.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/conversations/"
  to   = "/conversations.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/tracker"
  to   = "/tracker.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/tracker/"
  to   = "/tracker.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/programs"
  to   = "/programs.html"
  status = 200

[[redirects]]
  from = "https://riley.eight14.us/programs/"
  to   = "/programs.html"
  status = 200


# ── Direct .html paths — force override needed since catch-all has force=true ──
[[redirects]]
  from   = "https://riley.eight14.us/dashboard.html"
  to     = "/dashboard.html"
  status = 200
  force  = true

[[redirects]]
  from   = "https://riley.eight14.us/brief.html"
  to     = "/brief.html"
  status = 200
  force  = true

[[redirects]]
  from   = "https://riley.eight14.us/conversations.html"
  to     = "/conversations.html"
  status = 200
  force  = true

[[redirects]]
  from   = "https://riley.eight14.us/tracker.html"
  to     = "/tracker.html"
  status = 200
  force  = true

[[redirects]]
  from   = "https://riley.eight14.us/programs.html"
  to     = "/programs.html"
  status = 200
  force  = true

# ── Riley catch-all (anonymous chat for everything else) ──
# No force=true here — lets actual files (CSS, JS, HTML) be served directly.
# Only applies to paths that don't match an existing file.
[[redirects]]
  from = "https://riley.eight14.us/*"
  to = "/riley-auth.html"
  status = 200

[[redirects]]
  from = "https://login.eight14.us/*"
  to = "/login.html"
  status = 200
  force = true

[[redirects]]
  from = "https://admin.eight14.us/*"
  to = "/dashboard.html"
  status = 200
  force = true
