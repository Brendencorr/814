[functions]
  directory = "netlify/functions"

[functions."scout"]
  timeout = 26

[functions."sage"]
  timeout = 26

[functions."atlas"]
  timeout = 26

[functions."echo"]
  timeout = 26

# Riley streams responses — 30s to allow for Supabase context load + streaming
[functions."riley-chat"]
  timeout = 30

[functions."auth-handler"]
  timeout = 26

[functions."buffer-publish"]
  timeout = 26

[functions."pipeline-status"]
  timeout = 26

# Manual trigger endpoint — HTTP callable from dashboard, returns JSON status
[functions."weekly-pipeline"]

# Autonomous background function — runs every Sunday 6am MT (12:00 UTC)
# Background functions have no HTTP timeout, run until completion
[functions."weekly-pipeline-background"]
  schedule = "0 12 * * 0"
