<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversations — Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--warm:#faf8f4;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--green:#3a7c56;--green2:#4aad72;--red:#8b3a3a;--mist:rgba(255,255,255,0.06);--smoke:#8a8578;--smoke2:#5a5450;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--ink2);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-mark{font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)}
.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:10px;color:var(--smoke);margin-top:2px}
.snl{font-family:'DM Mono',monospace;font-size:8px;color:var(--smoke2);letter-spacing:0.2em;text-transform:uppercase;padding:12px 20px 3px}
.sni{display:flex;align-items:center;gap:9px;padding:8px 20px;text-decoration:none;font-size:12px;color:var(--smoke);transition:all .15s;border-left:2px solid transparent}
.sni:hover{color:var(--parchment);background:rgba(255,255,255,0.03);border-left-color:rgba(201,168,76,0.4)}
.sni.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.sni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-spacer{flex:1}
.sb-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-name{font-size:11px;color:var(--parchment);font-weight:500}
.sb-plan{font-size:9px;color:var(--gold)}
.sb-out{margin-left:auto;background:none;border:none;color:var(--smoke2);font-size:14px;cursor:pointer}
.sb-out:hover{color:var(--red)}
.main{overflow-y:auto}
.topbar{padding:18px 28px;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment)}
.tb-sub{font-size:11px;color:var(--smoke);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.tb-actions{display:flex;gap:8px}
.btn{display:inline-block;padding:7px 16px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:2px;transition:opacity .15s;text-decoration:none;letter-spacing:0.04em}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--parchment);border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.content{padding:24px 28px}
.card{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:22px;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--smoke);margin-bottom:18px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.12em}
.field input,.field select,.field textarea{background:var(--ink3);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--parchment);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:var(--smoke2)}
.field select option{background:var(--ink3)}
.field textarea{resize:vertical;min-height:72px}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px}
.alert{padding:10px 14px;border-radius:2px;font-size:12px;margin-top:10px;display:none;border:1px solid;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.alert-ok{background:rgba(74,173,114,0.1);color:var(--green2);border-color:rgba(74,173,114,0.25)}
.alert-err{background:rgba(139,58,58,0.1);color:#e07070;border-color:rgba(139,58,58,0.25)}
.divider{border-top:1px solid rgba(255,255,255,0.06);margin:18px 0;padding-top:18px}
.mini-head{font-size:11px;font-weight:600;color:var(--parchment);margin-bottom:12px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:16px}
.sv{font-family:'DM Serif Display',serif;font-size:28px;color:var(--parchment);line-height:1;margin-bottom:4px}
.sl{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.1em}
.log-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;margin-top:12px}
.log-row{background:var(--ink2);padding:11px 16px;display:flex;align-items:center;gap:12px;transition:background .12s}
.log-row:hover{background:var(--ink3)}
.log-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:12px;font-weight:500;color:var(--parchment)}
.log-detail{font-size:11px;color:var(--smoke);margin-top:2px}
.log-date{font-size:10px;color:var(--smoke2);font-family:'DM Mono',monospace;white-space:nowrap}
.pbar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.pbf{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.pbf.g{background:var(--green2)}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
.tag{display:inline-block;font-size:8px;background:var(--gold-dim);color:var(--gold);padding:2px 5px;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;margin-right:3px;border-radius:1px}
.empty{padding:20px;text-align:center;color:var(--smoke);font-size:12px;line-height:1.7}
.empty a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
@media(max-width:900px){.stat-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}}

.sb-tier{border-top:1px solid rgba(255,255,255,0.04)}
.sb-tier-head{display:flex;align-items:center;gap:6px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.16em;transition:color .15s;user-select:none}
.sb-tier-head:hover{color:var(--smoke)}
.sb-tier-head .sb-chev{margin-left:auto;font-size:8px;transition:transform .2s}
.sb-tier-head.open .sb-chev{transform:rotate(90deg)}
.sb-tier-head.locked{color:var(--smoke2)}
.sb-tier-lock{font-size:9px;opacity:0.7}
.sb-tier-items{display:none;flex-direction:column;overflow:hidden}
.sb-tier-items.open{display:flex}
.sb-tier-items .sni.locked{opacity:0.45;cursor:pointer}
.sb-badge-soon{margin-left:auto;font-size:7px;font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:2px 5px;border-radius:8px;letter-spacing:0.06em;text-transform:uppercase}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">Riley<span>.</span></div><div class="sb-logo-sub">The 8:14 Project</div></div>
  <a href="/dashboard" class="sni"><span class="sni-icon">🌅</span>Today</a>
  <a href="/chat" class="sni"><span class="sni-icon">🧠</span>Talk with Riley</a>
  <div id="sb-tiers"></div>
  <div class="sb-spacer"></div>
  <div class="sb-user"><div class="sb-av" id="sb-av">?</div><div><div class="sb-name" id="sb-name">…</div><div class="sb-plan" id="sb-plan">Live With Purpose.</div></div><button class="sb-out" onclick="doSignOut()" title="Sign out">↪</button></div>
</aside>
<main class="main">
<div class="topbar">
  <div><div class="tb-title" id="tb-greeting">Conversations</div><div class="tb-sub" id="tb-date"></div></div>
  <div class="tb-actions"><a href="/dashboard" class="btn btn-ghost">← Home</a><a href="/chat" class="btn btn-gold">+ New Chat</a></div>
</div>
<div class="content">

<div style="display:grid;grid-template-columns:280px 1fr;gap:16px;height:calc(100vh - 120px)">
  <div style="background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;overflow-y:auto">
    <div style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:11px;font-weight:600;color:var(--parchment)">Riley Sessions</div>
    <div id="cv-list"></div>
  </div>
  <div id="cv-thread" style="background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:22px;overflow-y:auto">
    <div class="empty" style="padding:40px 0"><div style="font-size:32px;margin-bottom:12px">💬</div>Select a conversation</div>
  </div>
</div>

</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>

const SB = supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
let USER=null,UID=null,TODAY=new Date().toISOString().slice(0,10);

function A(id,msg,ok){
  const el=document.getElementById(id);if(!el){console.log(ok?'OK':'ERR',msg);return;}
  el.textContent=msg;el.className='alert '+(ok?'alert-ok':'alert-err');el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',5000);
}
function setBtn(id,loading,label){const el=document.getElementById(id);if(!el)return;el.disabled=loading;el.textContent=loading?'Saving…':label;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function dAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts),t=new Date(),y=new Date();y.setDate(t.getDate()-1);if(d.toDateString()===t.toDateString())return'Today';if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function boot(cb){
  try{
    const {data:{session}}=await SB.auth.getSession();
    if(!session){window.location.href='https://riley.eight14.us';return;}
    USER=session.user;UID=USER.id;
    const meta=USER.user_metadata||{};
    const fullName=meta.full_name||meta.name||USER.email.split('@')[0]||'Member';
    const firstName=fullName.split(' ')[0];
    const avatarUrl=meta.avatar_url||meta.picture||'';
    const initials=fullName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const h=new Date().getHours();
    const gEl=document.getElementById('tb-greeting');if(gEl)gEl.textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', '+firstName+'.';
    const dEl=document.getElementById('tb-date');if(dEl)dEl.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const av=document.getElementById('sb-av');if(av){if(avatarUrl)av.innerHTML=`<img src="${avatarUrl}" alt="${initials}">`;else av.textContent=initials;}
    const nm=document.getElementById('sb-name');if(nm)nm.textContent=fullName;
    await cb();
  }catch(e){console.error('Boot:',e);}
}
async function doSignOut(){await SB.auth.signOut();window.location.href='https://riley.eight14.us';}


let _sess={};
(async()=>{ await boot(async()=>{
  const {data:msgs}=await SB.from('riley_conversations').select('session_id,role,content,created_at,title,tags').eq('user_id',UID).order('created_at',{ascending:false}).limit(400);
  const el=document.getElementById('cv-list');
  if(!msgs||!msgs.length){el.innerHTML='<div class="empty">No conversations yet.<br><a href="/chat">Start one →</a></div>';return;}
  const sessions={};
  for(const m of msgs){if(!sessions[m.session_id]){sessions[m.session_id]={id:m.session_id,msgs:[],created_at:m.created_at,title:m.title,tags:m.tags||[]};}sessions[m.session_id].msgs.push(m);}
  _sess=sessions;
  const list=Object.values(sessions).sort((a,b)=>b.created_at.localeCompare(a.created_at));
  const byMonth={};for(const s of list){const mo=new Date(s.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'});if(!byMonth[mo])byMonth[mo]=[];byMonth[mo].push(s);}
  let html='';
  for(const [mo,ss] of Object.entries(byMonth)){
    html+=`<div style="padding:6px 16px 3px;font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.14em;border-bottom:1px solid rgba(255,255,255,0.04)">${mo}</div>`;
    for(const s of ss){const first=s.msgs.find(m=>m.role==='user');const preview=s.title||first?.content?.slice(0,50)||'Riley Session';
      html+=`<div onclick="openSess('${s.id}')" id="si-${s.id}" style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background .12s" onmouseover="this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.background='transparent'"><div style="font-size:12px;font-weight:500;color:var(--parchment);margin-bottom:2px">${esc(preview)}</div>${s.tags.slice(0,2).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`;}
  }
  el.innerHTML=html;
  if(list.length)openSess(list[0].id);
}); })();
function openSess(sid){
  document.querySelectorAll('[id^="si-"]').forEach(e=>e.style.background='transparent');
  const el=document.getElementById('si-'+sid);if(el)el.style.background='rgba(255,255,255,0.03)';
  const s=_sess[sid];if(!s)return;
  const msgs=[...s.msgs].sort((a,b)=>a.created_at.localeCompare(b.created_at));
  document.getElementById('cv-thread').innerHTML=
    `<div style="font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:4px">${esc(s.title||'Riley Session')}</div>`+
    `<div style="font-size:10px;color:var(--smoke2);font-family:'DM Mono',monospace;margin-bottom:20px;letter-spacing:0.04em">${new Date(s.created_at).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'})}</div>`+
    `<div style="display:flex;flex-direction:column;gap:10px">`+
    msgs.map(m=>{const u=m.role==='user';return`<div style="display:flex;${u?'justify-content:flex-end':'justify-content:flex-start'}"><div style="max-width:75%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:${u?'var(--gold)':'var(--ink3)'};color:${u?'var(--ink)':'var(--parchment)'};border:${u?'none':'1px solid rgba(255,255,255,0.07)'};border-bottom-${u?'right':'left'}-radius:3px">${esc(m.content)}</div></div>`;}).join('')+
    '</div>';
}

</script>


<script>
/* ── SIDEBAR + ENTITLEMENT GATING (shared) ────────────────────────────────── */
(function(){
  const TIER_NAV = {
    guide:    {label:'Guide',     items:[
      {href:'/journey?slug=7-day-reset', icon:'\U0001F331', label:'7-Day Reset'},
      {href:'/conversations', icon:'\U0001F4AD', label:'Conversations'}
    ]},
    companion:{label:'Companion', items:[
      {href:'/tracker', icon:'\U0001F4D6', label:'Reflection', feat:'daily_checkin'},
      {href:'/workouts', icon:'\U0001F90D', label:'Movement', feat:'tracker_fitness'},
      {href:'/nutrition', icon:'\U0001F343', label:'Nourishment', feat:'tracker_nutrition'},
      {href:'/sleep', icon:'\U0001F319', label:'Rest', feat:'tracker_sleep'}
    ]},
    coach:    {label:'Coach',     items:[
      {href:'/finance', icon:'\U0001F4B0', label:'Financial Goals', feat:'tracker_finance'},
      {href:'/lifemap', icon:'\U0001F5FA️', label:'Life Map', feat:'knowledge_graph'},
      {href:'/community', icon:'\U0001F91D', label:'Community', comingSoon:true}
    ]}
  };
  const RESOURCES = [
    {href:'/programs', icon:'\U0001F5C2️', label:'Journeys'},
    {href:'/calendar', icon:'\U0001F4C5', label:'Calendar', feat:'tracker_calendar'}
  ];
  const TIER_ORDER = ['guide','companion','coach'];
  const PAGE_FEATURE = null;

  async function loadEnt(uid){
    const k='ent_'+uid, c=sessionStorage.getItem(k);
    if(c){try{return JSON.parse(c);}catch(e){}}
    try{
      const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});
      const d=await r.json(); sessionStorage.setItem(k,JSON.stringify(d)); return d;
    }catch(e){ return {products:[],tier:'guide',features:{}}; }
  }
  const can=(e,k)=>!k||(e&&e.features&&e.features[k]&&e.features[k].access===true);
  const mode=(e,k)=>(e&&e.features&&e.features[k]&&e.features[k].gate_mode)||'hidden';
  const tierIdx=t=>{const i=TIER_ORDER.indexOf(t);return i<0?0:i;};

  function navItem(it, locked){
    const path=location.pathname.replace(/\/$/,'')||'/dashboard';
    const base=it.href.split('?')[0].replace(/\/$/,'');
    const isActive=path===base;
    const cls='sni'+(isActive?' active':'')+(locked?' locked':'');
    const badge=it.comingSoon?'<span class="sb-badge-soon">Soon</span>':(locked?'<span class="sb-tier-lock">\U0001F512</span>':'');
    return `<a href="${locked?'#':it.href}" class="${cls}" data-feat="${it.feat||''}" data-upsell="${locked?'1':'0'}"><span class="sni-icon">${it.icon}</span>${it.label}${badge}</a>`;
  }

  function renderSidebar(ent){
    const mount=document.getElementById('sb-tiers');
    if(!mount)return;
    const myIdx=tierIdx(ent.tier||'guide');
    let html='';
    // Tier buckets — own tier + everything below open; higher tiers collapse + lock
    TIER_ORDER.forEach((key,idx)=>{
      const tier=TIER_NAV[key];
      const tierLocked=idx>myIdx;
      const items=tier.items.map(it=>navItem(it, tierLocked && !it.comingSoon)).join('');
      const open=idx<=myIdx;
      html+=`<div class="sb-tier"><div class="sb-tier-head${open?' open':''}${tierLocked?' locked':''}" onclick="sbToggleTier(this)">${tier.label}${tierLocked?'<span class="sb-tier-lock">\U0001F512</span>':''}<span class="sb-chev">▸</span></div><div class="sb-tier-items${open?' open':''}">${items}</div></div>`;
    });
    // Additional Resources — always visible; each item gated by its own feature
    const resItems=RESOURCES.map(it=>navItem(it, it.feat ? !can(ent,it.feat) : false)).join('');
    html+=`<div class="sb-tier"><div class="sb-tier-head open" onclick="sbToggleTier(this)">Additional Resources<span class="sb-chev">▸</span></div><div class="sb-tier-items open">${resItems}</div></div>`;
    mount.innerHTML=html;
    mount.querySelectorAll('a[data-upsell="1"]').forEach(a=>{
      a.addEventListener('click',e=>{e.preventDefault();window.location.href='/programs?unlock='+(a.dataset.feat||'');});
    });
    document.querySelectorAll('.sidebar > a.sni').forEach(a=>{
      const p=location.pathname.replace(/\/$/,'')||'/dashboard';
      a.classList.toggle('active',p===(a.getAttribute('href')||'').replace(/\/$/,''));
    });
    const planEl=document.getElementById('sb-plan');
    if(planEl){const t=ent.tier||'guide';planEl.textContent='Riley '+t.charAt(0).toUpperCase()+t.slice(1);}
  }
  window.sbToggleTier=function(head){
    head.classList.toggle('open');
    const items=head.nextElementSibling;
    if(items)items.classList.toggle('open');
  };

  function wall(ent,feat){
    const fmap={
      daily_checkin:{name:'Daily Check-In',need:'Riley Companion'},
      adaptive_programming:{name:'Your Daily Brief',need:'Riley Companion'},
      tracker_fitness:{name:'Workout Tracking',need:'Riley Companion'},
      tracker_nutrition:{name:'Nutrition Tracking',need:'Riley Companion'},
      tracker_sleep:{name:'Sleep Tracking',need:'Riley Companion'},
      tracker_finance:{name:'Financial Goals',need:'Riley Coach'},
      tracker_calendar:{name:'Calendar',need:'Riley Companion'},
      knowledge_graph:{name:'Your Knowledge Graph',need:'Riley Coach'}
    };
    const f=fmap[feat]||{name:'This feature',need:'a subscription'};
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;left:220px;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,7,6,0.92);backdrop-filter:blur(8px)';
    ov.innerHTML=`<div style="max-width:420px;text-align:center;padding:40px">
      <div style="font-size:44px;margin-bottom:20px">\U0001F512</div>
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:#f5f0e8;margin-bottom:12px">${f.name} is locked</div>
      <div style="font-size:14px;color:#8a8578;line-height:1.7;margin-bottom:28px">Unlock ${f.name.toLowerCase()} and Riley's full daily support with <strong style="color:#c9a84c">${f.need}</strong>. Riley adapts to where you are — and stays.</div>
      <a href="/programs?unlock=${feat}" style="display:inline-block;background:linear-gradient(135deg,#c9a84c,#d4942a);color:#0a0908;padding:13px 28px;font-size:13px;font-weight:600;text-decoration:none;border-radius:3px;letter-spacing:0.04em;box-shadow:0 4px 20px rgba(201,168,76,0.3)">Unlock with ${f.need} →</a>
      <div style="margin-top:16px"><a href="/dashboard" style="font-size:12px;color:#8a8578;text-decoration:none">← Back to Home</a></div>
    </div>`;
    document.body.appendChild(ov);
  }

  async function run(){
    if(typeof SB==='undefined')return;
    try{
      const {data:{session}}=await SB.auth.getSession();
      if(!session)return;
      const ent=await loadEnt(session.user.id);
      renderSidebar(ent);
      if(PAGE_FEATURE && !can(ent,PAGE_FEATURE)){
        if(mode(ent,PAGE_FEATURE)==='hidden') window.location.href='/dashboard';
        else wall(ent,PAGE_FEATURE);
      }
    }catch(e){console.error('gating:',e);}
  }
  if(document.readyState!=='loading')run();else document.addEventListener('DOMContentLoaded',run);
})();
</script>
</body>
</html>
