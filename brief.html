<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today's Brief — Riley · The 8:14 Project</title>
  <link rel="stylesheet" href="/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dashboard-auth.js"></script>
</head>
<body>

<div class="dash-layout">
  <div id="sidebar-mount"></div>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-title">Today's Brief</div>
        <div class="topbar-sub" id="brief-date"></div>
      </div>
    </div>

    <div class="dash-content">
      <div id="brief-container">
        <div class="loading-wrap"><div class="spinner"></div> Loading your brief…</div>
      </div>
    </div>
  </main>
</div>

<script>
const MODULE_META = {
  mindset:    { icon: '🧠', label: 'Mindset & Therapy' },
  workout:    { icon: '🏋️', label: 'Workout' },
  nutrition:  { icon: '🍳', label: 'Meals & Nutrition' },
  grocery:    { icon: '🛒', label: 'Grocery List' },
  linkedin:   { icon: '🎥', label: 'LinkedIn Post' },
  video:      { icon: '🎙', label: 'Video Script' },
  reading:    { icon: '📚', label: 'Reading Assignment' },
  podcast:    { icon: '🎧', label: 'Podcast' },
  meditation: { icon: '🙏', label: 'Meditation' },
  calendar:   { icon: '📅', label: 'Calendar Review' },
  priorities: { icon: '🎯', label: 'Top Priorities' },
  goals:      { icon: '📈', label: 'Weekly Goals' },
  financial:  { icon: '💰', label: 'Financial Check' },
  habits:     { icon: '📖', label: 'Habit Tracking' },
  sleep:      { icon: '😴', label: 'Sleep Review' },
  water:      { icon: '💧', label: 'Hydration Goal' },
  recovery:   { icon: '🚶', label: 'Recovery Walk' },
  reflection: { icon: '📷', label: 'Evening Reflection' },
};

(async () => {
  const ctx = await initDashboard();
  if (!ctx) return;
  const { user, client } = ctx;

  document.getElementById('sidebar-mount').innerHTML = renderSidebar('brief', user);
  document.getElementById('brief-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  const today = new Date().toISOString().split('T')[0];

  const { data: brief } = await client
    .from('daily_briefs')
    .select('*')
    .eq('user_id', user.id)
    .eq('brief_date', today)
    .maybeSingle();

  const container = document.getElementById('brief-container');

  if (!brief || !brief.modules || Object.keys(brief.modules).length === 0) {
    // No brief yet — coming soon state
    container.innerHTML = `
      <div style="max-width:600px">
        <div style="background:var(--ink);color:var(--parchment);padding:40px;border-radius:2px;margin-bottom:24px">
          <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px">Coming Soon</div>
          <div style="font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px">Your Daily Brief</div>
          <div style="font-size:14px;color:var(--smoke);line-height:1.6">
            Every morning at 6:00 AM, Riley will assemble a completely personalized brief for your day — mindset coaching, workout, meals, content, and more.<br><br>
            The module engine is being built now. Once live, your brief will be waiting for you every morning.
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--mist);border:1px solid var(--mist);border-radius:2px;overflow:hidden">
          ${Object.entries(MODULE_META).map(([key, m]) => `
            <div style="background:white;padding:18px 16px">
              <div style="font-size:22px;margin-bottom:6px">${m.icon}</div>
              <div style="font-size:12px;color:var(--smoke)">${m.label}</div>
            </div>`).join('')}
        </div>

        <div style="margin-top:24px;padding:20px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.3);border-radius:2px">
          <div style="font-size:13px;color:var(--ink);font-weight:500;margin-bottom:6px">While you wait</div>
          <div style="font-size:13px;color:var(--smoke);margin-bottom:14px">Talk to Riley now — every conversation shapes what goes into your brief.</div>
          <a href="https://riley.eight14.us" class="btn btn-dark">Talk to Riley →</a>
        </div>
      </div>`;
    return;
  }

  // Brief exists — render modules
  const modules = brief.modules;
  const completion = brief.completion || {};
  const moduleKeys = Object.keys(modules);

  container.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 280px;gap:24px">
      <div>
        <div style="background:var(--ink);color:var(--parchment);padding:24px;border-radius:2px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px">Daily Brief · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
            <div style="font-family:'DM Serif Display',serif;font-size:24px">Your ${new Date().toLocaleDateString('en-US',{weekday:'long'})} Blueprint</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--smoke);margin-bottom:6px">${brief.completed_modules} / ${brief.total_modules} complete</div>
            <div style="width:120px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-left:auto">
              <div style="height:100%;width:${brief.total_modules>0?(brief.completed_modules/brief.total_modules*100):0}%;background:var(--gold);border-radius:2px"></div>
            </div>
          </div>
        </div>

        ${moduleKeys.map(key => {
          const meta = MODULE_META[key] || { icon: '•', label: key };
          const done = completion[key];
          return `
            <div style="background:white;border:1px solid var(--mist);border-radius:2px;margin-bottom:12px;overflow:hidden">
              <div style="padding:16px 20px;border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between">
                <div style="display:flex;align-items:center;gap:10px">
                  <span style="font-size:20px">${meta.icon}</span>
                  <span style="font-size:14px;font-weight:600;color:var(--ink)">${meta.label}</span>
                </div>
                <button
                  id="complete-${key}"
                  onclick="markComplete('${key}', '${brief.id}')"
                  style="padding:6px 14px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:1px;border:1px solid ${done?'var(--green)':'var(--mist)'};background:${done?'rgba(74,124,89,.1)':'white'};color:${done?'var(--green)':'var(--smoke)'};font-weight:${done?'600':'400'}"
                >${done ? '✓ Done' : 'Mark complete'}</button>
              </div>
              <div style="padding:18px 20px;font-size:14px;color:var(--ink);line-height:1.7;white-space:pre-wrap">${escHtml(String(modules[key]))}</div>
            </div>`;
        }).join('')}
      </div>

      <!-- Sidebar -->
      <div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--smoke);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;padding-top:4px">Progress</div>
        <div style="background:white;border:1px solid var(--mist);border-radius:2px;padding:20px;margin-bottom:12px">
          ${moduleKeys.map(key => {
            const meta = MODULE_META[key] || { icon: '•', label: key };
            const done = completion[key];
            return `
              <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--mist)">
                <span>${meta.icon}</span>
                <span style="font-size:12px;color:${done?'var(--smoke)':'var(--ink)'};flex:1;${done?'text-decoration:line-through':''}">${meta.label}</span>
                ${done ? '<span style="color:var(--green);font-size:12px">✓</span>' : ''}
              </div>`;
          }).join('')}
        </div>
        <a href="https://riley.eight14.us" class="btn btn-dark" style="width:100%;justify-content:center">Talk to Riley →</a>
      </div>
    </div>`;

  window._briefClient = client;
  window._briefUserId = user.id;
})();

async function markComplete(moduleKey, briefId) {
  const { data: brief } = await _briefClient.from('daily_briefs').select('completion,completed_modules').eq('id', briefId).maybeSingle();
  if (!brief) return;

  const newCompletion = { ...brief.completion, [moduleKey]: true };
  const newCount = Object.values(newCompletion).filter(Boolean).length;

  await _briefClient.from('daily_briefs').update({
    completion: newCompletion,
    completed_modules: newCount
  }).eq('id', briefId);

  const btn = document.getElementById('complete-' + moduleKey);
  if (btn) {
    btn.textContent = '✓ Done';
    btn.style.borderColor = 'var(--green)';
    btn.style.background = 'rgba(74,124,89,.1)';
    btn.style.color = 'var(--green)';
    btn.style.fontWeight = '600';
  }
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
