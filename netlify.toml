[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "CLAUDE.md,riley-auth.html,riley-chat.js,dashboard.html,dashboard-auth.js,dashboard.css,conversations.html,tracker.html,programs.html,brief.html,workouts.html,nutrition.html,progress.html,sleep.html,finance.html,calendar.html,chat.html,login.html,community.html,journey.html,onboarding.html,lifemap.html,profile.html,settings.html,reset.html,home.html"
  # OPERATOR_KEY is an operator-chosen password; we never hardcode it, so scanning
  # the build for its value only false-positives (and fails the build) when the
  # chosen password happens to match a common word in the code.
  SECRETS_SCAN_OMIT_KEYS = "OPERATOR_KEY"

[functions]
  directory = "netlify/functions"

[functions."scout"]
  timeout = 26

[functions."sage"]
  timeout = 26

[functions."atlas"]
  timeout = 26

[functions."echo"]
  timeout = 26

[functions."riley-chat"]
  timeout = 30

[functions."auth-handler"]
  timeout = 26

[functions."feedhive-publish"]
  timeout = 26

[functions."pipeline-status"]
  timeout = 26

[functions."weekly-pipeline"]
  timeout = 26

[functions."admin-users"]
  timeout = 26

[functions."admin-engagement"]
  timeout = 26

[functions."admin-safety"]
  timeout = 10

[functions."admin-content"]
  timeout = 10

[functions."admin-programs"]
  timeout = 10

[functions."admin-pricing"]
  timeout = 10

[functions."admin-membership"]
  timeout = 10

# Public marketing-site pricing feed (v4) — no auth, cached 60s.
[functions."public-pricing"]
  timeout = 10


[functions."entitlements"]
  timeout = 10

[functions."site-config"]
  timeout = 10

# Client engagement tracker ingest (page views, logins, clicks, dwell)
[functions."track-event"]
  timeout = 10

# Operator Home dashboard analytics (client engagement, one aggregated call)
[functions."admin-home"]
  timeout = 10

[functions."riley-brain"]
  timeout = 10

# State-Change Engine — runs on Tier 1 events; persists user_daily_state + clarity.
[functions."state-engine"]
  timeout = 10

# Content interaction + feedback (§7) — Tier 2, feeds the recommendation engine.
[functions."content-event"]
  timeout = 10

# Daily check-in free-text crisis scan — deterministic, no LLM, fast.
[functions."checkin-scan"]
  timeout = 10

[functions."daily-brief"]
  timeout = 26

[functions."journey-step"]
  timeout = 26

# The 8:14 Reset AM (~8:14am) / PM (~8pm) web-push nudges — scheduled every 15 min;
# the function checks each member's local time + quiet hours + once-a-day dedup.
[functions."reset-nudge-cron"]
  schedule = "*/15 * * * *"

# Workout & Nutrition plan generator runs as a BACKGROUND function
# (plan-generate-background.js) — a full 7-day plan exceeds the synchronous
# timeout, so the -background suffix gives it up to 15 min. The client fires it
# and polls wellness_plans for the result. No timeout config needed here.

# HTTP-triggered background pipeline — no timeout, runs full Scout->Sage->Atlas
# The -background suffix tells Netlify to return 202 immediately and keep running
[functions."manual-pipeline-background"]

# Runs every Sunday 6am MT (12:00 UTC) as a background function
[functions."weekly-pipeline-cron"]
  schedule = "0 12 * * 0"

# ── AUTOMATED CONTENT ENGINE (content schema) ──────────────────────────────
# Admin queue API (list / approve→Echo→Buffer / revise / reject / counts)
[functions."content-queue"]
  timeout = 26

# Design template library manager (paste Canva Brand Template IDs)
[functions."content-templates"]
  timeout = 10

# Atlas render — Canva Connect Autofill (manual per-brief design / retry)
[functions."content-atlas"]
  timeout = 26

# HTTP-triggered manual run of the daily content pipeline (background, no timeout).
# Scout (live web search) -> candidates -> reposts fast-track / Sage briefs -> Sentinel -> queue.
[functions."content-run-background"]

# Scheduled daily content run — 6:00 AM Mountain (12:00 UTC). Runs as background.
[functions."content-daily-cron"]
  schedule = "0 12 * * *"

# Nightly performance pull (Buffer analytics -> content_performance_metrics) +
# weekly learnings digest (Sundays) that Sage reads. 23:30 MT = 05:30 UTC.
[functions."content-metrics-cron"]
  schedule = "30 5 * * *"

# Re-engagement win-back email — runs daily at 10am MT (16:00 UTC).
# Finds people ~1 week lapsed and sends one gentle "we saved your place" email.
[functions."reengagement-cron"]
  schedule = "0 16 * * *"

# Brief delivery — runs hourly, emails each person's brief at their chosen
# check-in time in THEIR timezone (morning/lunch/afternoon/evening).
[functions."brief-delivery-cron"]
  schedule = "0 * * * *"

# Crisis follow-up (Trust architecture §2.4) — gentle check-ins after a Level 2/3
# moment, at same-day / next-morning / 3-day / 7-day intervals. Honors opt-out.
# Runs at 01:00, 15:00, 21:00 UTC so stages land at humane hours.
[functions."crisis-followup-cron"]
  schedule = "0 1,15,21 * * *"

# ── Dashboard clean URLs (must come BEFORE the riley.meetriley.us catch-all) ──
# ===== eight14.us (RETIRED old domain) -> meetriley.us — force-forward EVERYTHING so no
# old eight14 link ever 404s. eight14.us was the pre-launch domain before the rebrand to
# meetriley.us (the sole canonical domain now); these 301s are the only place it survives.
# Placed before the per-path rules so these host-wide 301s win.
[[redirects]]
  from = "https://eight14.us/*"
  to = "https://meetriley.us/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.eight14.us/*"
  to = "https://www.meetriley.us/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://riley.eight14.us/*"
  to = "https://riley.meetriley.us/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://login.eight14.us/*"
  to = "https://login.meetriley.us/:splat"
  status = 301
  force = true

[[redirects]]
  # RETIRED admin host: admin.eight14.us used to SERVE the operator dashboard. It now
  # forwards to the operator dashboard on the canonical domain (meetriley.us/operator,
  # clean-URL -> operator.html) so nothing serves on the old eight14 domain and any old
  # admin.eight14.us bookmark still lands in the right place.
  from = "https://admin.eight14.us/*"
  to = "https://meetriley.us/operator"
  status = 301
  force = true

[[redirects]]
  from = "https://riley.meetriley.us/dashboard"
