<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--gold:#c9a84c;--gold2:#e8d5a3;--smoke:#8a8578;--smoke2:#5a5450;--green:#4aad72;--red:#c98a8a;--blue:#4a7ab0}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--ink2);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;padding:18px 0;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
.sb-logo{padding:0 20px 18px}
.sb-logo-mark{font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)}.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke);letter-spacing:0.16em;text-transform:uppercase;margin-top:2px}
.snl{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.16em;text-transform:uppercase;padding:14px 20px 6px}
.sni{display:flex;align-items:center;gap:10px;padding:9px 20px;color:var(--parchment);text-decoration:none;font-size:13px;opacity:0.8;transition:all .15s}
.sni:hover{opacity:1;background:rgba(255,255,255,0.03)}.sni.active{opacity:1;border-left:2px solid var(--gold);background:rgba(201,168,76,0.06)}
.sni-icon{font-size:15px;width:18px;text-align:center}
.sb-spacer{flex:1}
.sb-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-name{font-size:11px;color:var(--parchment);font-weight:500}.sb-plan{font-size:9px;color:var(--gold)}
.sb-out{margin-left:auto;background:none;border:none;color:var(--smoke2);font-size:14px;cursor:pointer}
.main{flex:1;overflow-y:auto}
.topbar{padding:18px 28px;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-family:'DM Serif Display',serif;font-size:22px}
.tb-sub{font-size:11px;color:var(--smoke);font-family:'DM Mono',monospace;letter-spacing:0.05em;margin-top:2px}
.btn{padding:9px 18px;font-size:13px;font-weight:600;border:none;border-radius:3px;cursor:pointer;text-decoration:none;display:inline-block;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),#d4942a);color:var(--ink)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--parchment);border:1px solid rgba(255,255,255,0.1)}
.content{padding:26px 28px;max-width:920px}
.intro{font-family:'DM Serif Display',serif;font-size:19px;line-height:1.5;color:var(--parchment);margin-bottom:6px}
.intro-sub{font-size:13px;color:var(--smoke);line-height:1.6;margin-bottom:24px;max-width:560px}
.fcard{background:linear-gradient(160deg,rgba(26,23,20,0.6),rgba(16,14,12,0.5));border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 20px;margin-bottom:14px}
.fhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.femoji{font-size:20px}
.ftitle{font-family:'DM Serif Display',serif;font-size:17px;color:var(--parchment)}
.fsub{font-size:11px;color:var(--smoke2);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--ink3);border:1px solid rgba(201,168,76,0.18);border-radius:20px;padding:7px 13px;font-size:13px;color:var(--parchment);line-height:1.4}
.chip .x{color:var(--smoke2);cursor:pointer;font-size:14px;margin-left:2px}.chip .x:hover{color:var(--red)}
.chip.riley{border-color:rgba(74,122,176,0.25)}
.empty{font-size:12px;color:var(--smoke2);font-style:italic;margin-bottom:12px}
.addrow{display:flex;gap:8px}
.addrow input{flex:1;background:var(--ink2);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:9px 12px;font-size:13px;font-family:inherit;color:var(--parchment);outline:none}
.addrow input:focus{border-color:var(--gold)}
.addrow button{background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);color:var(--gold);border-radius:4px;padding:0 14px;font-size:13px;cursor:pointer}
@media(max-width:760px){.sidebar{display:none}.content{padding:18px}}

.sb-tier{border-top:1px solid rgba(255,255,255,0.04)}
.sb-tier-head{display:flex;align-items:center;gap:6px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.16em;transition:color .15s;user-select:none}
.sb-tier-head:hover{color:var(--smoke)}
.sb-tier-head .sb-chev{margin-left:auto;font-size:8px;transition:transform .2s}
.sb-tier-head.open .sb-chev{transform:rotate(90deg)}
.sb-tier-head.locked{color:var(--smoke2)}
.sb-tier-lock{font-size:9px;opacity:0.7}
.sb-tier-items{display:none;flex-direction:column;overflow:hidden}
.sb-tier-items.open{display:flex}
.sb-tier-items .sni.locked{opacity:0.45;cursor:pointer}
.sb-badge-soon{margin-left:auto;font-size:7px;font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:2px 5px;border-radius:8px;letter-spacing:0.06em;text-transform:uppercase}
.sb-logo-mark{display:inline-flex !important;align-items:center;font-size:26px !important;color:#fff !important;line-height:1}.sb-logo-sun{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 12px rgba(201,168,76,0.5);animation:sbSunBreathe 5s ease-in-out infinite;flex-shrink:0;margin-right:9px}@keyframes sbSunBreathe{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.06);opacity:1}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark"><span class="sb-logo-sun"></span>Riley<span>.</span></div></div>
  <a href="/dashboard" class="sni"><span class="sni-icon">✨</span>Clarity</a>

</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB=supabase.createClient('https://tglljvjixlolaguycvbb.supabase.co','sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8');
let USER=null,UID=null;
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');}
async function doSignOut(){await SB.auth.signOut();window.location.href='https://riley.meetriley.us';}

// Facets shown on the page, in order. Riley auto-fills; members can add too.
const FACETS=[
  {k:'why',emoji:'🎯',title:'Your Why',sub:"The reason underneath everything. Riley will never let you forget it.",ph:'Why are you here? Why now?'},
  {k:'vision',emoji:'🌅',title:'Who You\'re Becoming',sub:'One year, five years, the long game.',ph:'A hope for your life…'},
  {k:'recovery_dna',emoji:'🌿',title:'What Keeps You Steady',sub:'Your Recovery DNA - what actually works for YOU.',ph:'Walking, prayer, family, fitness…'},
  {k:'win',emoji:'🏆',title:'Wins',sub:'Every victory, however small. You remember failures - Riley remembers these.',ph:'Something you did, big or small…'},
  {k:'joy',emoji:'☀️',title:'What Brings You Joy',sub:"The things worth protecting. When you're low, Riley points you back here.",ph:'Hiking, music, dogs, coffee…'},
  {k:'relationship',emoji:'🤝',title:'People Who Matter',sub:'The ones you carry. Riley remembers to ask about them.',ph:'A person and who they are to you…'},
  {k:'fear',emoji:'🌊',title:'Fears',sub:'Name them, and Riley coaches around them - gently.',ph:"Something you're afraid of…"},
  {k:'value',emoji:'💎',title:'Values',sub:'What you stand for.',ph:'A value you live by…'},
  {k:'strength',emoji:'💪',title:'Strengths',sub:'What you are good at, even when you forget it.',ph:'A strength of yours…'},
  {k:'energy',emoji:'⚡',title:'Your Energy Rhythms',sub:'When you have energy, when you crash - so Riley times things right.',ph:'e.g. sharp in the mornings, wiped by 3pm'}
];

// The Life Map IS the Knowledge Graph - the Riley Coach pillar (v4 pricing).
// Checked fresh on every load (server re-checks, never trust a client cache).
async function knowledgeGraphEntitled(){
  try{
    const tok=(await SB.auth.getSession()).data.session?.access_token;
    const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok})});
    const d=await r.json();
    return !!(d&&d.features&&d.features.knowledge_graph&&d.features.knowledge_graph.access);
  }catch(e){return true;} // fail open - never block on a network hiccup
}
function lockedPage(){
  document.querySelector('.content').innerHTML=`<div class="fcard" style="text-align:center;max-width:480px;margin:60px auto"><div style="font-size:40px;margin-bottom:14px;opacity:0.7">🔒</div><div class="ftitle" style="font-size:20px;margin-bottom:8px">Your Life Map</div><div class="fsub" style="margin-bottom:20px">Riley remembers who you're becoming - your wins, your why, your whole story - as a living map that deepens over time. Part of Riley Coach.</div><a href="/programs?unlock=knowledge_graph" class="btn btn-gold" style="text-decoration:none;padding:12px 26px">Unlock with Riley Coach →</a></div>`;
}
async function boot(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){window.location.href='https://riley.meetriley.us';return;}
  USER=session.user;UID=USER.id;
  const meta=USER.user_metadata||{};
  const fullName=meta.full_name||meta.name||USER.email.split('@')[0]||'Member';
  const initials=fullName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
  const av=document.getElementById('sb-av');if(av){if(meta.avatar_url||meta.picture)av.innerHTML='<img src="'+(meta.avatar_url||meta.picture)+'" alt="'+initials+'">';else av.textContent=initials;}
  document.getElementById('sb-name').textContent=fullName;
  document.getElementById('tb-date').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
  if(!(await knowledgeGraphEntitled())){return lockedPage();}
  loadLifeScore();loadInsights();loadManual();
  await loadMap();
  loadTimeline();loadStory();loadLegacy();
}
// ── Story Engine - "This is who you became" ─────────────────────────────────
async function loadStory(){
  const slot=document.getElementById('story-slot');if(!slot)return;
  let doc=null;try{const {data}=await SB.from('member_docs').select('body').eq('user_id',UID).eq('doc_type','story').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();doc=data&&data.body;}catch(e){}
  if(doc&&doc.sections)renderStory(slot,doc);
  else slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">📖</span><span class="ftitle">Your Story</span></div><div class="fsub">Every conversation becomes part of your story. Whenever you want, Riley writes the chapter - "this is who you became." It grows richer every month.</div><button class="btn btn-gold" onclick="generateStory()">Write my story so far →</button></div>`;
}
function renderStory(slot,doc){
  const secs=(doc.sections||[]).map(s=>`<div style="margin-top:14px"><div style="font-family:'DM Serif Display',serif;font-size:15px;color:var(--gold2);margin-bottom:4px">${esc(s.heading||'')}</div><div style="font-size:13.5px;color:var(--parchment);line-height:1.7">${esc(s.body||'')}</div></div>`).join('');
  slot.innerHTML=`<div class="fcard" style="background:linear-gradient(160deg,rgba(30,26,20,0.7),rgba(16,14,12,0.5))"><div class="fhead" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><span class="femoji">📖</span><span class="ftitle">${esc(doc.title||'Your Story')}</span></div><button class="btn btn-ghost" style="font-size:10px;padding:5px 12px" onclick="generateStory()">↻ Rewrite</button></div>${secs}</div>`;
}
async function generateStory(){
  const slot=document.getElementById('story-slot');
  slot.innerHTML=`<div class="fcard"><div class="fsub" style="text-align:center;padding:22px 0">📖 Riley is writing your story - about 30 seconds…</div></div>`;
  let prev=null;try{const {data}=await SB.from('member_docs').select('created_at').eq('user_id',UID).eq('doc_type','story').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();prev=data&&data.created_at;}catch(e){}
  try{const tok=(await SB.auth.getSession()).data.session?.access_token;fetch('/.netlify/functions/member-doc-background',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok,doc_type:'story'})}).catch(function(){});}catch(e){}
  let tries=0;const poll=async()=>{tries++;let d=null;try{const {data}=await SB.from('member_docs').select('body,created_at').eq('user_id',UID).eq('doc_type','story').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();d=data;}catch(e){}
    if(d&&d.body&&d.body.sections&&d.created_at!==prev)return renderStory(slot,d.body);
    if(tries>=22)return loadStory();
    setTimeout(poll,4000);};
  setTimeout(poll,6000);
}
// ── The Legacy Vault ────────────────────────────────────────────────────────
const LEGACY_TYPES=[['letter','A letter'],['lesson','A life lesson'],['value','A value to pass on'],['advice','Advice'],['recipe','A recipe'],['note','A note']];
async function loadLegacy(){
  const slot=document.getElementById('legacy-slot');if(!slot)return;
  let rows=[];try{const {data}=await SB.from('legacy_vault').select('id,entry_type,title,recipient,body').eq('user_id',UID).eq('is_active',true).order('created_at',{ascending:false});rows=data||[];}catch(e){}
  const list=rows.length?rows.map(r=>`<div style="background:var(--ink3);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:13px 15px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px"><div style="font-family:'DM Serif Display',serif;font-size:14px;color:var(--parchment)">${esc(r.title||'(untitled)')}</div><span style="color:var(--smoke2);cursor:pointer;font-size:15px" onclick="removeLegacy('${r.id}')">×</span></div><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--smoke2);margin:2px 0 6px">${esc(((LEGACY_TYPES.find(t=>t[0]===r.entry_type)||[])[1])||r.entry_type)}${r.recipient?' · for '+esc(r.recipient):''}</div><div style="font-size:13px;color:var(--smoke);line-height:1.6;white-space:pre-wrap">${esc(r.body||'')}</div></div>`).join(''):`<div class="empty">Nothing here yet. Start with one letter, one lesson, one recipe. It compounds into something the people you love will keep.</div>`;
  const opts=LEGACY_TYPES.map(t=>`<option value="${t[0]}">${t[1]}</option>`).join('');
  const inp='background:var(--ink2);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px 10px;font-size:13px;color:var(--parchment);font-family:inherit';
  slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">🕯️</span><span class="ftitle">The Legacy Vault</span></div><div class="fsub">The things worth keeping - letters, lessons, recipes, values. What you'd want the people you love to have.</div>${list}<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px"><div style="display:flex;gap:8px;margin-bottom:8px"><select id="lg-type" style="flex:1;${inp}">${opts}</select><input id="lg-to" placeholder="For whom? (optional)" style="flex:1;${inp}"></div><input id="lg-title" placeholder="Title" style="width:100%;${inp};margin-bottom:8px"><textarea id="lg-body" placeholder="Write it here…" rows="4" style="width:100%;${inp};line-height:1.6;resize:vertical"></textarea><button class="btn btn-gold" style="margin-top:8px" onclick="addLegacy()">Save to vault</button></div></div>`;
}
async function addLegacy(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():'';};
  const body=g('lg-body');if(!body)return;
  try{await SB.from('legacy_vault').insert({user_id:UID,entry_type:g('lg-type')||'note',title:g('lg-title')||null,recipient:g('lg-to')||null,body:body.slice(0,5000)});}catch(e){}
  await loadLegacy();
}
async function removeLegacy(id){try{await SB.from('legacy_vault').update({is_active:false}).eq('id',id);}catch(e){}await loadLegacy();}
// ── Habit Intelligence - patterns from the member's own data ────────────────
async function loadInsights(){
  const slot=document.getElementById('insights-slot');if(!slot)return;
  let ci=[];
  try{const {data}=await SB.from('daily_checkins').select('mood,sleep_hours,checkin_date').eq('user_id',UID).order('checkin_date',{ascending:false}).limit(90);ci=data||[];}catch(e){}
  const both=ci.filter(c=>c.mood!=null&&c.sleep_hours!=null);
  const ins=[];
  if(both.length>=6){
    const good=both.filter(c=>c.sleep_hours>=7.5),poor=both.filter(c=>c.sleep_hours<6);
    if(good.length>=3&&poor.length>=3){const ag=good.reduce((a,c)=>a+c.mood,0)/good.length,ap=poor.reduce((a,c)=>a+c.mood,0)/poor.length;if(ag-ap>=0.4)ins.push("When you sleep <b>7.5+ hours</b>, your mood runs noticeably higher than on short nights. Sleep is one of your biggest levers.");}
  }
  const recent=ci.slice(0,7).filter(c=>c.mood!=null).map(c=>c.mood),prior=ci.slice(7,14).filter(c=>c.mood!=null).map(c=>c.mood);
  if(recent.length>=3&&prior.length>=3){const ar=recent.reduce((a,b)=>a+b,0)/recent.length,ap=prior.reduce((a,b)=>a+b,0)/prior.length;if(ar-ap>=0.5)ins.push("Your mood has been <b>trending up</b> this past week versus the one before. Whatever you're doing - keep it.");else if(ap-ar>=0.5)ins.push("This week has been a little heavier than last. That happens - be gentle, and lean on what steadies you.");}
  if(!ins.length){slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">🔎</span><span class="ftitle">What Riley's Noticing</span></div><div class="fsub">Keep checking in and logging - Riley starts spotting your real patterns here (like how sleep moves your mood).</div></div>`;return;}
  slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">🔎</span><span class="ftitle">What Riley's Noticing</span></div><div class="fsub">Patterns from your own data - not advice, just what's true for you.</div>${ins.map(i=>`<div style="font-size:13.5px;color:var(--parchment);line-height:1.6;padding:8px 0;border-top:1px solid rgba(255,255,255,0.05)">${i}</div>`).join('')}</div>`;
}
// ── Personal Operating Manual ("My User Manual") ────────────────────────────
async function loadManual(){
  const slot=document.getElementById('manual-slot');if(!slot)return;
  let doc=null;
  try{const {data}=await SB.from('member_docs').select('body').eq('user_id',UID).eq('doc_type','manual').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();doc=data&&data.body;}catch(e){}
  if(doc&&doc.sections)renderManual(slot,doc);
  else slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">📘</span><span class="ftitle">My User Manual</span></div><div class="fsub">Riley can write the manual to YOU that you've never written - how you work, what overwhelms you, how to be there for you. Built from everything she knows.</div><button class="btn btn-gold" onclick="generateManual()">Write my manual →</button></div>`;
}
function renderManual(slot,doc){
  const secs=(doc.sections||[]).map(s=>`<div style="margin-top:12px"><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px">${esc(s.title)}</div>${(s.items||[]).map(it=>`<div style="font-size:13px;color:var(--parchment);line-height:1.55;padding:1px 0">· ${esc(it)}</div>`).join('')}</div>`).join('');
  slot.innerHTML=`<div class="fcard"><div class="fhead" style="justify-content:space-between"><div style="display:flex;align-items:center;gap:10px"><span class="femoji">📘</span><span class="ftitle">My User Manual</span></div><button class="btn btn-ghost" style="font-size:10px;padding:5px 12px" onclick="generateManual()">↻ Refresh</button></div>${doc.summary?`<div style="font-size:13.5px;color:var(--parchment);line-height:1.65;font-style:italic;margin-top:4px">${esc(doc.summary)}</div>`:''}${secs}</div>`;
}
async function generateManual(){
  const slot=document.getElementById('manual-slot');
  slot.innerHTML=`<div class="fcard"><div class="fsub" style="text-align:center;padding:22px 0">📘 Riley is writing your manual - about 30 seconds…</div></div>`;
  let prev=null;try{const {data}=await SB.from('member_docs').select('created_at').eq('user_id',UID).eq('doc_type','manual').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();prev=data&&data.created_at;}catch(e){}
  try{const tok=(await SB.auth.getSession()).data.session?.access_token;fetch('/.netlify/functions/member-doc-background',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID,token:tok,doc_type:'manual'})}).catch(function(){});}catch(e){}
  let tries=0;const poll=async()=>{tries++;let d=null;try{const {data}=await SB.from('member_docs').select('body,created_at').eq('user_id',UID).eq('doc_type','manual').eq('is_active',true).order('created_at',{ascending:false}).limit(1).maybeSingle();d=data;}catch(e){}
    if(d&&d.body&&d.body.sections&&d.created_at!==prev)return renderManual(slot,d.body);
    if(tries>=22)return loadManual();
    setTimeout(poll,4000);};
  setTimeout(poll,6000);
}
// ── Life Timeline - the shape of the story so far ───────────────────────────
async function loadTimeline(){
  const slot=document.getElementById('timeline-slot');if(!slot)return;
  let events=[],dates=[],sober=null;
  try{const R=await Promise.allSettled([
    SB.from('life_events').select('event_type,notes,created_at').eq('user_id',UID).order('created_at',{ascending:true}),
    SB.from('important_dates').select('label,event_year,event_month,event_day').eq('user_id',UID),
    SB.from('sobriety_tracker').select('start_date').eq('user_id',UID).eq('is_active',true).order('start_date',{ascending:true}).limit(1)
  ]);const v=r=>r.status==='fulfilled'?r.value.data:null;events=v(R[0])||[];dates=v(R[1])||[];const s=(v(R[2])||[])[0];sober=s?s.start_date:null;}catch(e){}
  const items=[];
  if(USER&&USER.created_at)items.push({d:new Date(USER.created_at),t:'You started with Riley',e:'🐦'});
  if(sober)items.push({d:new Date(sober),t:'Your sobriety began',e:'🌱'});
  events.forEach(ev=>items.push({d:new Date(ev.created_at),t:(ev.notes||ev.event_type||'A life moment'),e:'•'}));
  dates.forEach(dt=>{if(dt.event_year&&dt.event_month&&dt.event_day)items.push({d:new Date(dt.event_year,dt.event_month-1,dt.event_day),t:dt.label,e:'📅'});});
  items.sort((a,b)=>a.d-b.d);
  if(!items.length){slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">🧭</span><span class="ftitle">Your Timeline</span></div><div class="fsub">As you share the moments that shaped you - losses, turning points, victories - Riley maps them here, so she understands your story, not just today.</div></div>`;return;}
  const rows=items.map(it=>`<div style="display:flex;gap:12px;padding:8px 0"><div style="font-size:15px;width:22px;text-align:center;flex-shrink:0">${it.e}</div><div><div style="font-size:13.5px;color:var(--parchment);line-height:1.5">${esc(it.t)}</div><div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--smoke2)">${isNaN(it.d)?'':it.d.toLocaleDateString('en-US',{month:'short',year:'numeric'})}</div></div></div>`).join('');
  slot.innerHTML=`<div class="fcard"><div class="fhead"><span class="femoji">🧭</span><span class="ftitle">Your Timeline</span></div><div class="fsub">Context, not just facts - the shape of your story so far.</div><div style="border-left:1px solid rgba(201,168,76,0.2);padding-left:14px;margin-left:6px;margin-top:6px">${rows}</div></div>`;
}
// ── Life Score wheel - a mirror of life balance across the dimensions ────────
async function loadLifeScore(){
  const wslot=document.getElementById('wheel-slot');if(!wslot)return;
  const wk=new Date();wk.setDate(wk.getDate()-7);const wkISO=wk.toLocaleDateString('en-CA');
  const ten=new Date();ten.setDate(ten.getDate()-10);const tenISO=ten.toLocaleDateString('en-CA');
  let ci=[],fit=0,nut=0,habits=[],comps=[],sober=null,facets=[];
  try{
    const R=await Promise.allSettled([
      SB.from('daily_checkins').select('mood,sleep_hours,notes,checkin_date').eq('user_id',UID).gte('checkin_date',tenISO).order('checkin_date',{ascending:false}),
      SB.from('fitness_logs').select('*',{count:'exact',head:true}).eq('user_id',UID).gte('logged_date',wkISO),
      SB.from('nutrition_logs').select('*',{count:'exact',head:true}).eq('user_id',UID).gte('logged_date',wkISO),
      SB.from('habits').select('id').eq('user_id',UID).eq('is_active',true),
      SB.from('habit_completions').select('habit_id').eq('user_id',UID).gte('completed_date',wkISO),
      SB.from('sobriety_tracker').select('start_date').eq('user_id',UID).eq('is_active',true).order('start_date',{ascending:false}).limit(1),
      SB.from('life_map').select('facet').eq('user_id',UID).eq('is_active',true)
    ]);
    const v=r=>r.status==='fulfilled'?r.value:{};
    ci=v(R[0]).data||[];fit=v(R[1]).count||0;nut=v(R[2]).count||0;habits=v(R[3]).data||[];comps=v(R[4]).data||[];const s=(v(R[5]).data||[])[0];sober=s?s.start_date:null;facets=(v(R[6]).data||[]).map(x=>x.facet);
  }catch(e){}
  const clamp=n=>Math.max(0,Math.min(100,Math.round(n)));
  const moods=ci.filter(c=>c.mood!=null).map(c=>c.mood);
  const latestSleep=(ci.find(c=>c.sleep_hours!=null)||{}).sleep_hours;
  const checkinDays=new Set(ci.filter(c=>c.checkin_date>=wkISO).map(c=>c.checkin_date)).size;
  const reflWk=ci.filter(c=>c.checkin_date>=wkISO&&c.notes&&String(c.notes).trim()).length;
  const habitRate=habits.length?comps.length/(habits.length*7)*100:null;
  const soberDays=sober?window.RileyDay.soberDays(sober):null;
  const cnt=f=>facets.filter(x=>x===f).length;
  const avgMood=moods.length?moods.reduce((a,b)=>a+b,0)/moods.length:null;
  const raw=[
    {label:'RECOVERY',val:soberDays!=null?clamp(100*(1-Math.exp(-soberDays/35))):(cnt('recovery_dna')?60:null)},
    {label:'SLEEP',val:latestSleep!=null?clamp(latestSleep/8*100):null},
    {label:'MOVE',val:clamp(fit/3*100)},
    {label:'FOOD',val:clamp(nut/14*100)},
    {label:'PURPOSE',val:habitRate!=null?clamp(habitRate*0.7+((cnt('why')||cnt('vision'))?30:0)):((cnt('why')||cnt('vision'))?55:null)},
    {label:'PEOPLE',val:clamp(checkinDays/7*40+Math.min(60,cnt('relationship')*15))},
    {label:'JOY',val:clamp(Math.min(100,cnt('joy')*22))},
    {label:'CALM',val:avgMood!=null?clamp((avgMood-1)/4*100):null},
    {label:'REFLECT',val:clamp(reflWk/5*100)}
  ];
  const dims=raw.map(d=>({label:d.label,val:d.val==null?0:d.val,has:d.val!=null}));
  wslot.innerHTML=`<div class="fcard" style="text-align:center"><div class="fhead" style="justify-content:center"><span class="femoji">🧭</span><span class="ftitle">Your Life Balance</span></div><div class="fsub" style="text-align:center">Not a grade - a mirror. Where is life full, and where is it asking for attention?</div>${drawWheel(dims)}<div style="font-size:11.5px;color:var(--smoke2);margin-top:4px">The more you check in, log, and talk with Riley, the truer this becomes.</div></div>`;
}
function drawWheel(dims){
  const cx=150,cy=150,r=105,n=dims.length;
  const ang=i=>(-Math.PI/2)+(i*2*Math.PI/n);
  const pt=(i,rad)=>[cx+rad*Math.cos(ang(i)),cy+rad*Math.sin(ang(i))];
  let grid='';[0.25,0.5,0.75,1].forEach(f=>{grid+=`<polygon points="${dims.map((d,i)=>pt(i,r*f).join(',')).join(' ')}" fill="none" stroke="rgba(255,255,255,0.06)"/>`;});
  let axes='',labels='';dims.forEach((d,i)=>{const p=pt(i,r);axes+=`<line x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}" stroke="rgba(255,255,255,0.06)"/>`;const l=pt(i,r+20);labels+=`<text x="${l[0]}" y="${l[1]}" font-size="8.5" fill="${d.has?'#8a8578':'#5a5450'}" text-anchor="middle" dominant-baseline="middle" font-family="DM Mono,monospace">${d.label}</text>`;});
  const vpoly=dims.map((d,i)=>pt(i,r*Math.max(0.02,d.val/100)).join(',')).join(' ');
  return `<svg viewBox="0 0 300 300" width="300" height="300" style="max-width:100%;margin:6px auto 0;display:block"><defs><radialGradient id="wg"><stop offset="0%" stop-color="rgba(201,168,76,0.4)"/><stop offset="100%" stop-color="rgba(74,173,114,0.12)"/></radialGradient></defs>${grid}${axes}<polygon points="${vpoly}" fill="url(#wg)" stroke="#c9a84c" stroke-width="1.5"/>${labels}</svg>`;
}
async function loadMap(){
  let rows=[];
  try{const {data}=await SB.from('life_map').select('id,facet,content,source').eq('user_id',UID).eq('is_active',true).order('created_at',{ascending:false});rows=data||[];}catch(e){}
  const by={};rows.forEach(r=>{(by[r.facet]=by[r.facet]||[]).push(r);});
  const slot=document.getElementById('map-slot');
  slot.innerHTML=FACETS.map(f=>{
    const items=by[f.k]||[];
    const chips=items.length?items.map(r=>`<span class="chip${r.source==='conversation'?' riley':''}">${esc(r.content)}<span class="x" onclick="removeEntry('${r.id}')">×</span></span>`).join(''):`<div class="empty">Nothing here yet - add one below, or just talk to Riley.</div>`;
    return `<div class="fcard"><div class="fhead"><span class="femoji">${f.emoji}</span><span class="ftitle">${f.title}</span></div><div class="fsub">${f.sub}</div><div class="chips">${chips}</div><div class="addrow"><input id="in-${f.k}" placeholder="${esc(f.ph)}" onkeydown="if(event.key==='Enter')addEntry('${f.k}')"><button onclick="addEntry('${f.k}')">Add</button></div></div>`;
  }).join('');
}
async function addEntry(facet){
  const el=document.getElementById('in-'+facet);const v=el&&el.value.trim();if(!v)return;
  el.value='';el.disabled=true;
  try{await SB.from('life_map').insert({user_id:UID,facet:facet,content:v.slice(0,300),source:'member'});}catch(e){}
  el.disabled=false;await loadMap();
  const nel=document.getElementById('in-'+facet);if(nel)nel.focus();
}
async function removeEntry(id){
  try{await SB.from('life_map').update({is_active:false}).eq('id',id);}catch(e){}
  await loadMap();
}
boot();
</script>
<script>
/* ── SIDEBAR + ENTITLEMENT GATING (shared) ────────────────────────────────── */
(function(){
  // v2.3 C: flat, clarity-centric nav. The hardcoded "Clarity" link above is the home;
  // Movement/Nourishment/Rest/Reflection are reachable as rows on the Clarity (Today) page.
  const NAV = [
    {href:'/chat', icon:'💬', label:'Talk to Riley'},
    {href:'/lifemap', icon:'🗺️', label:'Life Map'},
    {href:'/programs', icon:'🗂️', label:'Programs'},
    {href:'/library', icon:'📚', label:'Library'},
    {href:'/settings', icon:'⚙️', label:'Account'}
  ];
  const TIER_NAV = {}; const RESOURCES = []; const TIER_ORDER = [];  // retired (kept as no-ops for any stray refs)
  const PAGE_FEATURE = null;

  async function loadEnt(uid){
    const k='ent_'+uid, c=sessionStorage.getItem(k);
    if(c){try{return JSON.parse(c);}catch(e){}}
    try{
      const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid,token:(await SB.auth.getSession()).data.session?.access_token||null})});
      const d=await r.json(); sessionStorage.setItem(k,JSON.stringify(d)); return d;
    }catch(e){ return {products:[],tier:'guide',features:{}}; }
  }
  const can=(e,k)=>!k||(e&&e.features&&e.features[k]&&e.features[k].access===true);
  const mode=(e,k)=>(e&&e.features&&e.features[k]&&e.features[k].gate_mode)||'hidden';
  const tierIdx=t=>{const i=TIER_ORDER.indexOf(t);return i<0?0:i;};

  function navItem(it, locked){
    const path=location.pathname.replace(/\/$/,'')||'/dashboard';
    const base=it.href.split('?')[0].replace(/\/$/,'');
    const isActive=path===base;
    const cls='sni'+(isActive?' active':'')+(locked?' locked':'');
    const badge=it.comingSoon?'<span class="sb-badge-soon">Soon</span>':(locked?'<span class="sb-tier-lock">🔒</span>':'');
    return `<a href="${locked?'#':it.href}" class="${cls}" data-feat="${it.feat||''}" data-upsell="${locked?'1':'0'}"><span class="sni-icon">${it.icon}</span>${it.label}${badge}</a>`;
  }

  function renderSidebar(ent){
    const mount=document.getElementById('sb-tiers');
    if(!mount)return;
    // v2.3 C: flat nav render (no tier sections). navItem renders an .sni link with active state.
    mount.innerHTML=NAV.map(it=>navItem(it,false)).join('');
    document.querySelectorAll('.sidebar a.sni, #sb-tiers a.sni').forEach(a=>{
      const p=location.pathname.replace(/\/$/,'')||'/dashboard';
      a.classList.toggle('active',p===(a.getAttribute('href')||'').replace(/\/$/,''));
    });
    const planEl=document.getElementById('sb-plan');
    if(planEl){const t=ent.tier||'guide';const TL={guide:'Companion',reset_free:'Companion',companion:'Coach',coach:'Mentor',mentor:'Mentor',concierge:'Mentor',alacarte:'Self-guided'};planEl.textContent='Riley '+(TL[t]||(t.charAt(0).toUpperCase()+t.slice(1)));}
  }
  window.sbToggleTier=function(head){
    head.classList.toggle('open');
    const items=head.nextElementSibling;
    if(items)items.classList.toggle('open');
  };

  function wall(ent,feat){
    const fmap={
      daily_checkin:{name:'Daily Check-In',need:'Riley Coach'},
      adaptive_programming:{name:'Your Daily Brief',need:'Riley Coach'},
      tracker_fitness:{name:'Workout Tracking',need:'Riley Coach'},
      tracker_nutrition:{name:'Nutrition Tracking',need:'Riley Coach'},
      tracker_sleep:{name:'Sleep Tracking',need:'Riley Coach'},
      tracker_finance:{name:'Financial Goals',need:'Riley Coach'},
      tracker_calendar:{name:'Calendar',need:'Riley Coach'},
      knowledge_graph:{name:'Your Life Map',need:'Riley Coach'}
    };
    const f=fmap[feat]||{name:'This feature',need:'a subscription'};
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;left:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,7,6,0.92);backdrop-filter:blur(8px)';
    ov.innerHTML=`<div style="max-width:420px;text-align:center;padding:40px">
      <div style="font-size:44px;margin-bottom:20px">🔒</div>
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:#f5f0e8;margin-bottom:12px">${f.name} is locked</div>
      <div style="font-size:14px;color:#8a8578;line-height:1.7;margin-bottom:28px">Unlock ${f.name.toLowerCase()} and Riley's full daily support with <strong style="color:#c9a84c">${f.need}</strong>. Riley adapts to where you are - and stays.</div>
      <a href="/programs?unlock=${feat}" style="display:inline-block;background:linear-gradient(135deg,#c9a84c,#d4942a);color:#0a0908;padding:13px 28px;font-size:13px;font-weight:600;text-decoration:none;border-radius:3px;letter-spacing:0.04em;box-shadow:0 4px 20px rgba(201,168,76,0.3)">Unlock with ${f.need} →</a>
      <div style="margin-top:16px"><a href="/dashboard" style="font-size:12px;color:#8a8578;text-decoration:none">← Back to Home</a></div>
    </div>`;
    document.body.appendChild(ov);
  }

  async function run(){
    if(typeof SB==='undefined')return;
    try{
      const {data:{session}}=await SB.auth.getSession();
      if(!session)return;
      const ent=await loadEnt(session.user.id);
      renderSidebar(ent);
      if(PAGE_FEATURE && !can(ent,PAGE_FEATURE)){
        if(mode(ent,PAGE_FEATURE)==='hidden') window.location.href='/dashboard';
        else wall(ent,PAGE_FEATURE);
      }
    }catch(e){console.error('gating:',e);}
  }
  if(document.readyState!=='loading')run();else document.addEventListener('DOMContentLoaded',run);
})();
</script>
