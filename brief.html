<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0908">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riley">
<title>Daily Brief — Riley</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0a0908;--ink2:#141210;--ink3:#1c1a18;--parchment:#f5f0e8;--warm:#faf8f4;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.12);--green:#3a7c56;--green2:#4aad72;--red:#8b3a3a;--mist:rgba(255,255,255,0.06);--smoke:#8a8578;--smoke2:#5a5450;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--parchment);min-height:100vh}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--ink2);border-right:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sb-logo-mark{font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)}
.sb-logo-mark span{color:var(--gold)}
.sb-logo-sub{font-size:10px;color:var(--smoke);margin-top:2px}
.snl{font-family:'DM Mono',monospace;font-size:8px;color:var(--smoke2);letter-spacing:0.2em;text-transform:uppercase;padding:12px 20px 3px}
.sni{display:flex;align-items:center;gap:9px;padding:8px 20px;text-decoration:none;font-size:12px;color:var(--smoke);transition:all .15s;border-left:2px solid transparent}
.sni:hover{color:var(--parchment);background:rgba(255,255,255,0.03);border-left-color:rgba(201,168,76,0.4)}
.sni.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}
.sni-icon{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-spacer{flex:1}
.sb-user{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px}
.sb-av{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.sb-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.sb-name{font-size:11px;color:var(--parchment);font-weight:500}
.sb-plan{font-size:9px;color:var(--gold)}
.sb-out{margin-left:auto;background:none;border:none;color:var(--smoke2);font-size:14px;cursor:pointer}
.sb-out:hover{color:var(--red)}
.main{overflow-y:auto}
.topbar{padding:18px 28px;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.tb-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment)}
.tb-sub{font-size:11px;color:var(--smoke);margin-top:2px;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.tb-actions{display:flex;gap:8px}
.btn{display:inline-block;padding:7px 16px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;border-radius:2px;transition:opacity .15s;text-decoration:none;letter-spacing:0.04em}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--parchment);border:1px solid rgba(255,255,255,0.1)}
.btn-gold{background:var(--gold);color:var(--ink)}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
.content{padding:24px 28px}
.card{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:22px;margin-bottom:16px}
.card-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--parchment);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--smoke);margin-bottom:18px;line-height:1.5}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.12em}
.field input,.field select,.field textarea{background:var(--ink3);border:1px solid rgba(255,255,255,0.1);border-radius:2px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--parchment);outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field input::placeholder,.field textarea::placeholder{color:var(--smoke2)}
.field select option{background:var(--ink3)}
.field textarea{resize:vertical;min-height:72px}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:14px}
.alert{padding:10px 14px;border-radius:2px;font-size:12px;margin-top:10px;display:none;border:1px solid;font-family:'DM Mono',monospace;letter-spacing:0.04em}
.alert-ok{background:rgba(74,173,114,0.1);color:var(--green2);border-color:rgba(74,173,114,0.25)}
.alert-err{background:rgba(139,58,58,0.1);color:#e07070;border-color:rgba(139,58,58,0.25)}
.divider{border-top:1px solid rgba(255,255,255,0.06);margin:18px 0;padding-top:18px}
.mini-head{font-size:11px;font-weight:600;color:var(--parchment);margin-bottom:12px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--ink2);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:16px}
.sv{font-family:'DM Serif Display',serif;font-size:28px;color:var(--parchment);line-height:1;margin-bottom:4px}
.sl{font-size:9px;font-family:'DM Mono',monospace;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.1em}
.log-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.03);border-radius:3px;overflow:hidden;margin-top:12px}
.log-row{background:var(--ink2);padding:11px 16px;display:flex;align-items:center;gap:12px;transition:background .12s}
.log-row:hover{background:var(--ink3)}
.log-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.log-info{flex:1;min-width:0}
.log-title{font-size:12px;font-weight:500;color:var(--parchment)}
.log-detail{font-size:11px;color:var(--smoke);margin-top:2px}
.log-date{font-size:10px;color:var(--smoke2);font-family:'DM Mono',monospace;white-space:nowrap}
.pbar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden}
.pbf{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.pbf.g{background:var(--green2)}
.two-col{display:grid;grid-template-columns:1fr 340px;gap:16px}
.tag{display:inline-block;font-size:8px;background:var(--gold-dim);color:var(--gold);padding:2px 5px;letter-spacing:0.08em;text-transform:uppercase;margin-top:3px;margin-right:3px;border-radius:1px}
.empty{padding:20px;text-align:center;color:var(--smoke);font-size:12px;line-height:1.7}
.empty a{color:var(--gold);text-decoration:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
@media(max-width:900px){.stat-row{grid-template-columns:1fr 1fr}.two-col{grid-template-columns:1fr}}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.content{padding:16px}}

.sb-tier{border-top:1px solid rgba(255,255,255,0.04)}
.sb-tier-head{display:flex;align-items:center;gap:6px;padding:10px 20px;cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke2);text-transform:uppercase;letter-spacing:0.16em;transition:color .15s;user-select:none}
.sb-tier-head:hover{color:var(--smoke)}
.sb-tier-head .sb-chev{margin-left:auto;font-size:8px;transition:transform .2s}
.sb-tier-head.open .sb-chev{transform:rotate(90deg)}
.sb-tier-head.locked{color:var(--smoke2)}
.sb-tier-lock{font-size:9px;opacity:0.7}
.sb-tier-items{display:none;flex-direction:column;overflow:hidden}
.sb-tier-items.open{display:flex}
.sb-tier-items .sni.locked{opacity:0.45;cursor:pointer}
.sb-badge-soon{margin-left:auto;font-size:7px;font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:2px 5px;border-radius:8px;letter-spacing:0.06em;text-transform:uppercase}
.sb-logo-mark{display:inline-flex !important;align-items:center;font-size:26px !important;color:#fff !important;line-height:1}.sb-logo-sun{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#e8d5a3,#c9a84c 55%,#a8842f);box-shadow:0 0 12px rgba(201,168,76,0.5);animation:sbSunBreathe 5s ease-in-out infinite;flex-shrink:0;margin-right:9px}@keyframes sbSunBreathe{0%,100%{transform:scale(1);opacity:.92}50%{transform:scale(1.06);opacity:1}}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark"><span class="sb-logo-sun"></span>Riley<span>.</span></div><div class="sb-logo-sub">The 8:14 Project</div></div>
  <a href="/dashboard" class="sni"><span class="sni-icon">🌅</span>Today</a>
  <a href="/chat" class="sni"><span class="sni-icon">🧠</span>Talk with Riley</a>
  <div id="sb-tiers"></div>

<main class="main">
<div class="topbar">
  <div><div class="tb-title" id="tb-greeting">Daily Brief</div><div class="tb-sub" id="tb-date"></div></div>

</div>
<div class="content">

<!-- ── CLARITY SCORE ─────────────────────────────────────────── -->
<div class="card" style="margin-bottom:16px">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:8px">Clarity Score</div>
      <div id="cl-phrase" style="font-family:'DM Serif Display',serif;font-size:22px;color:var(--parchment);margin-bottom:4px">Loading…</div>
      <div id="cl-note" style="font-size:11px;color:var(--smoke);line-height:1.5"></div>
    </div>

      <svg viewBox="0 0 52 52" width="64" height="64" style="transform:rotate(-90deg);display:block">
        <circle cx="26" cy="26" r="20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="5"/>
        <circle id="cl-ring" cx="26" cy="26" r="20" fill="none" stroke="var(--gold)" stroke-width="5" stroke-dasharray="125.7" stroke-dashoffset="125.7" stroke-linecap="round" style="transition:stroke-dashoffset 1s ease"/>
      </svg>

<!-- ── MORNING BRIEF ──────────────────────────────────────────── -->
<div style="background:linear-gradient(135deg,rgba(201,168,76,0.06),rgba(20,18,16,0.4));border:1px solid rgba(201,168,76,0.15);border-radius:6px;overflow:hidden;margin-bottom:16px">
  <div style="padding:20px 24px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;align-items:center">
    <div>
      <div id="br-label" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:6px">Morning Brief</div>
      <div id="br-date" style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--parchment)"></div>
    </div>
    <div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--smoke2);text-align:right">
      <div>Estimated reading time</div>
      <div style="color:var(--gold);margin-top:3px">45 seconds</div>
      <button onclick="regenerateBrief()" id="br-regen" style="margin-top:8px;background:none;border:1px solid rgba(255,255,255,0.1);color:var(--smoke2);padding:4px 10px;font-size:10px;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;letter-spacing:0.06em" title="Generate a new brief">↻ Regenerate</button>
    </div>
  </div>
  <div id="br-body" style="padding:24px">
    <div style="font-size:13px;color:var(--smoke);line-height:1.8;margin-bottom:20px">Your brief is assembled fresh each morning from your check-ins, streak, and goals.</div>
    <button id="br-gen-btn" onclick="generateBrief()" style="background:var(--gold);color:var(--ink);border:none;padding:11px 24px;font-size:12px;font-weight:600;border-radius:2px;cursor:pointer;letter-spacing:0.04em">Generate Today's Brief</button>
  </div>
</div>

</div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>

const SB = supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
let USER=null,UID=null,TODAY=new Date().toISOString().slice(0,10);

function A(id,msg,ok){
  const el=document.getElementById(id);if(!el){console.log(ok?'OK':'ERR',msg);return;}
  el.textContent=msg;el.className='alert '+(ok?'alert-ok':'alert-err');el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',5000);
}
function setBtn(id,loading,label){const el=document.getElementById(id);if(!el)return;el.disabled=loading;el.textContent=loading?'Saving…':label;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function track(type,data){try{SB.rpc('log_engagement',{p_event_type:type,p_event_data:data||{}});}catch(e){}}
function dAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function fmtDate(ts){if(!ts)return'';const d=new Date(ts),t=new Date(),y=new Date();y.setDate(t.getDate()-1);if(d.toDateString()===t.toDateString())return'Today';if(d.toDateString()===y.toDateString())return'Yesterday';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtTime(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});}
async function boot(cb){
  try{
    const {data:{session}}=await SB.auth.getSession();
    if(!session){window.location.href='https://riley.eight14.us';return;}
    USER=session.user;UID=USER.id;
    const meta=USER.user_metadata||{};
    const fullName=meta.full_name||meta.name||USER.email.split('@')[0]||'Member';
    const firstName=fullName.split(' ')[0];
    const avatarUrl=meta.avatar_url||meta.picture||'';
    const initials=fullName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const h=new Date().getHours();
    const gEl=document.getElementById('tb-greeting');if(gEl)gEl.textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', '+firstName+'.';
    const dEl=document.getElementById('tb-date');if(dEl)dEl.textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const av=document.getElementById('sb-av');if(av){if(avatarUrl)av.innerHTML=`<img src="${avatarUrl}" alt="${initials}">`;else av.textContent=initials;}
    const nm=document.getElementById('sb-name');if(nm)nm.textContent=fullName;
    await cb();
  }catch(e){console.error('Boot:',e);}
}
async function doSignOut(){await SB.auth.signOut();window.location.href='https://riley.eight14.us';}


(async()=>{ await boot(async()=>{
  track('brief_opened');
  document.getElementById('br-label').textContent='Morning Brief · '+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'});
  await Promise.all([loadClarityScore(), loadBrief()]);
}); })();

// ── CLARITY SCORE ────────────────────────────────────────────────────────────
async function loadClarityScore(){
  const sevenAgo=dAgo(7);
  const [ciR,fitR,nutR,habR,hdR,sobR]=await Promise.allSettled([
    SB.from('daily_checkins').select('checkin_date,mood,sleep_hours,notes,water_oz').eq('user_id',UID).gte('checkin_date',sevenAgo).order('checkin_date',{ascending:false}),
    SB.from('fitness_logs').select('logged_date').eq('user_id',UID).gte('logged_date',sevenAgo),
    SB.from('nutrition_logs').select('logged_date').eq('user_id',UID).eq('logged_date',TODAY),
    SB.from('habits').select('id').eq('user_id',UID).eq('is_active',true),
    SB.from('habit_completions').select('habit_id').eq('user_id',UID).gte('completed_date',sevenAgo),
    SB.from('sobriety_tracker').select('start_date').eq('user_id',UID).eq('is_active',true).maybeSingle()
  ]);
  const g=r=>r.status==='fulfilled'?r.value?.data:null;
  const checkins=g(ciR)||[],workouts=g(fitR)||[],nutrition=g(nutR)||[],habits=g(habR)||[],done=g(hdR)||[],sober=g(sobR);

  const todayCI=checkins.find(c=>c.checkin_date===TODAY);
  const lastCI=checkins[0];

  // Score each dimension 0-100
  const sleepScore=(()=>{
    const recent=checkins.filter(c=>c.sleep_hours).slice(0,3);
    if(!recent.length)return 40;
    const avg=recent.reduce((s,c)=>s+c.sleep_hours,0)/recent.length;
    return Math.min(100,Math.round(avg/8*100));
  })();
  const moveScore=Math.min(100,workouts.length*25);
  const nutriScore=nutrition.length>0?80:checkins.some(c=>c.checkin_date===TODAY)?40:20;
  const reflectScore=(()=>{
    const notedDays=checkins.filter(c=>c.notes&&c.notes.trim().length>5).length;
    return Math.min(100,notedDays*20);
  })();
  const purposeScore=(()=>{
    if(!habits.length)return 40;
    const possible=habits.length*7;
    return possible?Math.min(100,Math.round(done.length/possible*100)):40;
  })();
  const stressScore=(()=>{
    if(!lastCI?.mood)return 50;
    return Math.round(lastCI.mood/5*100);
  })();
  const recovScore=(()=>{
    if(!sober?.start_date)return 50;
    const days=Math.max(0,Math.floor((Date.now()-new Date(sober.start_date))/86400000));
    return days===0?30:days<7?60:days<30?80:100;
  })();
  const connectionScore=checkins.filter(c=>c.checkin_date>=dAgo(3)).length>0?65:40;

  const dims=[
    {k:'Sleep',     s:sleepScore,    note:sleepScore>=80?'Resting well':'Room to improve'},
    {k:'Movement',  s:moveScore,     note:moveScore>=50?'Moving regularly':'Get the body going'},
    {k:'Nourishment',s:nutriScore,   note:nutriScore>=60?'Logged and aware':'Log what you eat'},
    {k:'Reflection',s:reflectScore,  note:reflectScore>=60?'Writing regularly':'Journal your thoughts'},
    {k:'Purpose',   s:purposeScore,  note:purposeScore>=60?'Habits strong':'Build consistency'},
    {k:'Ease',      s:stressScore,   note:stressScore>=60?'Feeling steady':'Be gentle today'},
    {k:'Recovery',  s:recovScore,    note:recovScore>=80?'Streak strong':'Every day counts'},
    {k:'Connection',s:connectionScore,note:'Check-in streak'},
  ];

  const avg=Math.round(dims.reduce((s,d)=>s+d.s,0)/dims.length);
  const phrase=avg>=80?'You\'re in a great rhythm.':avg>=60?'You\'re building momentum.':avg>=40?'One step at a time.':avg>=20?'You\'re rebuilding.':'Every day counts.';
  const note=avg>=80?'Keep showing up.':avg>=60?'Small actions are adding up.':avg>=40?'Progress is still progress.':'You came back. That\'s everything.';

  document.getElementById('cl-phrase').textContent=phrase;
  document.getElementById('cl-note').textContent=note;
  document.getElementById('cl-pct').textContent=avg+'%';
  document.getElementById('cl-ring').setAttribute('stroke-dashoffset',(125.7*(1-avg/100)).toFixed(1));
  const goldPct=avg>=80?'var(--green2)':'var(--gold)';
  document.getElementById('cl-ring').setAttribute('stroke',goldPct);

  document.getElementById('cl-dims').innerHTML=dims.map(d=>{
    const col=d.s>=70?'var(--green2)':d.s>=40?'var(--gold)':'var(--smoke)';
    return`<div style="display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:10px;color:var(--smoke);font-family:'DM Mono',monospace;letter-spacing:0.04em">${d.k}</span>
        <span style="font-size:10px;color:${col};font-family:'DM Mono',monospace">${d.s}%</span>
      </div>
      <div style="height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${d.s}%;background:${col};border-radius:2px;transition:width 1s ease"></div>
      </div>
    </div>`;
  }).join('');
}

// ── MORNING BRIEF ─────────────────────────────────────────────────────────────
async function loadBrief(){
  const {data:brief}=await SB.from('daily_briefs').select('*').eq('user_id',UID).eq('brief_date',TODAY).maybeSingle();
  if(brief&&brief.modules&&Object.keys(brief.modules).length){
    renderBrief(brief);
  }
}

async function generateBrief(forceNew){
  track('brief_generated',{regenerate:!!forceNew});
  const btn=document.getElementById('br-gen-btn');
  const regen=document.getElementById('br-regen');
  if(btn){btn.disabled=true;btn.textContent='Generating…';}
  if(regen){regen.disabled=true;regen.textContent='↻ …';}
  try{
    // If forcing new, delete today's brief first
    if(forceNew){
      await SB.from('daily_briefs').delete().eq('user_id',UID).eq('brief_date',TODAY);
    }
    const res=await fetch('/.netlify/functions/daily-brief',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:UID})});
    const {brief}=await res.json();
    if(brief&&brief.modules)renderBrief(brief);
    else throw new Error('No brief returned');
  }catch(e){
    const b=document.getElementById('br-body');
    if(b)b.innerHTML='<div style="font-size:12px;color:var(--red)">Could not generate brief — try again.</div><button onclick="generateBrief()" style="margin-top:12px;background:var(--gold);color:var(--ink);border:none;padding:8px 18px;font-size:11px;font-weight:600;border-radius:2px;cursor:pointer">Retry</button>';
  }finally{
    if(regen){regen.disabled=false;regen.textContent='↻ Regenerate';}
  }
}

async function regenerateBrief(){
  if(!confirm('Generate a fresh brief? This replaces today\'s.'))return;
  generateBrief(true);
}

function renderBrief(brief){
  const m=brief.modules||{};

  // Set the date header
  const now=new Date();
  const dateEl=document.getElementById('br-date');
  if(dateEl)dateEl.textContent=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  document.getElementById('br-label').textContent='Morning Brief';

  // Build the 45-second layout
  const sections=[];

  // Riley Note — most personal, top of brief
  if(m.riley_note){
    sections.push(`<div style="padding:16px 20px;background:rgba(74,122,176,0.08);border:1px solid rgba(74,122,176,0.2);border-radius:4px;display:flex;gap:12px;align-items:flex-start;margin-bottom:16px">
      <div style="font-size:20px;flex-shrink:0">🤝</div>
      <div><div style="font-size:9px;font-family:'DM Mono',monospace;color:#4a7ab0;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:5px">Riley noticed</div>
      <div style="font-size:14px;color:var(--parchment);line-height:1.6">${esc(m.riley_note)}</div></div>
    </div>`);
  }

  // Mood note — where they are
  if(m.mood_note){
    sections.push(`<div style="font-family:'DM Serif Display',serif;font-size:17px;color:var(--parchment);line-height:1.6;margin-bottom:20px;padding-left:14px;border-left:2px solid var(--gold)">${esc(m.mood_note)}</div>`);
  }

  // Focus + Encouragement row
  const focusEnc=[];
  if(m.focus) focusEnc.push(`<div style="padding:14px;background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.2);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px">Today's focus</div><div style="font-size:13px;color:var(--parchment);font-weight:500">${esc(m.focus)}</div></div>`);
  if(m.encouragement) focusEnc.push(`<div style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px">Encouragement</div><div style="font-size:13px;color:var(--parchment);line-height:1.5">${esc(m.encouragement)}</div></div>`);
  if(focusEnc.length) sections.push(`<div style="display:flex;gap:10px;margin-bottom:16px">${focusEnc.join('')}</div>`);

  // Quote
  if(m.quote){
    sections.push(`<div style="text-align:center;padding:16px 20px;margin-bottom:16px"><div style="font-family:'DM Serif Display',serif;font-size:16px;font-style:italic;color:var(--smoke);line-height:1.6">"${esc(m.quote)}"</div></div>`);
  }

  // Challenge + Reflection row
  const cr=[];
  if(m.challenge) cr.push(`<div style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px">Today's challenge</div><div style="font-size:13px;color:var(--parchment);line-height:1.5">${esc(m.challenge)}</div></div>`);
  if(m.reflection_prompt) cr.push(`<div style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px">Sit with this</div><div style="font-size:13px;font-style:italic;color:var(--smoke);line-height:1.5">${esc(m.reflection_prompt)}</div></div>`);
  if(cr.length) sections.push(`<div style="display:flex;gap:10px;margin-bottom:16px">${cr.join('')}</div>`);

  // Nutrition tip + book + music row
  const extraCards = [];
  if(m.nutrition_tip) extraCards.push(`<div style="padding:12px 14px;background:rgba(58,124,86,0.08);border:1px solid rgba(58,124,86,0.2);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:#4aad72;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px">🍃 Nourishment</div><div style="font-size:12px;color:var(--parchment);line-height:1.5">${esc(m.nutrition_tip)}</div></div>`);
  if(m.book_rec) extraCards.push(`<div style="padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px">📚 Reading</div><div style="font-size:12px;color:var(--parchment);line-height:1.5">${esc(m.book_rec)}</div></div>`);
  if(m.music_mood) extraCards.push(`<div style="padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:3px;flex:1"><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--smoke2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px">🎵 Music</div><div style="font-size:12px;color:var(--parchment);line-height:1.5">${esc(m.music_mood)}</div></div>`);
  if(extraCards.length) sections.push(`<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">${extraCards.join('')}</div>`);

  // Action — with done toggle
  if(m.action){
    sections.push(`<div id="action-card" onclick="markActionDone(this)" style="padding:16px;background:var(--gold-dim);border:1px solid rgba(201,168,76,0.25);border-radius:3px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px" title="Click when done">
      <div id="action-check" style="width:20px;height:20px;border-radius:50%;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;color:var(--gold)"></div>
      <div><div style="font-size:8px;font-family:'DM Mono',monospace;color:var(--gold);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px">One action today</div>
      <div style="font-size:14px;color:var(--parchment);font-weight:500">${esc(m.action)}</div></div>
    </div>`);
  }

  sections.push(`<div style="margin-top:12px;font-size:10px;font-family:'DM Mono',monospace;color:var(--smoke2)">Generated ${now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} · Tap the action when done</div>`);

  document.getElementById('br-body').innerHTML=sections.join('');
}

function markActionDone(el){
  const isDone=el.dataset.done==='1';
  if(!isDone)track('brief_action_done');
  el.dataset.done=isDone?'0':'1';
  el.style.background=isDone?'var(--gold-dim)':'rgba(74,173,114,0.1)';
  el.style.borderColor=isDone?'rgba(201,168,76,0.25)':'rgba(74,173,114,0.3)';
  const chk=document.getElementById('action-check');
  if(chk){chk.textContent=isDone?'':'✓';chk.style.borderColor=isDone?'var(--gold)':'var(--green2)';chk.style.color=isDone?'var(--gold)':'var(--green2)';chk.style.background=isDone?'transparent':'rgba(74,173,114,0.15)';}
}

</script>


<script>
/* ── SIDEBAR + ENTITLEMENT GATING (shared) ────────────────────────────────── */
(function(){
  const TIER_NAV = {
    guide:    {label:'Guide',     items:[
      {href:'/journey?slug=7-day-reset', icon:'🌱', label:'7-Day Reset'},
      {href:'/conversations', icon:'💭', label:'Conversations'}
    ]},
    companion:{label:'Companion', items:[
      {href:'/tracker', icon:'📖', label:'Reflection', feat:'daily_checkin'},
      {href:'/workouts', icon:'🤍', label:'Movement', feat:'tracker_fitness'},
      {href:'/nutrition', icon:'🍃', label:'Nourishment', feat:'tracker_nutrition'},
      {href:'/sleep', icon:'🌙', label:'Rest', feat:'tracker_sleep'}
    ]},
    coach:    {label:'Coach',     items:[
      {href:'/finance', icon:'💰', label:'Financial Goals', feat:'tracker_finance'},
      {href:'/lifemap', icon:'🗺️', label:'Life Map', feat:'knowledge_graph'},
      {href:'/community', icon:'🤝', label:'Community', comingSoon:true}
    ]}
  };
  const RESOURCES = [
    {href:'/programs', icon:'🗂️', label:'Journeys'},
    {href:'/calendar', icon:'📅', label:'Calendar', feat:'tracker_calendar'}
  ];
  const TIER_ORDER = ['guide','companion','coach'];
  const PAGE_FEATURE = 'adaptive_programming';

  async function loadEnt(uid){
    const k='ent_'+uid, c=sessionStorage.getItem(k);
    if(c){try{return JSON.parse(c);}catch(e){}}
    try{
      const r=await fetch('/.netlify/functions/entitlements',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});
      const d=await r.json(); sessionStorage.setItem(k,JSON.stringify(d)); return d;
    }catch(e){ return {products:[],tier:'guide',features:{}}; }
  }
  const can=(e,k)=>!k||(e&&e.features&&e.features[k]&&e.features[k].access===true);
  const mode=(e,k)=>(e&&e.features&&e.features[k]&&e.features[k].gate_mode)||'hidden';
  const tierIdx=t=>{const i=TIER_ORDER.indexOf(t);return i<0?0:i;};

  function navItem(it, locked){
    const path=location.pathname.replace(/\/$/,'')||'/dashboard';
    const base=it.href.split('?')[0].replace(/\/$/,'');
    const isActive=path===base;
    const cls='sni'+(isActive?' active':'')+(locked?' locked':'');
    const badge=it.comingSoon?'<span class="sb-badge-soon">Soon</span>':(locked?'<span class="sb-tier-lock">🔒</span>':'');
    return `<a href="${locked?'#':it.href}" class="${cls}" data-feat="${it.feat||''}" data-upsell="${locked?'1':'0'}"><span class="sni-icon">${it.icon}</span>${it.label}${badge}</a>`;
  }

  function renderSidebar(ent){
    const mount=document.getElementById('sb-tiers');
    if(!mount)return;
    const myIdx=tierIdx(ent.tier||'guide');
    let html='';
    TIER_ORDER.forEach((key,idx)=>{
      const tier=TIER_NAV[key];
      const tierLocked=idx>myIdx;
      const items=tier.items.map(it=>navItem(it, tierLocked && !it.comingSoon)).join('');
      const open=idx<=myIdx;
      html+=`<div class="sb-tier"><div class="sb-tier-head${open?' open':''}${tierLocked?' locked':''}" onclick="sbToggleTier(this)">${tier.label}${tierLocked?'<span class="sb-tier-lock">🔒</span>':''}<span class="sb-chev">▸</span></div><div class="sb-tier-items${open?' open':''}">${items}</div></div>`;
    });
    const resItems=RESOURCES.map(it=>navItem(it, it.feat ? !can(ent,it.feat) : false)).join('');
    html+=`<div class="sb-tier"><div class="sb-tier-head open" onclick="sbToggleTier(this)">Additional Resources<span class="sb-chev">▸</span></div><div class="sb-tier-items open">${resItems}</div></div>`;
    mount.innerHTML=html;
    mount.querySelectorAll('a[data-upsell="1"]').forEach(a=>{
      a.addEventListener('click',e=>{e.preventDefault();window.location.href='/programs?unlock='+(a.dataset.feat||'');});
    });
    document.querySelectorAll('.sidebar > a.sni').forEach(a=>{
      const p=location.pathname.replace(/\/$/,'')||'/dashboard';
      a.classList.toggle('active',p===(a.getAttribute('href')||'').replace(/\/$/,''));
    });
    const planEl=document.getElementById('sb-plan');
    if(planEl){const t=ent.tier||'guide';planEl.textContent='Riley '+t.charAt(0).toUpperCase()+t.slice(1);}
  }
  window.sbToggleTier=function(head){
    head.classList.toggle('open');
    const items=head.nextElementSibling;
    if(items)items.classList.toggle('open');
  };

  function wall(ent,feat){
    const fmap={
      daily_checkin:{name:'Daily Check-In',need:'Riley Companion'},
      adaptive_programming:{name:'Your Daily Brief',need:'Riley Companion'},
      tracker_fitness:{name:'Workout Tracking',need:'Riley Companion'},
      tracker_nutrition:{name:'Nutrition Tracking',need:'Riley Companion'},
      tracker_sleep:{name:'Sleep Tracking',need:'Riley Companion'},
      tracker_finance:{name:'Financial Goals',need:'Riley Coach'},
      tracker_calendar:{name:'Calendar',need:'Riley Companion'},
      knowledge_graph:{name:'Your Knowledge Graph',need:'Riley Coach'}
    };
    const f=fmap[feat]||{name:'This feature',need:'a subscription'};
    const ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;left:220px;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(8,7,6,0.92);backdrop-filter:blur(8px)';
    ov.innerHTML=`<div style="max-width:420px;text-align:center;padding:40px">
      <div style="font-size:44px;margin-bottom:20px">🔒</div>
      <div style="font-family:'DM Serif Display',serif;font-size:26px;color:#f5f0e8;margin-bottom:12px">${f.name} is locked</div>
      <div style="font-size:14px;color:#8a8578;line-height:1.7;margin-bottom:28px">Unlock ${f.name.toLowerCase()} and Riley's full daily support with <strong style="color:#c9a84c">${f.need}</strong>. Riley adapts to where you are — and stays.</div>
      <a href="/programs?unlock=${feat}" style="display:inline-block;background:linear-gradient(135deg,#c9a84c,#d4942a);color:#0a0908;padding:13px 28px;font-size:13px;font-weight:600;text-decoration:none;border-radius:3px;letter-spacing:0.04em;box-shadow:0 4px 20px rgba(201,168,76,0.3)">Unlock with ${f.need} →</a>
      <div style="margin-top:16px"><a href="/dashboard" style="font-size:12px;color:#8a8578;text-decoration:none">← Back to Home</a></div>
    </div>`;
    document.body.appendChild(ov);
  }

  async function run(){
    if(typeof SB==='undefined')return;
    try{
      const {data:{session}}=await SB.auth.getSession();
      if(!session)return;
      const ent=await loadEnt(session.user.id);
      renderSidebar(ent);
      if(PAGE_FEATURE && !can(ent,PAGE_FEATURE)){
        if(mode(ent,PAGE_FEATURE)==='hidden') window.location.href='/dashboard';
        else wall(ent,PAGE_FEATURE);
      }
    }catch(e){console.error('gating:',e);}
  }
  if(document.readyState!=='loading')run();else document.addEventListener('DOMContentLoaded',run);
})();
</script>
<script src="/pwa.js"></script>
</body>
</html>
