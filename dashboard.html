<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Riley · The 8:14 Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dashboard-auth.js"></script>
</head>
<body>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-title" id="greeting">Good morning.</div>
        <div class="topbar-sub"  id="topbar-date"></div>
      </div>
      <div class="topbar-actions">
        <a href="/brief" class="btn btn-dark">← Back to Vision</a>
        <a href="/brief" class="btn btn-gold">Open Today's Brief</a>
      </div>
    </div>

    <div class="dash-content">

      <!-- Brief card -->
      <div class="briefing-card" id="brief-card">
        <div class="briefing-card-header">
          <div>
            <div class="bc-label">Daily Intelligence Brief</div>
            <div class="bc-title">Loading your brief…</div>
          </div>
        </div>
      </div>

      <!-- Metrics -->
      <div class="section-label">Your Metrics</div>
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Day Streak</div>
          <div class="stat-value" id="stat-streak">—</div>
          <div class="stat-sub">days with Riley</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Brief Completion</div>
          <div class="stat-value" id="stat-completion">—</div>
          <div class="stat-sub" id="stat-completion-sub">this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sobriety</div>
          <div class="stat-value" id="stat-sobriety">—</div>
          <div class="stat-sub" id="stat-sobriety-sub">days</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Weekly Goals</div>
          <div class="stat-value" id="stat-goals">—</div>
          <div class="stat-sub">on track this week</div>
        </div>
      </div>

      <!-- Two-column lower -->
      <div class="two-col">

        <!-- Left -->
        <div>
          <div class="section-label">Recent Conversations</div>
          <div class="panel" id="conversations-panel">
            <div class="loading-wrap" style="min-height:120px"><div class="spinner"></div></div>
          </div>

          <div class="section-label">Program Enrollments</div>
          <div class="panel" id="programs-panel">
            <div class="loading-wrap" style="min-height:100px"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Right -->
        <div class="checkin-panel">
          <div class="section-label" style="margin-top:0">Daily Check-In</div>
          <div class="checkin-card" id="mood-card">
            <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
          </div>
          <div class="checkin-card" id="sobriety-card">
            <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
          </div>
          <div class="checkin-card" id="priorities-card">
            <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
          </div>
          <div class="checkin-card" id="goals-card">
            <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<script>
(async () => {
  try {
    const ctx = await initDashboard();
    if (!ctx) {
      document.getElementById('greeting').textContent = 'Session expired — redirecting…';
      setTimeout(() => window.location.href = 'https://riley.eight14.us', 2000);
      return;
    }
    const { user, client } = ctx;

    // Sidebar
    document.getElementById('sidebar-mount').innerHTML = renderSidebar('dashboard', user);

    // Greeting
    const h = new Date().getHours();
    const greet = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    const firstName = (user.user_metadata?.full_name || user.user_metadata?.name || user.email || '').split(' ')[0];
    document.getElementById('greeting').textContent = greet + ', ' + firstName + '. ☀️';
    document.getElementById('topbar-date').textContent =
      new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }) +
      ' \xB7 Your brief is ready';

    // Parallel data fetch
    const today = new Date().toISOString().slice(0, 10);
    const [briefR, sobrietyR, checkinsR, goalsR, habitsR, habitDoneR, convsR, progressR] =
      await Promise.allSettled([
        client.from('daily_briefs').select('*').eq('user_id', user.id).eq('brief_date', today).maybeSingle(),
        client.from('sobriety_tracker').select('*').eq('user_id', user.id).eq('is_active', true).maybeSingle(),
        client.from('daily_checkins').select('checkin_date, mood').eq('user_id', user.id)
              .gte('checkin_date', dAgo(30)).order('checkin_date', {ascending:false}),
        client.from('user_goals').select('*').eq('user_id', user.id).eq('is_active', true)
              .order('sort_order').limit(5),
        client.from('habits').select('*').eq('user_id', user.id).eq('is_active', true)
              .order('sort_order').limit(6),
        client.from('habit_completions').select('habit_id').eq('user_id', user.id).eq('completed_date', today),
        client.from('riley_conversations').select('id, title, preview, updated_at, tags')
              .eq('user_id', user.id).order('updated_at', {ascending:false}).limit(4),
        client.from('user_program_progress').select('*, programs(title, emoji, duration_days)')
              .eq('user_id', user.id).order('enrolled_at', {ascending:false}).limit(4)
      ]);

    const g = r => r.status === 'fulfilled' ? r.value?.data : null;
    const brief     = g(briefR);
    const sobriety  = g(sobrietyR);
    const checkins  = g(checkinsR)  || [];
    const goals     = g(goalsR)     || [];
    const habits    = g(habitsR)    || [];
    const habitDone = (g(habitDoneR)||[]).map(x => x.habit_id);
    const convs     = g(convsR)     || [];
    const enrolls   = g(progressR)  || [];
    const todayCI   = checkins.find(c => c.checkin_date === today);
    const sobrietyDays = sobriety ? calcSobrietyDays(sobriety.start_date) : 0;

    // ── BRIEF CARD ────────────────────────────────────────────
    const briefCard = document.getElementById('brief-card');
    if (brief && brief.modules && Object.keys(brief.modules).length) {
      const mods = brief.modules, done = brief.completion || {};
      const order = ['mindset','meditation','hydration','workout','nutrition','reading','linkedin','calendar'];
      const icons = {mindset:'🧠',meditation:'🙏',hydration:'💧',workout:'🏋️',nutrition:'🍳',reading:'📚',linkedin:'🎥',calendar:'📅',podcast:'🎧'};
      const total = brief.total_modules || Object.keys(mods).length;
      const comp  = brief.completed_modules || Object.values(done).filter(Boolean).length;
      const circ  = 138.2, offset = (circ * (1 - comp / Math.max(1, total))).toFixed(1);
      briefCard.innerHTML =
        '<div class="briefing-card-header">' +
          '<div><div class="bc-label">Daily Intelligence Brief \xB7 ' +
          new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'}) + '</div>' +
          '<div class="bc-title">Your ' + new Date().toLocaleDateString('en-US',{weekday:'long'}) + ' Blueprint</div>' +
          '<div class="bc-subtitle">Riley has assembled today\'s brief based on your goals and schedule.</div></div>' +
          '<div style="text-align:right;flex-shrink:0;padding-left:20px">' +
          '<div class="bc-progress-label">' + comp + ' / ' + total + ' complete</div>' +
          '<svg viewBox="0 0 56 56" width="56" height="56" style="transform:rotate(-90deg)">' +
          '<circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>' +
          '<circle cx="28" cy="28" r="22" fill="none" stroke="var(--gold)" stroke-width="4" ' +
          'stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" stroke-linecap="round"/>' +
          '</svg></div></div>' +
          '<div class="briefing-modules-grid">' +
          [...order.filter(k=>mods[k]),...Object.keys(mods).filter(k=>!order.includes(k))].map(k =>
            '<div class="bmod' + (done[k] ? ' done' : '') + '" onclick="location.href=\'/brief\'">' +
            '<div class="bmod-icon">' + (icons[k]||'•') + '</div>' +
            '<div class="bmod-label">' + k + '</div>' +
            '<div class="bmod-content">' + esc(String(mods[k]).slice(0,80)) + (String(mods[k]).length>80?'&hellip;':'') + '</div>' +
            '</div>').join('') +
          '</div>' +
          '<div style="padding:14px 24px;border-top:1px solid rgba(255,255,255,0.07)">' +
          '<a href="/brief" class="btn btn-gold" style="font-size:12px">Open Full Brief &rarr;</a></div>';
    } else {
      briefCard.innerHTML =
        '<div class="briefing-card-header">' +
        '<div><div class="bc-label">Daily Intelligence Brief</div>' +
        '<div class="bc-title">Your brief isn\'t ready yet</div>' +
        '<div class="bc-subtitle">Briefs are delivered at 6:00 AM each morning. Set up your brief preferences now.</div></div></div>' +
        '<div style="padding:20px 24px;border-top:1px solid rgba(255,255,255,0.07)">' +
        '<a href="/brief" class="btn btn-gold" style="font-size:12px">Set Up Your Brief &rarr;</a></div>';
    }

    // ── STATS ─────────────────────────────────────────────────
    document.getElementById('stat-sobriety').textContent = sobrietyDays || '—';
    if (sobrietyDays > 0) document.getElementById('stat-sobriety-sub').textContent =
      sobrietyDays >= 90 ? 'days \xB7 personal best' : 'days strong';
    document.getElementById('stat-streak').textContent = calcStreak(checkins.map(c=>c.checkin_date)) || '—';
    if (brief) {
      document.getElementById('stat-completion').textContent =
        Math.round(((brief.completed_modules||0) / Math.max(1, brief.total_modules||1)) * 100) + '%';
      document.getElementById('stat-completion-sub').textContent = 'completion today';
    }
    const onTrack = goals.filter(g => g.target_value > 0 && g.current_value/g.target_value >= 0.5).length;
    document.getElementById('stat-goals').textContent = goals.length ? onTrack + '/' + goals.length : '—';

    // ── CONVERSATIONS ─────────────────────────────────────────
    const cp = document.getElementById('conversations-panel');
    cp.innerHTML = !convs.length ?
      '<div class="panel-header"><div class="panel-title">Riley Sessions</div></div>' +
      '<div class="empty-state"><div class="empty-state-icon">💬</div>' +
      '<div class="empty-state-title">No conversations yet</div>' +
      '<div class="empty-state-sub">Start a session with Riley and it\'ll appear here.</div>' +
      '<div style="margin-top:14px"><a href="https://riley.eight14.us" class="btn btn-dark" style="font-size:12px">Talk to Riley</a></div></div>'
      :
      '<div class="panel-header"><div class="panel-title">Riley Sessions</div>' +
      '<a href="/conversations" class="panel-action">View all &rarr;</a></div>' +
      convs.map(c =>
        '<a href="/conversations?id=' + c.id + '" class="conv-item">' +
        '<div><div class="conv-title">' + esc(c.title || 'Riley Session') + '</div>' +
        (c.preview ? '<div class="conv-preview">' + esc(c.preview.slice(0,100)) + '</div>' : '') +
        (c.tags||[]).slice(0,2).map(t => '<span class="conv-tag">' + esc(t) + '</span>').join(' ') +
        '</div><div class="conv-date">' + formatDate(c.updated_at) + '<br>' + formatTime(c.updated_at) + '</div></a>'
      ).join('');

    // ── PROGRAMS ──────────────────────────────────────────────
    const pp = document.getElementById('programs-panel');
    pp.innerHTML = !enrolls.length ?
      '<div class="panel-header"><div class="panel-title">Active Programs</div>' +
      '<a href="/programs" class="panel-action">Browse all &rarr;</a></div>' +
      '<div class="empty-state"><div class="empty-state-icon">🎯</div>' +
      '<div class="empty-state-title">No programs yet</div>' +
      '<div class="empty-state-sub">Browse programs and enroll to track your progress.</div>' +
      '<div style="margin-top:14px"><a href="/programs" class="btn btn-gold" style="font-size:12px">Browse Programs</a></div></div>'
      :
      '<div class="panel-header"><div class="panel-title">Active Programs</div>' +
      '<a href="/programs" class="panel-action">Browse all &rarr;</a></div>' +
      '<div style="padding:0 20px">' +
      enrolls.map(e => {
        const pr = e.programs || {};
        const d  = e.days_completed || e.day_completed || 0;
        const t  = pr.duration_days || 1;
        const pct = Math.min(100, Math.round(d/t*100));
        const fin = pct >= 100;
        return '<div class="prog-item">' +
          '<div class="prog-icon">' + (pr.emoji||'🎯') + '</div>' +
          '<div><div class="prog-name">' + esc(pr.title || e.program_name || 'Program') + '</div>' +
          '<div class="prog-status">Day ' + d + ' of ' + t + ' \xB7 ' + (fin?'Complete':'Active') + '</div></div>' +
          '<div class="prog-progress"><div class="prog-pct"' + (fin?' style="color:var(--green)"':'') + '>' + (fin?'✓':pct+'%') + '</div>' +
          '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:' + pct + '%' + (fin?';background:var(--green)':'') + '"></div></div></div>' +
          '</div>';
      }).join('') + '</div>';

    // ── MOOD CHECK-IN ─────────────────────────────────────────
    const mc = document.getElementById('mood-card');
    mc.innerHTML = '<div class="checkin-label">How are you feeling?</div>' +
      (todayCI && todayCI.mood ? '' : '<div style="font-size:12px;color:var(--smoke);margin-bottom:10px">Riley adjusts today\'s brief based on your answer</div>') +
      '<div class="mood-scale">' +
      [1,2,3,4,5].map(n => '<button class="mood-btn' + (todayCI && todayCI.mood===n ? ' selected' : '') +
        '" ' + (todayCI ? '' : 'onclick="saveMood(' + n + ',this)"') + '>' +
        ['😔','😐','🙂','😊','🔥'][n-1] + '</button>').join('') + '</div>' +
      (todayCI ? '<div style="font-size:11px;color:var(--smoke);margin-top:10px;font-family:\'DM Mono\',monospace">✓ Checked in today</div>' : '');

    // ── SOBRIETY ──────────────────────────────────────────────
    const sc = document.getElementById('sobriety-card');
    if (!sobriety) {
      sc.innerHTML = '<div class="checkin-label">Sobriety Streak</div>' +
        '<div style="font-size:13px;color:var(--smoke);margin-bottom:12px">Track your sober days.</div>' +
        '<a href="/tracker" class="btn btn-gold" style="font-size:12px">Set Start Date &rarr;</a>';
    } else {
      const recentSet = new Set(checkins.filter(c=>c.checkin_date>=dAgo(6)).map(c=>c.checkin_date));
      const dots = Array.from({length:7},(_,i)=>{
        const d = new Date(); d.setDate(d.getDate()-(6-i));
        const ds = d.toISOString().slice(0,10);
        return '<div class="streak-dot' + (ds===today?' today':recentSet.has(ds)?' done':'') + '"></div>';
      }).join('');
      const pb = sobrietyDays>=90?'Personal best. Keep going.':sobrietyDays>=30?'A month strong. 🔥':sobrietyDays>=7?'One week down.':'Every day counts.';
      sc.innerHTML = '<div class="checkin-label">Sobriety Streak</div>' +
        '<div class="streak-display"><div class="streak-num">' + sobrietyDays + '</div><div class="streak-unit">days</div></div>' +
        '<div style="font-size:12px;color:var(--smoke)">' + pb + '</div>' +
        '<div class="streak-dots">' + dots + '</div>' +
        '<div style="font-size:10px;color:var(--smoke);margin-top:6px;font-family:\'DM Mono\',monospace">Last 7 days</div>';
    }

    // ── HABITS ────────────────────────────────────────────────
    const hc = document.getElementById('priorities-card');
    hc.innerHTML = '<div class="checkin-label">Today\'s Priorities</div>' +
      (!habits.length ?
        '<div style="font-size:13px;color:var(--smoke);margin-bottom:12px">Add habits to track daily.</div>' +
        '<a href="/tracker" class="btn btn-dark" style="font-size:12px">Add Habits &rarr;</a>'
        :
        habits.map(h => {
          const done = habitDone.includes(h.id);
          return '<div class="todo-item" onclick="toggleHabit(\'' + h.id + '\',this)" style="cursor:pointer">' +
            '<div class="todo-check' + (done?' done':'') + '">' + (done?'✓':'') + '</div>' +
            '<div class="todo-text' + (done?' done':'') + '">' + (h.emoji?h.emoji+' ':'') + esc(h.title) + '</div></div>';
        }).join('')
      );

    // ── GOALS ─────────────────────────────────────────────────
    const gc = document.getElementById('goals-card');
    gc.innerHTML = '<div class="checkin-label">Weekly Goals</div>' +
      (!goals.length ?
        '<div style="font-size:13px;color:var(--smoke);margin-bottom:12px">Set goals to track your week.</div>' +
        '<a href="/tracker" class="btn btn-dark" style="font-size:12px">Add Goals &rarr;</a>'
        :
        goals.map(g => {
          const pct = g.target_value>0 ? Math.min(100,Math.round(g.current_value/g.target_value*100)) : 0;
          const fin = pct>=100;
          return '<div class="goal-row">' +
            '<div class="goal-top"><span class="goal-name">' + esc(g.title) + '</span>' +
            '<span class="goal-val"' + (fin?' style="color:var(--green)"':'') + '>' +
            (g.current_value||0).toLocaleString() + ' / ' + (g.target_value||0).toLocaleString() +
            ' ' + (g.unit||'') + (fin?' ✓':'') + '</span></div>' +
            '<div class="goal-bar"><div class="goal-fill" style="width:' + pct + '%' + (fin?';background:var(--green)':'') + '"></div></div>' +
            '</div>';
        }).join('')
      );

    // ── INTERACTIVE HANDLERS ──────────────────────────────────
    window.saveMood = async (n, btn) => {
      document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      await client.from('daily_checkins').upsert(
        {user_id:user.id, checkin_date:today, mood:n, sobriety_day:sobrietyDays>0},
        {onConflict:'user_id,checkin_date'}
      );
      const existing = document.getElementById('mood-saved');
      if (!existing) {
        const el = document.createElement('div');
        el.id = 'mood-saved';
        el.style.cssText = 'font-size:11px;color:var(--smoke);margin-top:10px;font-family:DM Mono,monospace';
        el.textContent = '✓ Check-in saved';
        document.getElementById('mood-card').appendChild(el);
      }
    };

    window.toggleHabit = async (id, row) => {
      const ck = row.querySelector('.todo-check');
      const tx = row.querySelector('.todo-text');
      const was = ck.classList.contains('done');
      if (was) {
        await client.from('habit_completions').delete().eq('habit_id',id).eq('completed_date',today).eq('user_id',user.id);
        ck.classList.remove('done'); ck.textContent=''; tx.classList.remove('done');
      } else {
        await client.from('habit_completions').upsert({habit_id:id,user_id:user.id,completed_date:today},{onConflict:'habit_id,completed_date'});
        ck.classList.add('done'); ck.textContent='✓'; tx.classList.add('done');
      }
    };

  } catch (err) {
    console.error('[Dashboard] Fatal:', err);
    const b = document.createElement('div');
    b.style.cssText='position:fixed;bottom:16px;right:16px;background:#8b3a3a;color:#fff;padding:12px 18px;border-radius:4px;font-size:13px;z-index:9999;max-width:360px';
    b.textContent='Dashboard error: '+err.message;
    document.body.appendChild(b);
  }
})();

function dAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function calcStreak(dates){
  if(!dates.length)return 0;
  const s=[...dates].sort((a,b)=>b.localeCompare(a));
  const t=new Date().toISOString().slice(0,10);
  let streak=0,exp=t;
  for(const d of s){if(d===exp){streak++;const p=new Date(exp);p.setDate(p.getDate()-1);exp=p.toISOString().slice(0,10);}else break;}
  return streak;
}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
