<!doctype html><html lang="en"><head><meta charset="utf-8">
<title>8:14 — Hero Logo (LOCKED)</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *{margin:0;box-sizing:border-box}
  body{background:#0a0908;display:flex;align-items:center;justify-content:center;min-height:100vh}

  /* ─────────────────────────────────────────────────────────────────────────
     THE 8:14 HERO LOGO — LOCKED (approved by Brenden 2026-07-02).
     This is the "Meet Riley" card from the marketing site: a centered glowing
     gold orb in a dark square, with "8:14." at the bottom. Verbatim proportions
     from home.html .riley-visual / .riley-orb / .rtag.
     To resize: change --size ONLY. Every proportion is locked to the box size
     via container-query units (cqw/cqh), so it scales without ever being redrawn.
     ───────────────────────────────────────────────────────────────────────── */
  .hero-logo{
    --size: 460px;                       /* the ONLY thing you change to scale */
    width: var(--size); height: var(--size);
    container-type: size;
    border-radius: calc(var(--size) * 0.0435);
    background: radial-gradient(circle at 38% 32%, rgba(201,168,76,0.22), #141210 62%);
    border: 1px solid rgba(201,168,76,0.16);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .hero-logo .orb{
    width: 32.6cqw; height: 32.6cqw; border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #e8d5a3, #c9a84c 55%, #a8842f);
    box-shadow: 0 0 17.4cqw rgba(201,168,76,0.40);
    animation: hl-breathe 5s ease-in-out infinite;
  }
  .hero-logo .tag{
    position: absolute; bottom: 5.2cqh; left: 50%; transform: translateX(-50%);
    font-family: 'DM Serif Display', serif; font-size: 7.4cqw; color: #fff; line-height: 1; white-space: nowrap;
  }
  .hero-logo .tag span{ color: #c9a84c; }
  @keyframes hl-breathe{ 0%,100%{ transform: scale(1); opacity: .92 } 50%{ transform: scale(1.06); opacity: 1 } }
</style></head><body>
  <div class="hero-logo">
    <div class="orb"></div>
    <div class="tag">I&rsquo;m Riley<span>.</span></div>
  </div>
</body></html>
