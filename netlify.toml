  timeout = 26

[functions."journey-step"]
  timeout = 26

# Member-facing Day-7 letter — generates a ~700-token letter on first view; needs headroom over
# the default 10s (matches its generative siblings daily-brief / journey-step).
[functions."week-one-letter"]
  timeout = 26

# The 8:14 Reset AM (~8:14am) / PM (~8pm) web-push nudges — scheduled every 15 min;
# the function checks each member's local time + quiet hours + once-a-day dedup.
[functions."reset-nudge-cron"]
  schedule = "*/15 * * * *"

# Interactive-program proactive nudges — daily at 15:00 UTC (~9am MT, a humane hour = quiet-hours-safe
# for the US). In-app alerts for everyone + opt-in email via Resend (per-enrollment nudge_channels +
# global email consent). 1/day cap, lapse-aware, dry_run supported. Dormant until members enroll.
[functions."int-proactive-cron"]
  # 18:00 UTC = daytime in EVERY US timezone incl Hawaii (8am HST) and Alaska (9-10am AKT) through
  # Eastern (2pm ET) - so the once-daily nudge never lands pre-7am. Per-member quiet-hours gating on the
  # EMAIL channel (int-proactive-cron.js, shared inQuietHours) additionally protects exotic/international tz.
  schedule = "0 18 * * *"

# Memory v2 hygiene (Master Build Spec §1.2) — weekly Mon 09:00 UTC. Backfills embeddings,
# merges near-duplicate memories, decays stale low-confidence ones. Gated + fail-open; a no-op
# until an embedding key is set. Logs each run to system_incidents.
[functions."memory-maintenance-cron"]
  schedule = "0 9 * * 1"

# Post-hoc crisis safety backstop (Master Build Spec §7.3) — nightly ~08:00 UTC (~1am MT).
# Re-reads the last day of UNFLAGGED member messages on STANDARD Haiku (never batched) and
# queues anything a human should double-check. NEVER touches the live deterministic path.
[functions."post-hoc-crisis-scan"]
  schedule = "0 8 * * *"

# Coach adaptive plans (Master Build Spec §3.3) — weekly Mon 13:00 UTC. Regenerates each Coach
# member's workout/nutrition plan from last week's completion %, with a visible "what changed"
# line. Coach/mentor only (or free_access_mode); gated + fail-open; no-op until Coach members exist.
[functions."plan-adapt-cron"]
  schedule = "0 13 * * 1"

# Clarity v2.2 monitoring (§Phase D) — monthly, 1st at 13:00 UTC. Records the v2 score
# distribution + WHO-5 / perceived-direction validity + month-over-month drift flags to
# clarity_monitoring. READ-heavy, writes one row; gated + fail-open; never touches member state.
[functions."clarity-drift-cron"]
  schedule = "0 13 1 * *"

# TEMPORARY 24h promo (2026-07-07, operator-requested): auto-comp every NEW signup to Coach
# tier while the app_settings.auto_comp_coach_until window is open. A scheduled SWEEP every
# 10 min — never touches the signup path. Inert once the window passes; REMOVE this block after.
[functions."auto-comp-cron"]
  schedule = "*/10 * * * *"

# Workout & Nutrition plan generator runs as a BACKGROUND function
# (plan-generate-background.js) — a full 7-day plan exceeds the synchronous
# timeout, so the -background suffix gives it up to 15 min. The client fires it
# and polls wellness_plans for the result. No timeout config needed here.

# HTTP-triggered background pipeline — no timeout, runs full Scout->Sage->Atlas
# The -background suffix tells Netlify to return 202 immediately and keep running
[functions."manual-pipeline-background"]

# Runs every Sunday 6am MT (12:00 UTC) as a background function
[functions."weekly-pipeline-cron"]
  schedule = "0 12 * * 0"

# ── AUTOMATED CONTENT ENGINE (content schema) ──────────────────────────────
# Admin queue API (approve auto-assigns a design via renderBrief - needs the kit + fonts).
[functions."content-queue"]
  timeout = 26
  included_files = [
    "brand/template-kit/grounds/**",
    "brand/template-kit/fonts/**",
    "brand/template-kit/riley-nav-logo.png",
    "brand/template-kit/riley-nav-ink.png"
  ]

# Design template library manager (paste Canva Brand Template IDs)
[functions."content-templates"]
  timeout = 10

# Atlas render — Canva Connect Autofill (manual per-brief design / retry)
[functions."content-atlas"]
  timeout = 26

# HTTP-triggered manual run of the daily content pipeline (background, no timeout).
# Scout (live web search) -> candidates -> reposts fast-track / Sage briefs -> Sentinel -> queue.
# Renders each post's design in-process (renderBrief), so it needs the grounds + fonts bundled.
[functions."content-run-background"]
  included_files = [
    "brand/template-kit/grounds/**",
    "brand/template-kit/fonts/**",
    "brand/template-kit/riley-nav-logo.png",
    "brand/template-kit/riley-nav-ink.png"
  ]

# Scheduled daily content run — 6:00 AM Mountain (12:00 UTC). Runs as background.
# PAUSED for the 2-week launch: the curated all-Riley launch campaign drives the feed,
# not the randomized web pipeline. Re-enable after launch by uncommenting the schedule.
[functions."content-daily-cron"]
  # schedule = "0 12 * * *"

# Nightly performance pull (Buffer analytics -> content_performance_metrics) +
# weekly learnings digest (Sundays) that Sage reads. 23:30 MT = 05:30 UTC.
[functions."content-metrics-cron"]
  schedule = "30 5 * * *"

# Re-engagement win-back email — runs daily at 10am MT (16:00 UTC).
# Finds people ~1 week lapsed and sends one gentle "we saved your place" email.
[functions."reengagement-cron"]
  schedule = "0 16 * * *"

# Brief delivery — runs hourly, emails each person's brief at their chosen
# check-in time in THEIR timezone (morning/lunch/afternoon/evening).
[functions."brief-delivery-cron"]
  schedule = "0 * * * *"

# Crisis follow-up (Trust architecture §2.4) — gentle check-ins after a Level 2/3
# moment, at same-day / next-morning / 3-day / 7-day intervals. Honors opt-out.
# Runs at 01:00, 15:00, 21:00 UTC so stages land at humane hours.
[functions."crisis-followup-cron"]
  schedule = "0 1,15,21 * * *"

# PostHog attribution pull — mirrors yesterday's funnel counts (by first-touch UTM)
# into posthog_daily_conversions. Runs 07:10 UTC (after PostHog has ingested the
# prior UTC day). Gated on POSTHOG_PERSONAL_KEY + POSTHOG_PROJECT_ID — no-op without.
[functions."posthog-conversion-cron"]
  schedule = "10 7 * * *"

# Nightly content-library link health — 09:00 UTC (3am MT). Runs as a background
# scheduled fn. Flags only definitively dead links (404/410/ENOTFOUND) as broken so
# they drop from client surfacing; recovered links flip back to ok.
[functions."link-health-check"]
  schedule = "0 9 * * *"

# ── Security: internal dev docs must NOT be publicly served ──────────────────
# The repo root is Netlify's publish dir, so committed *.md docs are otherwise
# readable over HTTP (/CLAUDE.md leaked internal dev notes). force=true overrides
# static-file serving; a relative `from` covers every host (apex, www, riley, admin,
# login). Returns 404 — don't acknowledge the file. ADD ANY NEW INTERNAL *.md HERE.
[[redirects]]
  from = "/CLAUDE.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/CHANGELOG.md"
  to = "/404.html"
  status = 404
  force = true
# Internal brand toolkit (design system source, render engines, ~40MB of PSD/PNG
# assets) lives in the repo but must never be publicly served. Force-404 the whole tree.
[[redirects]]
