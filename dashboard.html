<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Riley · The 8:14 Project</title>
  <link rel="stylesheet" href="/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/dashboard-auth.js"></script>
</head>
<body>

<div class="dash-layout">
  <aside class="sidebar" id="sidebar-mount"></aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-title" id="greeting">Good morning.</div>
        <div class="topbar-sub" id="topbar-date"></div>
      </div>
      <div style="display:flex;gap:10px">
        <a href="/brief.html" class="btn btn-gold">Open Today's Brief →</a>
        <a href="https://riley.eight14.us" class="btn btn-dark">Talk to Riley</a>
      </div>
    </div>

    <div class="dash-content">

      <!-- Stats row -->
      <div class="section-label">At a Glance</div>
      <div class="stats-row" id="stats-row">
        <div class="stat-card">
          <div class="stat-label">Day Streak</div>
          <div class="stat-value" id="stat-streak">—</div>
          <div class="stat-sub">days with Riley</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Brief Completion</div>
          <div class="stat-value" id="stat-completion">—</div>
          <div class="stat-sub">this week</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sobriety</div>
          <div class="stat-value" id="stat-sobriety">—</div>
          <div class="stat-sub" id="stat-sobriety-sub">days</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Check-In Streak</div>
          <div class="stat-value" id="stat-checkin">—</div>
          <div class="stat-sub">days in a row</div>
        </div>
      </div>

      <!-- Today's brief preview + check-in -->
      <div style="display:grid;grid-template-columns:1fr 320px;gap:20px;margin-top:4px">

        <!-- Brief preview -->
        <div>
          <div class="section-label">Today's Brief</div>
          <div class="card" id="brief-preview">
            <div class="loading-wrap"><div class="spinner"></div> Loading your brief…</div>
          </div>

          <div class="section-label">Recent Conversations</div>
          <div class="card" id="conversations-preview">
            <div class="loading-wrap"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Right column: check-in + goals -->
        <div>
          <div class="section-label" style="margin-top:0">Today's Check-In</div>
          <div class="card" id="checkin-card">
            <div class="card-body" id="checkin-body">
              <div class="loading-wrap" style="min-height:120px"><div class="spinner"></div></div>
            </div>
          </div>

          <div class="section-label">Weekly Goals</div>
          <div class="card">
            <div class="card-body" id="goals-body">
              <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
            </div>
          </div>

          <div class="section-label">Active Programs</div>
          <div class="card">
            <div class="card-body" id="programs-body">
              <div class="loading-wrap" style="min-height:80px"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
(async () => {
  const ctx = await initDashboard();
  if (!ctx) return;

  const { user, client } = ctx;

  // ── Sidebar + greeting ──────────────────────────────────────
  const _sidebarHtml = renderSidebar('dashboard', user);
  // renderSidebar returns a full <aside> — extract its inner HTML since sidebar-mount IS the aside
  const _tmp = document.createElement('div');
  _tmp.innerHTML = _sidebarHtml;
  const _aside = _tmp.querySelector('aside') || _tmp;
  document.getElementById('sidebar-mount').innerHTML = _aside.innerHTML;

  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  const firstName = (user.user_metadata?.full_name || user.email || '').split(' ')[0];
  document.getElementById('greeting').textContent = `${greet}, ${firstName}. ☀️`;
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  // ── Load all data in parallel ───────────────────────────────
  const today = new Date().toISOString().split('T')[0];

  let checkinRes, briefRes, sobrietyRes, goalsRes, programsRes, conversationsRes, checkinsWeekRes;
  try {
  [
    checkinRes,
    briefRes,
    sobrietyRes,
    goalsRes,
    programsRes,
    conversationsRes,
    checkinsWeekRes
  ] = await Promise.all([
    client.from('daily_checkins').select('*').eq('user_id', user.id).eq('checkin_date', today).maybeSingle(),
    client.from('daily_briefs').select('*').eq('user_id', user.id).eq('brief_date', today).maybeSingle(),
    client.from('sobriety_tracker').select('*').eq('user_id', user.id).eq('is_active', true).maybeSingle(),
    client.from('user_goals').select('*').eq('user_id', user.id).eq('is_active', true).order('sort_order'),
    client.from('user_program_progress')
      .select('*, programs(title, emoji, duration_days)')
      .eq('user_id', user.id)
      .order('enrolled_at', { ascending: false })
      .limit(3),
    client.from('riley_conversations')
      .select('id, title, created_at, updated_at, tags')
      .eq('user_id', user.id)
      .order('updated_at', { ascending: false })
      .limit(4),
    client.from('daily_checkins')
      .select('checkin_date')
      .eq('user_id', user.id)
      .gte('checkin_date', getDateDaysAgo(7))
      .order('checkin_date', { ascending: false })
  ]);
  } catch (err) {
    console.error('Dashboard data load error:', err);
    // Provide safe empty defaults so page renders instead of freezing
    checkinRes = briefRes = sobrietyRes = { data: null, error: err };
    goalsRes = programsRes = conversationsRes = checkinsWeekRes = { data: [], error: err };
  }

  // ── Stats ───────────────────────────────────────────────────

  // Sobriety
  const sobrietyDays = sobrietyRes.data ? calcSobrietyDays(sobrietyRes.data.start_date) : 0;
  document.getElementById('stat-sobriety').textContent = sobrietyDays || '—';
  if (sobrietyDays > 0) {
    document.getElementById('stat-sobriety-sub').textContent =
      sobrietyDays === 1 ? 'day — keep going' : 'days strong';
  }

  // Check-in streak
  const checkinDates = (checkinsWeekRes.data || []).map(r => r.checkin_date);
  const checkinStreak = calcStreak(checkinDates);
  document.getElementById('stat-checkin').textContent = checkinStreak;

  // Brief completion this week
  const brief = briefRes.data;
  if (brief) {
    const pct = brief.total_modules > 0
      ? Math.round((brief.completed_modules / brief.total_modules) * 100)
      : 0;
    document.getElementById('stat-completion').textContent = pct + '%';
  } else {
    document.getElementById('stat-completion').textContent = 'New';
  }

  // Riley streak (days since first conversation or first checkin, whichever)
  document.getElementById('stat-streak').textContent = checkinDates.length || '—';

  // ── Today's brief preview ───────────────────────────────────
  const briefEl = document.getElementById('brief-preview');
  if (brief && brief.modules && Object.keys(brief.modules).length > 0) {
    const modules = brief.modules;
    const completion = brief.completion || {};
    const moduleOrder = ['mindset','workout','nutrition','linkedin','reading','podcast','meditation','calendar'];
    const icons = { mindset:'🧠', workout:'🏋️', nutrition:'🍳', linkedin:'🎥', reading:'📚', podcast:'🎧', meditation:'🙏', calendar:'📅' };

    briefEl.innerHTML = `
      <div style="background:var(--ink);color:var(--parchment)">
        <div style="padding:20px 24px;background:linear-gradient(135deg,rgba(201,168,76,0.12) 0%,transparent 60%);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px">Daily Brief · ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
            <div style="font-family:'DM Serif Display',serif;font-size:20px">Today's Blueprint</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--smoke)">${brief.completed_modules} / ${brief.total_modules} done</div>
            <div style="margin-top:6px;height:3px;width:80px;background:rgba(255,255,255,0.1);border-radius:2px;margin-left:auto">
              <div style="height:100%;width:${brief.total_modules > 0 ? (brief.completed_modules/brief.total_modules*100) : 0}%;background:var(--gold);border-radius:2px"></div>
            </div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.05)">
          ${moduleOrder.filter(k => modules[k]).map(k => `
            <div style="background:rgba(15,14,13,.97);padding:16px 18px;position:relative;cursor:pointer" onclick="window.location='/brief.html'">
              ${completion[k] ? '<span style="position:absolute;top:10px;right:12px;font-size:10px;color:var(--green);font-weight:700">✓</span>' : ''}
              <div style="font-size:18px;margin-bottom:6px">${icons[k] || '•'}</div>
              <div style="font-size:10px;font-family:\'DM Mono\',monospace;color:var(--smoke);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">${k}</div>
              <div style="font-size:12px;color:var(--parchment);line-height:1.4;opacity:.8">${String(modules[k]).slice(0, 60)}${String(modules[k]).length > 60 ? '…' : ''}</div>
            </div>`).join('')}
        </div>
        <div style="padding:14px 24px;border-top:1px solid rgba(255,255,255,0.07)">
          <a href="/brief.html" class="btn btn-gold" style="font-size:12px;padding:8px 18px">Open Full Brief →</a>
        </div>
      </div>`;
  } else {
    briefEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🌅</div>
        <div class="empty-state-title">Your brief isn't ready yet</div>
        <div class="empty-state-sub">Briefs are delivered at 6:00 AM each morning.<br>Check back tomorrow — or set up your brief now.</div>
        <div style="margin-top:16px">
          <a href="/brief.html" class="btn btn-gold">Set Up Your Brief</a>
        </div>
      </div>`;
  }

  // ── Recent conversations ────────────────────────────────────
  const convEl = document.getElementById('conversations-preview');
  const convs = conversationsRes.data || [];
  if (convs.length === 0) {
    convEl.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">💬</div>
        <div class="empty-state-title">No conversations yet</div>
        <div class="empty-state-sub">Start a session with Riley and it'll appear here.</div>
        <div style="margin-top:16px"><a href="https://riley.eight14.us" class="btn btn-dark">Talk to Riley</a></div>
      </div>`;
  } else {
    convEl.innerHTML = `
      <div class="card-header">
        <span class="card-title">Recent Conversations</span>
        <a href="/conversations.html" class="card-action">View all →</a>
      </div>
      ${convs.map(c => `
        <a href="/conversations.html?id=${c.id}" style="display:grid;grid-template-columns:1fr auto;gap:12px;padding:14px 20px;border-bottom:1px solid var(--mist);text-decoration:none;transition:background .12s" onmouseover="this.style.background='var(--warm-white)'" onmouseout="this.style.background='white'">
          <div>
            <div style="font-size:13px;color:var(--ink);font-weight:500;margin-bottom:3px">${escHtml(c.title || 'Riley Session')}</div>
            <div style="margin-top:4px">${(c.tags || []).slice(0,2).map(t => `<span class="tag tag-gold">${escHtml(t)}</span>`).join(' ')}</div>
          </div>
          <div style="font-size:11px;color:var(--smoke);font-family:'DM Mono',monospace;text-align:right;white-space:nowrap">${formatDate(c.updated_at)}<br>${formatTime(c.updated_at)}</div>
        </a>`).join('')}`;
  }

  // ── Check-in ────────────────────────────────────────────────
  const checkin = checkinRes.data;
  const checkinBody = document.getElementById('checkin-body');

  if (checkin && checkin.mood) {
    checkinBody.innerHTML = `
      <div style="font-size:12px;color:var(--smoke);margin-bottom:12px">Today's check-in is complete ✓</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        ${[1,2,3,4,5].map(n => `
          <div style="flex:1;padding:8px;background:${n===checkin.mood?'var(--gold-dim)':'var(--warm-white)'};border:1.5px solid ${n===checkin.mood?'var(--gold)':'var(--mist)'};border-radius:2px;text-align:center;font-size:18px">
            ${['😔','😐','🙂','😊','🔥'][n-1]}
          </div>`).join('')}
      </div>
      ${checkin.notes ? `<div style="font-size:12px;color:var(--smoke);font-style:italic">"${escHtml(checkin.notes)}"</div>` : ''}
      <div style="margin-top:12px;display:flex;gap:16px;font-size:12px;color:var(--smoke)">
        ${checkin.water_oz ? `<span>💧 ${checkin.water_oz}oz water</span>` : ''}
        ${checkin.sleep_hours ? `<span>😴 ${checkin.sleep_hours}h sleep</span>` : ''}
      </div>`;
  } else {
    checkinBody.innerHTML = `
      <div style="font-size:12px;color:var(--smoke);margin-bottom:12px">How are you feeling today?</div>
      <div class="mood-scale" id="mood-scale">
        ${[1,2,3,4,5].map(n => `<button class="mood-btn" data-mood="${n}" onclick="selectMood(${n})">${['😔','😐','🙂','😊','🔥'][n-1]}</button>`).join('')}
      </div>
      <div id="checkin-extra" style="display:none;margin-top:16px">
        <textarea id="checkin-notes" placeholder="Anything on your mind? (optional)" style="width:100%;padding:10px;border:1px solid var(--mist);border-radius:2px;font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:60px;background:var(--warm-white)"></textarea>
        <button class="btn btn-gold" style="margin-top:10px;width:100%;justify-content:center" onclick="submitCheckin()">Save Check-In</button>
      </div>`;
  }

  // ── Goals ───────────────────────────────────────────────────
  const goalsBody = document.getElementById('goals-body');
  const goals = goalsRes.data || [];
  if (goals.length === 0) {
    goalsBody.innerHTML = `<div style="font-size:13px;color:var(--smoke);text-align:center;padding:20px 0">No goals set yet — <a href="/tracker.html" style="color:var(--gold)">add your first goal</a></div>`;
  } else {
    goalsBody.innerHTML = goals.slice(0,4).map(g => {
      const pct = g.target_value > 0 ? Math.min(100, Math.round((g.current_value / g.target_value) * 100)) : 0;
      const done = pct >= 100;
      return `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:12px;color:var(--ink)">${escHtml(g.title)}</span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:${done?'var(--green)':'var(--gold)'}">${g.current_value.toLocaleString()} / ${g.target_value?.toLocaleString()} ${g.unit||''} ${done?'✓':''}</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill ${done?'green':''}" style="width:${pct}%"></div></div>
        </div>`;
    }).join('');
  }

  // ── Programs ────────────────────────────────────────────────
  const programsBody = document.getElementById('programs-body');
  const enrollments = (programsRes.data || []).filter(e => !programsRes.error);
  if (enrollments.length === 0) {
    programsBody.innerHTML = `<div style="font-size:13px;color:var(--smoke);text-align:center;padding:20px 0">No programs yet — <a href="/programs.html" style="color:var(--gold)">browse programs</a></div>`;
  } else {
    programsBody.innerHTML = enrollments.map(e => {
      const prog = e.programs || {};
      const pct = prog.duration_days > 0
        ? Math.min(100, Math.round(((e.days_completed || 0) / prog.duration_days) * 100))
        : 0;
      return `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--mist)">
          <div style="width:34px;height:34px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-size:16px;border-radius:2px;flex-shrink:0">${prog.emoji||'🎯'}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;color:var(--ink);font-weight:500">${escHtml(prog.title||'Program')}</div>
            <div style="font-size:11px;color:var(--smoke);margin-top:2px">Day ${e.days_completed||0} of ${prog.duration_days||'?'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-family:'DM Mono',monospace;font-size:16px;color:var(--gold);font-weight:500">${pct}%</div>
            <div style="width:50px;height:3px;background:var(--mist);border-radius:2px;margin-top:4px;margin-left:auto"><div style="height:100%;width:${pct}%;background:var(--gold);border-radius:2px"></div></div>
          </div>
        </div>`;
    }).join('');
  }

  // ── Helpers ─────────────────────────────────────────────────
  let selectedMood = null;

  window.selectMood = function(n) {
    selectedMood = n;
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.mood) === n);
    });
    document.getElementById('checkin-extra').style.display = 'block';
  };

  window.submitCheckin = async function() {
    if (!selectedMood) return;
    const notes = document.getElementById('checkin-notes')?.value || '';
    const { error } = await client.from('daily_checkins').upsert({
      user_id: user.id,
      checkin_date: today,
      mood: selectedMood,
      notes: notes || null,
      sobriety_day: sobrietyDays > 0
    }, { onConflict: 'user_id,checkin_date' });

    if (!error) {
      document.getElementById('checkin-body').innerHTML = `
        <div style="text-align:center;padding:16px 0">
          <div style="font-size:32px;margin-bottom:8px">${['😔','😐','🙂','😊','🔥'][selectedMood-1]}</div>
          <div style="font-size:13px;color:var(--green);font-weight:500">Check-in saved ✓</div>
          <div style="font-size:12px;color:var(--smoke);margin-top:4px">Riley will use this in tomorrow's brief.</div>
        </div>`;
      document.getElementById('stat-checkin').textContent = checkinStreak + 1;
    }
  };

})();

function getDateDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().split('T')[0];
}

function calcStreak(dateStrings) {
  if (!dateStrings.length) return 0;
  const sorted = [...dateStrings].sort((a,b) => b.localeCompare(a));
  const today = new Date().toISOString().split('T')[0];
  let streak = 0;
  let expected = today;
  for (const d of sorted) {
    if (d === expected) {
      streak++;
      const prev = new Date(expected);
      prev.setDate(prev.getDate() - 1);
      expected = prev.toISOString().split('T')[0];
    } else break;
  }
  return streak;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
