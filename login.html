<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0908">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Riley">
<title>Sign In — Meet Riley</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#06090e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#0a1018;border:1px solid #1a2530;border-radius:18px;padding:2.75rem 2.25rem;width:100%;max-width:380px;text-align:center}
.logo{font-size:2.75rem;font-weight:900;color:#c9a84c;letter-spacing:-2px;margin-bottom:4px}
.tagline{font-size:.72rem;color:#4a5a6a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:2.25rem}
.desc{font-size:.88rem;color:#4a5a6a;line-height:1.6;margin-bottom:1.75rem}
.google-btn{display:flex;align-items:center;justify-content:center;gap:.75rem;width:100%;padding:.9rem 1.25rem;background:#fff;border:none;border-radius:10px;color:#333;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.google-btn:hover{opacity:.92;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.status{font-size:.82rem;margin-top:1.25rem;min-height:1.2em;color:#4a5a6a;transition:color .2s}
.status.ok{color:#3abf6a}.status.err{color:#bf4a4a}
.note{font-size:.72rem;color:#2a3a4a;margin-top:1.5rem;line-height:1.5}
.note a{color:#c9a84c;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">I&rsquo;m Riley<span style="color:#c9a84c">.</span></div>
  <div class="tagline">Let's Rebuild Together</div>
  <p class="desc">Sign in to talk with Riley, track your progress, and access your programs.</p>

  <button class="google-btn" id="btn" onclick="doSignIn()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="status" id="status"></div>
  <p class="note">By signing in you agree to our <a href="https://meetriley.us/privacy" target="_blank">Privacy Policy</a>. Your conversations with Riley are private.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// Simple, direct — no async boot, no site-config dependency
var _sb = window.supabase.createClient(
  'https://tglljvjixlolaguycvbb.supabase.co',
  'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
);
// Origin-aware so sign-in works on whatever domain serves this page:
// login.<base> → the app at riley.<base>/dashboard. Falls back to riley.meetriley.us if the host is unexpected.
var DEST = (function(){ var h = window.location.hostname; var base = h.replace(/^login\./, ''); return base && base !== h ? 'https://riley.' + base + '/dashboard' : 'https://riley.meetriley.us/dashboard'; })();

// If already logged in, go straight to dashboard
_sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) {
    setStatus('Already signed in — taking you home…', 'ok');
    setTimeout(function(){ window.location.href = DEST; }, 500);
  }
});

// Listen for OAuth return
_sb.auth.onAuthStateChange(function(event, session) {
  if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
    setStatus('Signed in — welcome. Taking you home…', 'ok');
    setTimeout(function(){ window.location.href = DEST; }, 500);
  }
});

function doSignIn() {
  var btn = document.getElementById('btn');
  btn.disabled = true;
  setStatus('Opening Google sign-in…', '');
  _sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: DEST,
      queryParams: { prompt: 'select_account' }
    }
  }).then(function(r) {
    if (r.error) {
      setStatus('Error: ' + r.error.message, 'err');
      btn.disabled = false;
    }
    // If no error, browser is already navigating to Google
  }).catch(function(e) {
    setStatus('Error: ' + e.message, 'err');
    btn.disabled = false;
  });
}

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}
</script>
<script src="/pwa.js"></script>
<script src="/posthog.js"></script>
</body>
</html>
