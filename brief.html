<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Brief — Riley · The 8:14 Project</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0f0e0d;--parchment:#f5f0e8;--warm-white:#faf8f4;--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.15);--mist:#e8e4dc;--smoke:#8a8578;--green:#4a7c59;--red:#8b3a3a;}
body{font-family:'DM Sans',sans-serif;background:var(--warm-white);color:var(--ink);min-height:100vh}
.dash-layout{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:var(--ink);padding:32px 0;display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,0.06);position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-logo{padding:0 24px 32px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:24px}
.sidebar-logo-mark{font-family:'DM Serif Display',serif;font-size:22px;color:var(--parchment)}
.sidebar-logo-mark span{color:var(--gold)}
.sidebar-logo-sub{font-size:11px;color:var(--smoke);letter-spacing:0.05em;margin-top:2px}
.sidebar-section-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--smoke);letter-spacing:0.18em;text-transform:uppercase;padding:0 24px;margin-bottom:6px;margin-top:20px}
.sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;text-decoration:none;font-size:13px;color:var(--smoke);transition:color .15s,background .15s;border-left:2px solid transparent}
.sidebar-nav-item:hover,.sidebar-nav-item.active{color:var(--parchment);background:rgba(255,255,255,0.04);border-left-color:var(--gold)}
.sidebar-spacer{flex:1}
.sidebar-user{padding:20px 24px;border-top:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;gap:12px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--ink);flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-name{font-size:12px;color:var(--parchment);font-weight:500}
.user-plan{font-size:10px;color:var(--gold)}
.sign-out-btn{margin-left:auto;background:transparent;border:none;color:var(--smoke);font-size:14px;cursor:pointer;padding:4px}
.sign-out-btn:hover{color:var(--red)}
.dash-main{overflow-y:auto;min-height:100vh}
.dash-topbar{padding:24px 32px;background:white;border-bottom:1px solid var(--mist);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-greeting{font-family:'DM Serif Display',serif;font-size:22px;color:var(--ink)}
.topbar-date{font-size:13px;color:var(--smoke);margin-top:2px}
.dash-content{padding:32px}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--smoke);text-transform:uppercase;margin-bottom:16px;margin-top:32px;display:flex;align-items:center;gap:10px}
.section-label:first-child{margin-top:0}
.section-label::after{content:'';flex:1;height:1px;background:var(--mist)}
/* Brief card */
.brief-hero{background:var(--ink);border-radius:2px;overflow:hidden;margin-bottom:24px}
.brief-hero-header{padding:28px 32px;background:linear-gradient(135deg,rgba(201,168,76,0.14) 0%,transparent 60%);border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.bh-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}
.bh-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--parchment);margin-bottom:6px}
.bh-sub{font-size:13px;color:var(--smoke);line-height:1.5;max-width:420px}
.progress-ring-wrap{text-align:right;flex-shrink:0}
.progress-ring-label{font-size:11px;color:var(--smoke);font-family:'DM Mono',monospace;margin-bottom:6px}
.modules-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,0.05)}
.bmod{background:rgba(15,14,13,0.97);padding:20px;cursor:pointer;transition:background .15s;position:relative}
.bmod:hover{background:rgba(201,168,76,0.06)}
.bmod.done{background:rgba(74,124,89,0.06)}
.bmod.done::after{content:'✓';position:absolute;top:12px;right:14px;font-size:11px;color:var(--green);font-weight:700}
.bmod-icon{font-size:22px;margin-bottom:8px}
.bmod-label{font-size:10px;font-family:'DM Mono',monospace;color:var(--smoke);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.bmod-content{font-size:13px;color:var(--parchment);line-height:1.45}
/* Coming soon / preferences */
.coming-soon{background:var(--ink);border-radius:2px;padding:48px 40px;text-align:center;margin-bottom:24px}
.cs-icon{font-size:48px;margin-bottom:16px}
.cs-title{font-family:'DM Serif Display',serif;font-size:28px;color:var(--parchment);margin-bottom:8px}
.cs-sub{font-size:14px;color:var(--smoke);line-height:1.6;max-width:440px;margin:0 auto 32px}
.module-types{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;text-align:left;margin-bottom:32px;max-width:700px;margin-left:auto;margin-right:auto}
.mt-item{background:rgba(255,255,255,0.04);padding:12px 14px;border-radius:2px;border:1px solid rgba(255,255,255,0.07)}
.mt-icon{font-size:18px;margin-bottom:4px}
.mt-label{font-size:11px;color:var(--smoke);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.05em}
/* Prefs panel */
.prefs-panel{background:white;border:1px solid var(--mist);border-radius:2px;padding:28px;max-width:560px}
.prefs-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:20px}
.pref-row{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.pref-label{font-size:11px;font-family:'DM Mono',monospace;color:var(--smoke);text-transform:uppercase;letter-spacing:0.08em}
.pref-input{padding:10px 12px;border:1px solid var(--mist);background:var(--warm-white);font-family:'DM Sans',sans-serif;font-size:13px}
.focus-checkboxes{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.focus-check{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
.focus-check input{accent-color:var(--gold)}
.btn-gold{padding:11px 24px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:var(--gold);color:var(--ink);letter-spacing:0.04em}
.save-toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--parchment);padding:10px 20px;font-size:13px;font-family:'DM Mono',monospace;border-radius:2px;opacity:0;transition:opacity .3s;z-index:100;pointer-events:none}
.save-toast.show{opacity:1}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:2px}
@media(max-width:900px){.modules-grid,.module-types{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.dash-layout{grid-template-columns:1fr}.sidebar{display:none}.dash-content{padding:20px 16px}}
</style>
</head>
<body>
<div class="dash-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">Riley<span>.</span></div>
      <div class="sidebar-logo-sub">The 8:14 Project</div>
    </div>
    <div class="sidebar-section-label">Today</div>
    <a href="/dashboard" class="sidebar-nav-item">🌅 Morning Brief</a>
    <a href="https://riley.eight14.us" class="sidebar-nav-item">💬 Chat with Riley</a>
    <a href="/tracker" class="sidebar-nav-item">✅ Daily Check-In</a>
    <div class="sidebar-section-label">History</div>
    <a href="/conversations" class="sidebar-nav-item">📁 Conversations</a>
    <a href="/progress" class="sidebar-nav-item">📊 Progress</a>
    <a href="/workouts" class="sidebar-nav-item">🏋️ Workouts</a>
    <a href="/nutrition" class="sidebar-nav-item">🍳 Nutrition</a>
    <div class="sidebar-section-label">Programs</div>
    <a href="/programs" class="sidebar-nav-item">🎯 Enrollments</a>
    <a href="/roadmap" class="sidebar-nav-item">🗺️ Roadmap</a>
    <div class="sidebar-section-label">Life Data</div>
    <a href="/sleep" class="sidebar-nav-item">😴 Sleep</a>
    <a href="/finance" class="sidebar-nav-item">💰 Financial Goals</a>
    <a href="/calendar" class="sidebar-nav-item active">📅 Calendar</a>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">?</div>
      <div>
        <div class="user-name" id="user-name">Loading…</div>
        <div class="user-plan">Life Coach · Active</div>
      </div>
      <button class="sign-out-btn" onclick="signOut()" title="Sign out">↪</button>
    </div>
  </aside>

  <main class="dash-main">
    <div class="dash-topbar">
      <div>
        <div class="topbar-greeting">Daily Brief</div>
        <div class="topbar-date" id="topbar-date"></div>
      </div>
    </div>

    <div class="dash-content">
      <div id="brief-content">
        <div style="padding:40px;text-align:center;color:var(--smoke)">Loading your brief…</div>
      </div>
    </div>
  </main>
</div>

<div class="save-toast" id="save-toast">Saved</div>

<script>
const SUPABASE_URL = 'https://tglljvjixlolaguycvbb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8';
let sb, userId, todayISO, briefData = null;

async function init() {
  try {
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'https://riley.eight14.us'; return; }
    userId = session.user.id;
    const now = new Date();
    todayISO = now.toISOString().split('T')[0];
    document.getElementById('topbar-date').textContent = now.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
    const meta = session.user.user_metadata || {};
    const av = document.getElementById('user-avatar');
    if (meta.avatar_url) av.innerHTML = '<img src="'+meta.avatar_url+'" alt="">'; else av.textContent = (meta.full_name||session.user.email||'?')[0].toUpperCase();
    document.getElementById('user-name').textContent = meta.full_name || session.user.email || 'User';

    const { data: brief } = await sb.from('daily_briefs').select('*').eq('user_id', userId).eq('brief_date', todayISO).single();
    briefData = brief;
    if (brief?.modules?.length) { renderBrief(brief); } else { renderComingSoon(); }
  } catch(e) { console.error(e); renderComingSoon(); }
}

function renderBrief(brief) {
  const modules = brief.modules || [];
  const completion = brief.completion || {};
  const done = Object.values(completion).filter(Boolean).length;
  const total = modules.length;
  const pct = total ? Math.round(done / total * 100) : 0;
  const circ = 138.2;
  const offset = circ - (circ * pct / 100);

  document.getElementById('brief-content').innerHTML = `
    <div class="brief-hero">
      <div class="brief-hero-header">
        <div>
          <div class="bh-label">Daily Intelligence Brief — ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric'})}</div>
          <div class="bh-title">Your Blueprint for Today</div>
          <div class="bh-sub">Riley has assembled your personalized brief. Work through each module to complete your day.</div>
        </div>
        <div class="progress-ring-wrap">
          <div class="progress-ring-label">${done} / ${total} complete</div>
          <svg viewBox="0 0 56 56" width="56" height="56" style="transform:rotate(-90deg)">
            <circle cx="28" cy="28" r="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
            <circle id="progress-ring" cx="28" cy="28" r="22" fill="none" stroke="#c9a84c" stroke-width="4" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
          </svg>
        </div>
      </div>
      <div class="modules-grid">
        ${modules.map((m, i) => `
          <div class="bmod ${completion[i] ? 'done' : ''}" onclick="toggleModule(${i})">
            <div class="bmod-icon">${m.icon || '📌'}</div>
            <div class="bmod-label">${m.label || 'Module'}</div>
            <div class="bmod-content">${m.content || ''}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

async function toggleModule(index) {
  if (!briefData) return;
  const completion = briefData.completion || {};
  completion[index] = !completion[index];
  briefData.completion = completion;
  try {
    await sb.from('daily_briefs').update({ completion }).eq('id', briefData.id);
    renderBrief(briefData);
    showToast(completion[index] ? 'Module complete ✓' : 'Marked incomplete');
  } catch(e) { console.warn(e); }
}

function renderComingSoon() {
  const MODULE_TYPES = [
    {icon:'🧠',label:'Mindset'},
    {icon:'🏋️',label:'Workout'},
    {icon:'🍳',label:'Nutrition'},
    {icon:'💤',label:'Sleep'},
    {icon:'📚',label:'Reading'},
    {icon:'🙏',label:'Meditation'},
    {icon:'📅',label:'Schedule'},
    {icon:'🎯',label:'Goals'},
    {icon:'💬',label:'Riley Chat'},
    {icon:'💧',label:'Hydration'},
    {icon:'☀️',label:'Morning Ritual'},
    {icon:'🌙',label:'Evening Wind-Down'},
    {icon:'📊',label:'Progress Check'},
    {icon:'🤝',label:'Community'},
    {icon:'🎵',label:'Focus Playlist'},
    {icon:'✏️',label:'Journal Prompt'},
    {icon:'🧘',label:'Breathwork'},
    {icon:'💰',label:'Finance Review'},
    {icon:'🌿',label:'Gratitude'},
    {icon:'🔥',label:'Recovery Win'},
  ];

  document.getElementById('brief-content').innerHTML = `
    <div class="coming-soon">
      <div class="cs-icon">🌅</div>
      <div class="cs-title">Your brief isn't ready yet</div>
      <div class="cs-sub">Riley assembles your personalized daily brief each morning at 6:00 AM. Come back tomorrow — or set your preferences below so it's perfectly tailored to you.</div>
      <div class="module-types">
        ${MODULE_TYPES.map(m => `<div class="mt-item"><div class="mt-icon">${m.icon}</div><div class="mt-label">${m.label}</div></div>`).join('')}
      </div>
    </div>
    <div class="section-label">Set Up Your Preferences</div>
    <div class="prefs-panel">
      <div class="prefs-title">Personalize Your Brief</div>
      <div class="pref-row">
        <label class="pref-label">Preferred Wake Time</label>
        <input type="time" class="pref-input" id="pref-wake" value="06:00">
      </div>
      <div class="pref-row">
        <label class="pref-label">Timezone</label>
        <input type="text" class="pref-input" id="pref-tz" placeholder="e.g. America/Denver" value="America/Denver">
      </div>
      <div class="pref-row">
        <label class="pref-label">Focus Areas</label>
        <div class="focus-checkboxes">
          <label class="focus-check"><input type="checkbox" id="fc-sobriety" checked> Sobriety &amp; Recovery</label>
          <label class="focus-check"><input type="checkbox" id="fc-fitness" checked> Fitness &amp; Movement</label>
          <label class="focus-check"><input type="checkbox" id="fc-nutrition"> Nutrition &amp; Gut Health</label>
          <label class="focus-check"><input type="checkbox" id="fc-mindset"> Mindset &amp; Mental Health</label>
          <label class="focus-check"><input type="checkbox" id="fc-finance"> Financial Goals</label>
          <label class="focus-check"><input type="checkbox" id="fc-sleep"> Sleep Optimization</label>
        </div>
      </div>
      <button class="btn-gold" onclick="savePrefs()">Save Preferences</button>
    </div>
  `;
}

async function savePrefs() {
  const prefs = {
    wake_time: document.getElementById('pref-wake')?.value,
    timezone: document.getElementById('pref-tz')?.value,
    focus_areas: ['sobriety','fitness','nutrition','mindset','finance','sleep'].filter((f,i) => document.getElementById('fc-'+['sobriety','fitness','nutrition','mindset','finance','sleep'][i])?.checked),
  };
  try {
    await sb.from('user_profiles').upsert({ id: userId, brief_preferences: prefs }, { onConflict: 'id' });
    showToast('Preferences saved');
  } catch(e) { showToast('Saved locally'); }
}

function showToast(msg) {
  const t = document.getElementById('save-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function signOut() { await sb.auth.signOut(); window.location.href = 'https://riley.eight14.us'; }
window.addEventListener('DOMContentLoaded', init);
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</body>
</html>
