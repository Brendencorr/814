<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — 8:14</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #06090e;
  --card:   #0a1018;
  --border: #1a2530;
  --gold:   #c9a84c;
  --text:   #c8d4e0;
  --muted:  #4a5a6a;
  --red:    #bf4a4a;
  --green:  #3abf6a;
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px;
}
.page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.logo {
  font-size: 3rem;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: -2px;
  margin-bottom: 4px;
}
.tagline {
  font-size: .72rem;
  color: var(--muted);
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-bottom: 2rem;
}
.sign-in-desc {
  font-size: .85rem;
  color: var(--muted);
  margin-bottom: 1.75rem;
  line-height: 1.5;
}
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .75rem;
  width: 100%;
  padding: .85rem 1.25rem;
  background: #fff;
  border: none;
  border-radius: 10px;
  color: #333;
  font-size: .92rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .2s, box-shadow .2s;
  box-shadow: 0 1px 6px rgba(0,0,0,.4);
}
.google-btn:hover { opacity: .92; box-shadow: 0 2px 10px rgba(0,0,0,.5); }
.google-btn:disabled { opacity: .5; cursor: default; }
.google-icon {
  width: 20px; height: 20px; flex-shrink: 0;
}
.divider {
  display: flex; align-items: center; gap: .75rem;
  margin: 1.5rem 0; color: var(--muted); font-size: .75rem;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}
.status-msg {
  font-size: .8rem;
  margin-top: 1.25rem;
  min-height: 1.1em;
  color: var(--muted);
}
.status-msg.error { color: var(--red); }
.status-msg.success { color: var(--green); }
.footer-note {
  font-size: .72rem;
  color: var(--muted);
  margin-top: 1.5rem;
  line-height: 1.5;
}
.footer-note a { color: var(--gold); text-decoration: none; }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="logo">8:14</div>
    <div class="tagline">The Rebuild Project</div>

    <p class="sign-in-desc">
      Sign in to save your conversations with Riley, track your progress, and access your programs.
    </p>

    <button class="google-btn" id="google-btn" onclick="signInWithGoogle()">
      <!-- Google "G" SVG logo -->
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="status-msg" id="status-msg"></div>

    <div class="footer-note">
      By signing in you agree to our
      <a href="https://eight14.us/privacy" target="_blank">Privacy Policy</a>.
      Your conversations with Riley are private and only visible to you.
    </div>
  </div>
</div>

<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Configuration loaded at runtime from /.netlify/functions/site-config ───
  // No credentials are hardcoded here. The site-config function reads
  // SUPABASE_URL and SUPABASE_ANON_KEY from Netlify environment variables.
  // Land on the premium client dashboard after auth (cross-subdomain)
  const REDIRECT_URL = 'https://riley.eight14.us/dashboard';
  let supabase = null;

  // ── Boot: fetch config then initialise Supabase ────────────────────────────
  // Initialise Supabase immediately with fallback keys
  // (site-config is tried first; if it fails we use the public publishable key)
  async function getConfig() {
    try {
      const res = await fetch('/.netlify/functions/site-config');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const cfg = await res.json();
      if (cfg.supabaseUrl && cfg.supabaseAnonKey) return cfg;
    } catch (e) { /* fall through to inline fallback */ }
    return {
      supabaseUrl: 'https://tglljvjixlolaguycvbb.supabase.co',
      supabaseAnonKey: 'sb_publishable_VZFFDQYMJ9yuFbDvLKim4g_k1LhfTJ8'
    };
  }

  async function boot() {
    const cfg = await getConfig();
    supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    // If already signed in → go straight to dashboard
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      setStatus('Already signed in — taking you to your dashboard…', 'success');
      setTimeout(() => window.location.href = REDIRECT_URL, 600);
      return;
    }

    // Listen for successful OAuth return
    supabase.auth.onAuthStateChange((event, session) => {
      if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
        setStatus('Signed in — welcome. Taking you home…', 'success');
        setTimeout(() => window.location.href = REDIRECT_URL, 600);
      }
    });
  }
  boot();

  // ── Google OAuth ───────────────────────────────────────────────────────────
  async function signInWithGoogle() {
    if (!supabase) return;
    const btn = document.getElementById('google-btn');
    btn.disabled = true;
    setStatus('Opening Google sign-in…', '');
    try {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: REDIRECT_URL,
          // Force Google to prompt account selection every time — user must verify
          queryParams: { prompt: 'select_account' },
        },
      });
      if (error) throw error;
      // Browser will redirect to Google — no further action needed here
    } catch (err) {
      setStatus('Sign-in failed: ' + err.message, 'error');
      btn.disabled = false;
    }
  }

  function setStatus(msg, cls) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.className = 'status-msg' + (cls ? ' ' + cls : '');
  }
</script>
</body>
</html>
